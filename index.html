<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

html,body{
  height:100%;
  overflow:hidden;
}

body{
  background:radial-gradient(circle at 85% 50%, rgba(255,255,255,0.15), transparent 40%),
  linear-gradient(135deg,#000,#05070a,#0b0f14);
  display:flex;
  flex-direction:column;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{
  color:#fff;
  font-size:24px;
  font-weight:bold;
}

/* HOME */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
}

.title{
  font-size:52px;
  color:#fff;
}

/* INPUT HOME */
.inputBox{
  display:flex;
  width:600px;
  max-width:90%;
  background:rgba(255,255,255,0.08);
  padding:12px;
  border-radius:999px;
}

.inputBox input{
  flex:1;
  background:none;
  border:none;
  color:#fff;
  outline:none;
}

/* send */
.send{
  width:48px;
  height:48px;
  background:#10a37f;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  cursor:pointer;
}

/* CHAT */
.chat{
  display:none;
  flex:1;
  flex-direction:column;
  height:100%;
}

/* MESSAGES */
.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  scroll-behavior:smooth;
}

.msg{
  max-width:70%;
  padding:12px 16px;
  border-radius:14px;
  animation:pop .3s ease;
}

.user{
  align-self:flex-end;
  background:#fff;
  color:#000;
}

.ai{
  align-self:flex-start;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* INPUT */
.bottom{
  display:flex;
  gap:10px;
  padding:15px;
}

.bottom textarea{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
  resize:none;
  outline:none;
}

.sendBtn{
  width:52px;
  background:#10a37f;
  border:none;
  border-radius:12px;
  color:#fff;
}

/* THINKING */
.thinking{
  display:flex;
  gap:6px;
}

.dot{
  width:6px;
  height:6px;
  background:#10a37f;
  border-radius:50%;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:.3}
  50%{opacity:1}
}

@keyframes pop{
  from{opacity:0;transform:scale(.8)}
  to{opacity:1;transform:scale(1)}
}

/* scrollbar fix */
.messages::-webkit-scrollbar{
  width:6px;
}
.messages::-webkit-scrollbar-thumb{
  background:#10a37f55;
  border-radius:10px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="top">
  <div class="logo">ILYASS AI</div>
</div>

<div id="home" class="center">
  <div class="title">Ask Anything</div>

  <div class="inputBox">
    <input id="homeInput" placeholder="Type..."
      onkeydown="if(event.key==='Enter')startChat()">

    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput"
      onkeydown="handleKey(event)"
      placeholder="Send message..."></textarea>

    <button class="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<script>

/* refs */
const home = document.getElementById("home");
const chat = document.getElementById("chat");
const homeInput = document.getElementById("homeInput");
const chatInput = document.getElementById("chatInput");
const messages = document.getElementById("messages");

/* START */
function startChat(){
  const text = homeInput.value.trim();
  if(!text) return;

  home.style.display="none";
  chat.style.display="flex";

  addMessage(text,"user");
  homeInput.value="";
  askAI(text);

  chatInput.focus();
}

/* AUTO SCROLL FIX */
function autoScroll(){
  requestAnimationFrame(()=>{
    messages.scrollTop = messages.scrollHeight;
  });
}

/* TYPE EFFECT */
function typeText(el,text){
  el.textContent="";
  const msg = text + " 🔥";

  let i=0;

  function type(){
    if(i<msg.length){
      el.textContent += msg[i++];
      autoScroll();
      setTimeout(type,10);
    } else {
      autoScroll();
    }
  }

  type();
}

/* ADD MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;

  const content=document.createElement("div");
  div.appendChild(content);

  messages.appendChild(div);

  if(type==="ai"){
    typeText(content,text);
  } else {
    content.innerText=text;
  }

  autoScroll();
}

/* THINKING */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";

  div.innerHTML=`
    <div class="thinking">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;

  messages.appendChild(div);
  autoScroll();
  return div;
}

/* 🔥 SAME FAKE API (NOT CHANGED) */
async function askAI(text){
  const t = showThinking();

  setTimeout(()=>{
    t.remove();
    addMessage("AI response: " + text,"ai");
  },1000);
}

/* SEND */
function send(){
  const text = chatInput.value.trim();
  if(!text) return;

  addMessage(text,"user");

  chatInput.value="";
  chatInput.style.height="auto";

  askAI(text);

  chatInput.focus();
}

/* KEY */
function handleKey(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let dots=[];

for(let i=0;i<40;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dots.forEach(d=>{
    d.x+=d.vx;
    d.y+=d.vy;

    if(d.x<0||d.x>canvas.width)d.vx*=-1;
    if(d.y<0||d.y>canvas.height)d.vy*=-1;

    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.fillStyle="#10a37f";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();

</script>
</body>
</html>
