<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Login Working</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  height:100vh;
  background:#0b0f19;
  color:white;
  overflow:hidden;
}

/* SPLIT */
.container{
  display:flex;
  height:100vh;
}

/* LEFT */
.left{
  width:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

h1{
  margin-bottom:15px;
}

input{
  width:100%;
  max-width:320px;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #333;
  background:#0f172a;
  color:white;
  outline:none;
}

input:focus{
  border-color:#22c55e;
  box-shadow:0 0 10px rgba(34,197,94,0.3);
}

/* BUTTONS */
.btn{
  width:100%;
  max-width:320px;
  padding:12px;
  margin:6px 0;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.97);
}

.black{background:#000;color:white;}
.light{background:#1f2937;color:white;}
.login-btn{background:#22c55e;color:black;}

.error{
  color:red;
  font-size:13px;
  margin-top:5px;
}

/* RIGHT */
.right{
  width:50%;
  background:radial-gradient(circle at top,#1a237e,#000);
  position:relative;
}

.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage">

  <div class="left">

    <h1>Login</h1>

    <button class="btn black" onclick="fakeLogin('x')">Login with X</button>
    <button class="btn light" onclick="fakeLogin('google')">Login with Google</button>
    <button class="btn light" onclick="fakeLogin('apple')">Login with Apple</button>

    <div style="margin:10px 0;opacity:0.6">OR</div>

    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button class="btn login-btn" onclick="login()">LOGIN</button>
    <button class="btn light" onclick="signup()">SIGN UP</button>

    <div class="error" id="error"></div>

  </div>

  <div class="right"></div>

</div>

<!-- APP PAGE -->
<div class="screen" id="app">
  <h1>✅ Welcome to AI APP</h1>
  <button class="btn black" onclick="logout()">Logout</button>
</div>

<script>

function showError(msg){
  document.getElementById("error").innerText = msg;
}

/* LOGIN */
function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    showError("❌ Email and password required");
    return;
  }

  // fake success login
  showError("");

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

/* SIGNUP */
function signup(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    showError("❌ Fill all fields to sign up");
    return;
  }

  showError("📩 Account created (fake) - now login");
}

/* SOCIAL LOGIN */
function fakeLogin(type){
  alert("Login with " + type + " (demo)");
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

/* LOGOUT */
function logout(){
  location.reload();
}

</script>

</body>
</html>
