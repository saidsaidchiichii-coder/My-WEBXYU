<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ilyass AI Clone</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#000;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* NAV */
.nav{
  height:60px;
  display:flex;
  align-items:center;
  padding:0 24px;
  font-weight:700;
}

/* CHAT */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* CENTER (START SCREEN) */
.center{
  position:absolute;
  top:60px;
  bottom:80px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  transition:0.3s;
}

.title{
  font-size:48px;
  margin-bottom:30px;
}

/* INPUT (ALWAYS FIXED BOTTOM) */
.input-area{
  height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
  border-top:1px solid #111;
}

.input-box{
  width:700px;
  max-width:95%;
  height:55px;
  background:#111;
  border-radius:999px;
  display:flex;
  align-items:center;
  padding:0 14px;
}

.input-box input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:16px;
}

.send{
  width:38px;
  height:38px;
  border-radius:50%;
  background:white;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* MESSAGES */
.msg{
  max-width:70%;
  padding:12px 16px;
  border-radius:12px;
  white-space:pre-wrap;
  animation:fadeUp 0.2s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.user{
  background:#22c55e;
  color:black;
  align-self:flex-end;
}

.ai{
  background:#111827;
  color:#e5e7eb;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  color:#666;
  padding:5px;
}
</style>
</head>

<body>

<div class="nav">◆ ILYASS AI AGENT</div>

<div class="chat-box" id="messages"></div>

<!-- CENTER SCREEN -->
<div class="center" id="centerBox">
  <div class="title" id="title">ILYASS AI AGENT</div>
</div>

<!-- INPUT ALWAYS VISIBLE -->
<div class="input-area">
  <div class="input-box">
    <input id="input" placeholder="What's on your mind?" />
    <div class="send" id="sendBtn">➤</div>
  </div>
</div>

<div class="footer">
  Contact the website owner "ILYASS" for business inquiries: saidsaidchiichii@gmail.com
</div>
  
<script>
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const box = document.getElementById("messages");
const center = document.getElementById("centerBox");

let loading = false;
let started = false;

/* ENTER KEY */
input.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener("click", send);

/* ADD MESSAGE */
function addMessage(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

/* TYPING EFFECT */
function typeMessage(text){
  const div = document.createElement("div");
  div.className = "msg ai";
  box.appendChild(div);

  let i = 0;

  function typing(){
    if(i < text.length){
      div.innerText += text.charAt(i);
      i++;

      box.scrollTop = box.scrollHeight;

      setTimeout(typing, 15);
    }
  }

  typing();
}

/* LOADING */
function setLoading(state){
  loading = state;
  sendBtn.innerText = state ? "..." : "➤";
}

/* SEND MESSAGE */
async function send(){
  if(loading) return;

  const text = input.value.trim();
  if(!text) return;

  /* HIDE CENTER SMOOTHLY */
  if(!started){
    center.style.opacity = "0";
    setTimeout(()=> center.style.display="none",300);
    started = true;
  }

  addMessage(text,"user");
  input.value="";
  setLoading(true);

  try{
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    typeMessage(data.reply || "No response");

  }catch(err){
    addMessage("❌ ERROR:\n" + err.message,"ai");
  }

  setLoading(false);
}
</script>

</body>
</html>
