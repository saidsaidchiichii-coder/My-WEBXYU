<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexus AI</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white;display:flex;height:100vh}
.sidebar{width:250px;background:#111827;padding:20px}
.chat{flex:1;display:flex;flex-direction:column}
.messages{flex:1;overflow-y:auto;padding:20px}
.msg{margin:5px 0;padding:10px;border-radius:10px;max-width:70%}
.user{background:#22c55e;color:black;margin-left:auto}
.ai{background:#1f2937}
.input{display:flex;padding:10px;background:#111827}
input{flex:1;padding:10px;border:none;border-radius:8px}
button{margin-left:10px;padding:10px;background:#22c55e;border:none;cursor:pointer}
</style>

</head>

<body>

<div class="sidebar">
<h3>Nexus AI</h3>
</div>

<div class="chat">

<div class="messages" id="messages">
<div class="msg ai">Hello 👋 كيف نعاونك اليوم؟</div>
</div>

<div class="input">
<input id="input" placeholder="Type..." />
<button onclick="send()">Send</button>
</div>

</div>

<script>

function addMessage(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
}

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();
if(!text) return;

addMessage(text,"user");
input.value="";

try{

const res = await fetch("/api/chat", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ message: text })
});

// ✅ SAFE JSON handling
const data = await res.json();

if (!res.ok) {
  throw new Error(data.error || "Server error");
}

addMessage(data.reply || "No response","ai");

}catch(err){
addMessage(err.message,"ai");
}

}

</script>

</body>
</html>
