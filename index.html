<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILYASS AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

body{
  background: radial-gradient(circle at top, #1a1a1a, #0a0a0a);
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#0a0a0a;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.logo{
  font-weight:bold;
  margin-bottom:15px;
}

.newchat{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:10px;
}

.chatList{
  flex:1;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.chatItem{
  padding:10px;
  border-radius:10px;
  background:#111;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.chatItem:hover{
  background:#22c55e;
  color:black;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px;
  border-radius:12px;
  max-width:70%;
}

.user{
  margin-left:auto;
  background:#22c55e;
  color:black;
}

.ai{
  background:#1f1f1f;
}

.input{
  display:flex;
  padding:15px;
  background:#111;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat" onclick="newChat()">+ New Chat</div>
  <div class="chatList" id="chatList"></div>
</div>

<div class="chat">

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="Ask..." onkeydown="handleKey(event)">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

/* STORAGE */
let chats = JSON.parse(localStorage.getItem("chats") || "{}");
let currentChat = localStorage.getItem("currentChat");

/* INIT */
if(!currentChat){
  newChat();
}else{
  loadChat();
}

renderChats();

/* NEW CHAT */
function newChat(){
  const id = "chat_"+Date.now();
  chats[id] = [];
  currentChat = id;
  save();
  renderChats();
  loadChat();
}

/* SAVE */
function save(){
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("currentChat", currentChat);
}

/* LOAD CHAT */
function loadChat(){
  const box = document.getElementById("messages");
  box.innerHTML = "";

  (chats[currentChat] || []).forEach(m=>{
    addMessageUI(m.text, m.type);
  });
}

/* RENDER SIDEBAR */
function renderChats(){
  const list = document.getElementById("chatList");
  list.innerHTML="";

  Object.keys(chats).forEach(id=>{
    const div = document.createElement("div");
    div.className="chatItem";

    div.innerHTML = `
      <span onclick="switchChat('${id}')">${id}</span>
      <span onclick="deleteChat('${id}')">❌</span>
    `;

    list.appendChild(div);
  });
}

/* SWITCH */
function switchChat(id){
  currentChat = id;
  save();
  loadChat();
}

/* DELETE */
function deleteChat(id){
  delete chats[id];
  if(currentChat===id){
    newChat();
  }else{
    save();
    renderChats();
  }
}

/* ADD UI */
function addMessageUI(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;

  document.getElementById("messages").appendChild(div);
}

/* ADD */
function addMessage(text,type){
  chats[currentChat].push({text,type});
  save();
  addMessageUI(text,type);
}

/* KEY */
function handleKey(e){
  if(e.key==="Enter"){
    send();
  }
}

/* SEND */
async function send(){

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();
    addMessage(data.reply || "No response","ai");

  }catch{
    addMessage("Error ⚠️","ai");
  }
}

</script>

</body>
</html>
