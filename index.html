<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

body{
  background:#0f0f0f;
  color:white;
  height:100vh;
  display:flex;
}

/* 🔥 TOP LEFT AUTH BUTTONS */
.topAuth{
  position:fixed;
  top:10px;
  left:10px;
  display:flex;
  gap:8px;
  z-index:999;
}

.topAuth button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.loginBtn{
  background:#22c55e;
  color:black;
}

.signupBtn{
  background:#3b82f6;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.newchat{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:12px 14px;
  border-radius:14px;
  white-space: pre-wrap;
  word-wrap: break-word;
  position:relative;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1f1f1f;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#111;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}

/* THINKING */
.thinking{
  display:flex;
  gap:5px;
  align-items:center;
}

.dot{
  width:6px;
  height:6px;
  background:#aaa;
  border-radius:50%;
  animation:bounce 0.5s infinite ease-in-out;
}

.dot:nth-child(2){animation-delay:0.1s;}
.dot:nth-child(3){animation-delay:0.2s;}

@keyframes bounce{
  0%,100%{transform:translateY(0); opacity:0.4;}
  50%{transform:translateY(-4px); opacity:1;}
}
</style>
</head>

<body>

<!-- 🔥 TOP LEFT BUTTONS -->
<div class="topAuth">
  <button class="loginBtn" onclick="alert('Login clicked')">Login</button>
  <button class="signupBtn" onclick="alert('Sign up clicked')">Sign up</button>
</div>

<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat">+ New Chat</div>
</div>

<div class="chat">

  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 كيفاش نعاونك؟</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
    onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

let thinkingEl = null;

/* scroll */
function scrollToBottom(){
  const box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;
}

/* add message */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
  scrollToBottom();
  return div;
}

/* thinking */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`
    <div class="thinking">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;
  document.getElementById("messages").appendChild(div);
  thinkingEl = div;
  scrollToBottom();
}

function hideThinking(){
  if(thinkingEl){
    thinkingEl.remove();
    thinkingEl=null;
  }
}

/* typing */
function typeText(element, text, speed = 8){
  let i = 0;
  element.innerHTML = "";

  const interval = setInterval(() => {
    element.innerHTML += text[i];
    i++;

    scrollToBottom();

    if(i >= text.length){
      clearInterval(interval);
    }
  }, speed);
}

/* send */
async function send(){

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  showThinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    hideThinking();

    setTimeout(()=>{
      const msg = addMessage("", "ai");
      typeText(msg, data.reply || "No response", 10);
    }, 300);

  }catch{
    hideThinking();
    addMessage("Chat error","ai");
  }
}

</script>

</body>
</html>
