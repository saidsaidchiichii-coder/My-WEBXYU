<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: Inter;}

body{
  background:#0b0b0b;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:#0f0f0f;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid #1f1f1f;
}

.logo{font-weight:bold;font-size:18px;}

.newchat{
  margin-top:15px;
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

.chatList{
  margin-top:15px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chatItem{
  padding:8px;
  background:#151515;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
}

.chatItem:hover{background:#222;}

.profile{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
}

.profileInfo{font-size:12px;}

.profile button{
  margin-top:5px;
  width:100%;
  padding:5px;
  border:none;
  border-radius:6px;
  background:#ef4444;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:12px;
  border-radius:12px;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1a1a1a;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#0f0f0f;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">

  <div>
    <div class="logo">◆ ILYASS AI</div>
    <div class="newchat" onclick="newChat()">+ New Chat</div>

    <div class="chatList" id="chatList"></div>
  </div>

  <div id="profileBox" class="profile">
    <div class="avatar" id="avatar">U</div>
    <div class="profileInfo">
      <div id="profileName">User</div>
      <div id="profileEmail" style="opacity:.6"></div>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
      onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

const SUPABASE_URL = "https://idjgsgtupuymysptxrbl.supabase.co";
const SUPABASE_KEY = "sb_publishable_XLIIiXZRcS5hrvdQP_pkMA_w2I11xFH";

let currentChatId = null;

/* USER LOAD */
window.onload = () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if(user){
    document.getElementById("profileEmail").innerText = user.email;
    document.getElementById("avatar").innerText = user.email[0].toUpperCase();
    loadChats();
  }
};

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* CHAT STORAGE */
function getUserKey(){
  const user = JSON.parse(localStorage.getItem("user"));
  return "chats_" + user.email;
}

function loadChats(){
  const chats = JSON.parse(localStorage.getItem(getUserKey())) || [];
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach(c=>{
    const div = document.createElement("div");
    div.className="chatItem";
    div.innerText=c.title;
    div.onclick=()=>openChat(c.id);
    list.appendChild(div);
  });
}

/* NEW CHAT */
function newChat(){
  currentChatId = Date.now();

  const chats = JSON.parse(localStorage.getItem(getUserKey())) || [];

  chats.push({
    id: currentChatId,
    title:"New chat",
    messages:[]
  });

  localStorage.setItem(getUserKey(), JSON.stringify(chats));
  loadChats();

  document.getElementById("messages").innerHTML="";
}

/* OPEN CHAT */
function openChat(id){
  currentChatId = id;

  const chats = JSON.parse(localStorage.getItem(getUserKey())) || [];
  const chat = chats.find(c=>c.id===id);

  const box = document.getElementById("messages");
  box.innerHTML="";

  chat.messages.forEach(m=>{
    addMessage(m.text, m.type);
  });
}

/* SAVE MESSAGE */
function saveMessage(text,type){

  const chats = JSON.parse(localStorage.getItem(getUserKey())) || [];
  const chat = chats.find(c=>c.id===currentChatId);

  chat.messages.push({text,type});

  /* TITLE = FIRST MESSAGE */
  if(chat.messages.length === 1){
    chat.title = text.slice(0,20);
  }

  localStorage.setItem(getUserKey(), JSON.stringify(chats));
  loadChats();
}

/* UI */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
}

/* SEND */
async function send(){

  if(!currentChatId){
    newChat();
  }

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  saveMessage(text,"user");

  input.value="";

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    addMessage(data.reply || "AI response","ai");
    saveMessage(data.reply || "AI response","ai");

  }catch{
    addMessage("⚠️ Error","ai");
  }
}

</script>

</body>
</html>
