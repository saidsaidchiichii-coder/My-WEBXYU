<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILYASS AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- NAVIGATION -->
    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-container" onclick="location.reload()">
                <svg class="grok-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
                    <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
                    <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
                    <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
                    <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
                    <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
                </svg>
            </div>
        </div>
        
        <div class="nav-right">
            <button class="nav-btn">
                <i data-lucide="sparkles"></i>
                <span>Imagine</span>
            </button>
            
            <!-- Auth Buttons -->
            <div id="authButtons">
                <button class="btn-signin" onclick="openAuth('login')">Sign in</button>
                <button class="btn-signup" onclick="openAuth('signup')">Sign up</button>
            </div>

            <!-- User Profile Button (Hidden by default) -->
            <div id="userProfileBtn" class="hidden" onclick="showDashboard()">
                <div class="user-avatar">U</div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- HOME VIEW -->
        <section id="home" class="home-view">
            <div class="hero-section">
                <div class="hero-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
                        <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
                        <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
                        <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
                        <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
                        <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
                    </svg>
                    <h1>ILYASS AI</h1>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <div class="input-area">
                        <button class="input-icon">
                            <i data-lucide="paperclip"></i>
                        </button>
                        <textarea id="homeInput" placeholder="How can I help you today?" rows="1" oninput="autoResize(this)" onkeydown="handleKeydown(event, 'home')"></textarea>
                        <div class="input-controls">
                            <div class="mode-selector">
                                <span>Auto</span>
                                <i data-lucide="chevron-down"></i>
                            </div>
                            <button class="control-btn">
                                <i data-lucide="mic"></i>
                            </button>
                            <button class="control-btn send-btn" onclick="startChat()">
                                <i data-lucide="arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="search-hint">
                    <i data-lucide="sparkles"></i>
                    <span>New · Hold Ctrl+D to dictate</span>
                </div>
            </div>
        </section>

        <!-- CHAT VIEW -->
        <section id="chat" class="chat-view hidden">
            <div id="messages" class="messages-list"></div>

            <div class="chat-input-container">
                <div class="search-box">
                    <div class="input-area">
                        <button class="input-icon">
                            <i data-lucide="paperclip"></i>
                        </button>
                        <textarea id="chatInput" placeholder="Send a message..." rows="1" oninput="autoResize(this)" onkeydown="handleKeydown(event, 'chat')"></textarea>
                        <div class="input-controls">
                            <div class="mode-selector">
                                <span>Auto</span>
                                <i data-lucide="chevron-down"></i>
                            </div>
                            <button class="control-btn">
                                <i data-lucide="mic"></i>
                            </button>
                            <button class="control-btn send-btn" onclick="send()">
                                <i data-lucide="arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- DASHBOARD VIEW -->
        <section id="dashboard" class="dashboard-view hidden">
            <div class="dashboard-container">
                <div class="profile-header">
                    <div class="avatar-container">
                        <div id="dashAvatar" class="user-avatar">U</div>
                        <div class="avatar-edit"><i data-lucide="camera"></i></div>
                    </div>
                    <div class="profile-info">
                        <h3 id="dashUsername">User Name</h3>
                        <p id="dashEmail">user@example.com</p>
                    </div>
                </div>

                <div class="settings-grid">
                    <div class="settings-item">
                        <label>Username</label>
                        <input type="text" id="editUsername" class="settings-input">
                    </div>
                    <div class="settings-item">
                        <label>Email</label>
                        <input type="email" id="editEmail" class="settings-input">
                    </div>
                    <div class="settings-item">
                        <label>New Password</label>
                        <input type="password" id="editPassword" class="settings-input" placeholder="Leave blank to keep current">
                    </div>
                </div>

                <div class="dashboard-actions">
                    <button class="btn-save" onclick="saveProfile()">Save Changes</button>
                    <button class="btn-logout" onclick="AI.logout()">Log out</button>
                </div>
                
                <button class="nav-btn" style="margin-top: 20px; width: 100%; justify-content: center;" onclick="hideDashboard()">
                    <i data-lucide="arrow-left"></i> Back to Chat
                </button>
            </div>
        </section>
    </main>

    <!-- AUTH MODAL -->
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-modal">
            <button class="auth-close" onclick="closeAuth()"><i data-lucide="x"></i></button>
            <h2 id="authTitle">Welcome back</h2>
            
            <div class="auth-form">
                <div id="usernameGroup" class="input-group hidden">
                    <label>Username</label>
                    <input type="text" id="authUsername" class="auth-input" placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label>Email address</label>
                    <input type="email" id="authEmail" class="auth-input" placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="authPassword" class="auth-input" placeholder="Enter your password">
                </div>
                
                <div id="agreeGroup" class="checkbox-group hidden">
                    <input type="checkbox" id="authAgree">
                    <label for="authAgree">I agree to the terms and conditions</label>
                </div>

                <button class="auth-submit" onclick="submitAuth()">Continue</button>
            </div>

            <div class="auth-switch">
                <span id="switchText">Don't have an account?</span>
                <span id="switchAction" onclick="toggleAuthMode()">Sign up</span>
            </div>
        </div>
    </div>

    <script src="ControleAi.js"></script>
    <script>
        lucide.createIcons();
        AI.init("messages", "https://my-webxyu.vercel.app/api/chat");

        const homeView = document.getElementById("home");
        const chatView = document.getElementById("chat");
        const dashboardView = document.getElementById("dashboard");
        const authOverlay = document.getElementById("authOverlay");
        
        let currentAuthMode = 'login';

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        function handleKeydown(event, type) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                if (type === 'home') startChat();
                else send();
            }
        }

        function startChat() {
            const input = document.getElementById("homeInput");
            const text = input.value.trim();
            if (!text) return;
            
            if (!AI.currentUser) {
                openAuth('login');
                return;
            }

            homeView.classList.add("hidden");
            chatView.classList.remove("hidden");
            dashboardView.classList.add("hidden");
            AI.user(text);
            input.value = "";
            input.style.height = 'auto';
            AI.ask(text);
        }

        function send() {
            const input = document.getElementById("chatInput");
            const text = input.value.trim();
            if (!text) return;
            AI.user(text);
            input.value = "";
            input.style.height = 'auto';
            AI.ask(text);
        }

        // Auth UI Functions
        function openAuth(mode) {
            currentAuthMode = mode;
            authOverlay.style.display = 'flex';
            updateAuthUI();
        }

        function closeAuth() {
            authOverlay.style.display = 'none';
        }

        function toggleAuthMode() {
            currentAuthMode = currentAuthMode === 'login' ? 'signup' : 'login';
            updateAuthUI();
        }

        function updateAuthUI() {
            const title = document.getElementById("authTitle");
            const usernameGroup = document.getElementById("usernameGroup");
            const agreeGroup = document.getElementById("agreeGroup");
            const switchText = document.getElementById("switchText");
            const switchAction = document.getElementById("switchAction");

            if (currentAuthMode === 'login') {
                title.innerText = "Welcome back";
                usernameGroup.classList.add("hidden");
                agreeGroup.classList.add("hidden");
                switchText.innerText = "Don't have an account?";
                switchAction.innerText = "Sign up";
            } else {
                title.innerText = "Create your account";
                usernameGroup.classList.remove("hidden");
                agreeGroup.classList.remove("hidden");
                switchText.innerText = "Already have an account?";
                switchAction.innerText = "Log in";
            }
        }

        async function submitAuth() {
            const email = document.getElementById("authEmail").value;
            const password = document.getElementById("authPassword").value;
            
            if (currentAuthMode === 'login') {
                const res = await AI.login(email, password);
                if (res.success) {
                    closeAuth();
                } else {
                    alert(res.error);
                }
            } else {
                const username = document.getElementById("authUsername").value;
                const agree = document.getElementById("authAgree").checked;
                
                if (!agree) {
                    alert("Please agree to the terms");
                    return;
                }
                
                const res = await AI.signup(username, email, password);
                if (res.success) {
                    closeAuth();
                } else {
                    alert(res.error);
                }
            }
        }

        // Dashboard UI Functions
        function showDashboard() {
            if (!AI.currentUser) return;
            
            homeView.classList.add("hidden");
            chatView.classList.add("hidden");
            dashboardView.classList.remove("hidden");
            
            // Fill data
            document.getElementById("dashUsername").innerText = AI.currentUser.username;
            document.getElementById("dashEmail").innerText = AI.currentUser.email;
            document.getElementById("dashAvatar").innerText = AI.currentUser.username[0].toUpperCase();
            
            document.getElementById("editUsername").value = AI.currentUser.username;
            document.getElementById("editEmail").value = AI.currentUser.email;
            document.getElementById("editPassword").value = "";
        }

        function hideDashboard() {
            dashboardView.classList.add("hidden");
            if (document.getElementById("messages").children.length > 0) {
                chatView.classList.remove("hidden");
            } else {
                homeView.classList.remove("hidden");
            }
        }

        function saveProfile() {
            const username = document.getElementById("editUsername").value;
            const email = document.getElementById("editEmail").value;
            const password = document.getElementById("editPassword").value;
            
            AI.saveProfile({ username, email });
            showDashboard(); // Refresh UI
        }
    </script>
</body>
</html>
