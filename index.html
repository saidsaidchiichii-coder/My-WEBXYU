<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

body{
  background:#0f0f0f;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.logo{
  font-size:18px;
  font-weight:bold;
  color:#fff;
}

.newchat{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  transition:0.2s;
}

.newchat:hover{
  transform:scale(1.05);
  background:#222;
}

/* CHAT AREA */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* MESSAGES */
.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE BUBBLES */
.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:14px;
  white-space:pre-wrap;
  animation:fade 0.2s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1f1f1f;
  color:#e5e5e5;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#111;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

button:disabled{
  opacity:0.6;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat">+ New Chat</div>
</div>

<!-- CHAT -->
<div class="chat">

  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 كيفاش نعاونك؟</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
    onkeydown="if(event.key==='Enter') send()" />
    <button id="btn" onclick="send()">Send</button>
  </div>

</div>

<script>

function addMessage(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  const box = document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function setLoading(state){
  const btn = document.getElementById("btn");
  btn.disabled = state;
  btn.innerText = state ? "..." : "Send";
}

/* 🔥 YOUR ORIGINAL LOGIC (UNCHANGED) */
async function send(){

  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  setLoading(true);

  try{

    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ message:text })
    });

    const data = await res.json();

    addMessage(data.reply || "No response","ai");

  }catch(err){
    addMessage("❌ ERROR:\n" + err.message,"ai");
  }

  setLoading(false);
}

</script>

</body>
</html>
