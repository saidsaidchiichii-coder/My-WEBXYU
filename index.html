<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:#f7f7f8;
  color:#111;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#ffffff;
  border-right:1px solid #e5e5e5;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.logo{font-weight:bold;font-size:18px;}

.newchat{
  margin-top:15px;
  padding:12px;
  background:#111;
  color:white;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.recents{
  margin-top:15px;
  font-size:12px;
  opacity:.6;
}

.chatList{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  max-height:400px;
  overflow-y:auto;
}

.chatItem{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#f1f1f1;
  border-radius:10px;
  cursor:pointer;
}

.chatItem:hover{background:#e9e9e9;}

.menuBtn{cursor:pointer;}

.profile{
  background:#f1f1f1;
  padding:10px;
  border-radius:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#111;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.profile button{
  margin-top:5px;
  width:100%;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CENTER FIRST VIEW */
.centerBox{
  margin-top:120px;
  text-align:center;
}

.centerBox h1{
  font-size:28px;
  margin-bottom:20px;
}

/* MESSAGES */
.messages{
  width:100%;
  max-width:800px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.msg{
  padding:14px;
  border-radius:12px;
  font-size:14px;
  max-width:70%;
}

.user{
  align-self:flex-end;
  background:#111;
  color:white;
}

.ai{
  align-self:flex-start;
  background:#ffffff;
  border:1px solid #eee;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:10px;
  font-size:12px;
  opacity:.6;
  margin-top:5px;
}

/* INPUT */
.input{
  width:100%;
  max-width:800px;
  display:flex;
  padding:15px;
}

.inputBox{
  flex:1;
  display:flex;
  align-items:center;
  background:white;
  border:1px solid #ddd;
  border-radius:30px;
  padding:10px 15px;
}

input{
  flex:1;
  border:none;
  outline:none;
  font-size:14px;
}

.sendIcon{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#111;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* THINKING */
.thinking{
  display:flex;
  gap:5px;
}
.dot{
  width:6px;
  height:6px;
  background:#999;
  border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="logo">◆ ILYASS AI</div>

    <div class="newchat" onclick="newChat()">+ New Chat</div>

    <div class="recents">Recents</div>
    <div id="chatList" class="chatList"></div>
  </div>

  <div class="profile">
    <div class="avatar" onclick="uploadPhoto()">
      <img id="avatarImg" style="display:none;width:100%;height:100%;border-radius:50%;">
      <span id="avatarText">U</span>
    </div>

    <div>
      <div id="profileName">User</div>
      <div id="profileEmail" style="font-size:12px;opacity:.6"></div>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <input type="file" id="fileInput" hidden onchange="handlePhoto(event)">
</div>

<div class="chat">

  <div class="centerBox" id="centerBox">
    <h1>How can I help you?</h1>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <div class="inputBox">
      <input id="input" placeholder="Ask anything..."
        onkeydown="if(event.key==='Enter') send()">
      <div class="sendIcon" onclick="send()">↑</div>
    </div>
  </div>

</div>

<script>
let currentChatId=null;

/* USER LOAD */
window.onload=()=>{
  const user=JSON.parse(localStorage.getItem("user"));
  if(user){
    document.getElementById("profileEmail").innerText=user.email;
    document.getElementById("avatarText").innerText=user.email[0].toUpperCase();
    loadChats();
  }
};

/* STORAGE */
function getUserKey(){
  const user=JSON.parse(localStorage.getItem("user"));
  return "chats_"+user.email;
}

/* LOAD CHATS */
function loadChats(){
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const list=document.getElementById("chatList");
  list.innerHTML="";

  chats.forEach(c=>{
    const div=document.createElement("div");
    div.className="chatItem";
    div.innerHTML=`
      <span onclick="openChat(${c.id})">${c.title}</span>
      <span class="menuBtn" onclick="deleteChat(${c.id})">⋯</span>
    `;
    list.appendChild(div);
  });
}

/* NEW CHAT */
function newChat(){
  currentChatId=Date.now();
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];

  chats.push({id:currentChatId,title:"New chat",messages:[]});
  localStorage.setItem(getUserKey(),JSON.stringify(chats));

  document.getElementById("messages").innerHTML="";
  document.getElementById("centerBox").style.display="block";

  loadChats();
}

/* OPEN */
function openChat(id){
  currentChatId=id;
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===id);

  const box=document.getElementById("messages");
  box.innerHTML="";
  document.getElementById("centerBox").style.display="none";

  chat.messages.forEach(m=>addMessage(m.text,m.type));
}

/* SAVE */
function saveMessage(text,type){
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===currentChatId);

  chat.messages.push({text,type});

  if(chat.messages.length===1){
    chat.title=text.slice(0,25);
  }

  localStorage.setItem(getUserKey(),JSON.stringify(chats));
  loadChats();
}

/* MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;

  div.innerHTML=`
    ${text}
    ${type==="ai" ? `<div class="actions">↻ Copy 👍 👎</div>` : ""}
  `;

  document.getElementById("messages").appendChild(div);
}

/* THINKING */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  div.id="thinking";
  document.getElementById("messages").appendChild(div);
}

function hideThinking(){
  const t=document.getElementById("thinking");
  if(t) t.remove();
}

/* SEND */
async function send(){
  if(!currentChatId) newChat();

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  document.getElementById("centerBox").style.display="none";

  addMessage(text,"user");
  saveMessage(text,"user");
  input.value="";

  showThinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    hideThinking();
    addMessage(data.reply || "AI","ai");
    saveMessage(data.reply || "AI","ai");

  }catch{
    hideThinking();
    addMessage("Error","ai");
  }
}

/* DELETE */
function deleteChat(id){
  let chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  chats=chats.filter(c=>c.id!==id);
  localStorage.setItem(getUserKey(),JSON.stringify(chats));
  loadChats();
}

/* PHOTO */
function uploadPhoto(){
  document.getElementById("fileInput").click();
}

function handlePhoto(e){
  const file=e.target.files[0];
  const reader=new FileReader();

  reader.onload=()=>{
    document.getElementById("avatarImg").src=reader.result;
    document.getElementById("avatarImg").style.display="block";
    document.getElementById("avatarText").style.display="none";
  };

  reader.readAsDataURL(file);
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}
</script>

</body>
</html>
