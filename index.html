<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI AUTH SYSTEM</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  height:100vh;
  background:#0b0f19;
  color:white;
  overflow:hidden;
}

/* SPLIT */
.container{
  display:flex;
  height:100vh;
}

/* LEFT */
.left{
  width:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

/* RIGHT VISUAL */
.right{
  width:50%;
  background:radial-gradient(circle at top,#1a237e,#000);
  position:relative;
}

/* TITLE */
h1{
  margin-bottom:15px;
}

/* INPUT */
input{
  width:100%;
  max-width:320px;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #333;
  background:#0f172a;
  color:white;
  outline:none;
}

input:focus{
  border-color:#22c55e;
  box-shadow:0 0 10px rgba(34,197,94,0.3);
}

/* BUTTONS */
.btn{
  width:100%;
  max-width:320px;
  padding:12px;
  margin:6px 0;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.97);
}

.black{background:#000;color:white;}
.green{background:#22c55e;color:black;}
.google{background:#fff;color:black;}

/* FORM 2 SWITCH */
.switch{
  margin-top:10px;
  font-size:13px;
  opacity:0.7;
  cursor:pointer;
}

.error{
  color:red;
  font-size:13px;
  margin-top:5px;
}

/* APP */
.app{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage">

  <div class="left">

    <h1>Login</h1>

    <!-- SOCIAL LOGIN -->
    <button class="btn black" onclick="loginWithGoogle()">
      Login with Google
    </button>

    <div style="margin:10px 0;opacity:0.5">OR</div>

    <!-- FORM 2 -->
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button class="btn green" onclick="loginEmail()">
      LOGIN
    </button>

    <button class="btn black" onclick="signupEmail()">
      SIGN UP
    </button>

    <div class="switch" onclick="alert('Forgot password flow (add later)')">
      Forgot password?
    </div>

    <div class="error" id="error"></div>

  </div>

  <div class="right"></div>

</div>

<!-- APP PAGE -->
<div class="app" id="app">
  <h1>✅ Logged in successfully</h1>
  <button class="btn black" onclick="logout()">Logout</button>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const client = supabase.createClient(
  "https://ypqkmuflothekoaxwupn.supabase.co",
  "sb_publishable_c_HDHKad3Sjgz5Ho47gwWg_63AAuQY8"
);

/* ERROR */
function showError(msg){
  document.getElementById("error").innerText = msg;
}

/* ================= GOOGLE LOGIN ================= */
async function loginWithGoogle(){
  const { error } = await client.auth.signInWithOAuth({
    provider: 'google',
    options:{
      redirectTo: window.location.origin
    }
  });

  if(error){
    showError(error.message);
  }
}

/* ================= EMAIL LOGIN ================= */
async function loginEmail(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    showError("Fill all fields");
    return;
  }

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password: pass
  });

  if(error){
    showError(error.message);
    return;
  }

  goApp();
}

/* ================= SIGNUP ================= */
async function signupEmail(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    showError("Fill all fields");
    return;
  }

  const { error } = await client.auth.signUp({
    email,
    password: pass
  });

  if(error){
    showError(error.message);
    return;
  }

  alert("📩 Check email to confirm account");
}

/* ================= APP ================= */
function goApp(){
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

/* ================= LOGOUT ================= */
function logout(){
  location.reload();
}

</script>

</body>
</html>
