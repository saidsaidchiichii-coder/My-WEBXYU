<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Fitness App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Inter,sans-serif;
background:linear-gradient(135deg,#0f5132,#20c997);
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.box{
width:90%;
max-width:600px;
background:rgba(0,0,0,0.3);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
}

textarea,input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00ff9c;
font-weight:bold;
margin-top:5px;
}

.result{
margin-top:10px;
white-space:pre-wrap;
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="box">

<h2>🤖 AI Fitness App</h2>

<!-- CHAT -->
<textarea id="chatInput" placeholder="Ask anything..."></textarea>
<button onclick="sendChat()">Send</button>
<div class="result" id="chatResult"></div>

<hr>

<!-- WORKOUT -->
<h3>💪 Workout Generator</h3>
<input id="goal" placeholder="Goal (muscle, fat loss...)">
<select id="level">
<option value="beginner">Beginner</option>
<option value="intermediate">Intermediate</option>
<option value="advanced">Advanced</option>
</select>
<button onclick="generateWorkout()">Generate</button>
<div class="result" id="workoutResult"></div>

<hr>

<!-- MEAL -->
<h3>🍎 Meal Plan</h3>
<input id="calories" placeholder="Calories (e.g. 2500)">
<select id="diet">
<option value="balanced">Balanced</option>
<option value="keto">Keto</option>
<option value="vegetarian">Vegetarian</option>
<option value="high protein">High Protein</option>
</select>
<button onclick="generateMeal()">Generate</button>
<div class="result" id="mealResult"></div>

</div>

<script>

const OPENAI_API_KEY = "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"; // 🔥 بدّل هنا فقط

async function callOpenAI(prompt){

const res = await fetch("https://api.openai.com/v1/chat/completions", {
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${OPENAI_API_KEY}`
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"You are a helpful fitness assistant."},
{role:"user",content:prompt}
],
temperature:0.7
})
});

const data = await res.json();

return data.choices?.[0]?.message?.content || "Error";
}

// CHAT
async function sendChat(){
let input = document.getElementById("chatInput").value;
document.getElementById("chatResult").innerText = "Loading...";
let res = await callOpenAI(input);
document.getElementById("chatResult").innerText = res;
}

// WORKOUT
async function generateWorkout(){
let goal = document.getElementById("goal").value;
let level = document.getElementById("level").value;

let prompt = `Create workout plan for goal ${goal}, level ${level}`;
document.getElementById("workoutResult").innerText = "Loading...";

let res = await callOpenAI(prompt);
document.getElementById("workoutResult").innerText = res;
}

// MEAL
async function generateMeal(){
let calories = document.getElementById("calories").value;
let diet = document.getElementById("diet").value;

let prompt = `Create meal plan for ${calories} calories, diet ${diet}`;
document.getElementById("mealResult").innerText = "Loading...";

let res = await callOpenAI(prompt);
document.getElementById("mealResult").innerText = res;
}

</script>

</body>
</html>
