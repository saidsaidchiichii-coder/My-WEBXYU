<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:linear-gradient(135deg,#ffffff,#f3f4f6);
  height:100vh;
  display:flex;
  flex-direction:column;
  animation:fadeIn .6s ease;
  overflow:hidden;
}

/* 3D ENTRY */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(30px) scale(.98);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* PARTICLES */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{font-weight:bold;}

.auth{display:flex;gap:10px;}

.btn{
  padding:8px 16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
}

.login{background:#eee;}
.signup{background:#111;color:white;}

/* HOME */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
}

.title{
  font-size:40px;
  font-weight:bold;
}

.inputBox{
  width:600px;
  max-width:90%;
  background:white;
  border-radius:999px;
  padding:12px 15px;
  display:flex;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.inputBox input{
  flex:1;
  border:none;
  outline:none;
}

.send{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#10a37f;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  display:none;
  flex:1;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:65%;
  padding:12px;
  border-radius:12px;
  position:relative;
}

.user{
  align-self:flex-end;
  background:#10a37f;
  color:white;
}

.ai{
  align-self:flex-start;
  background:white;
  border:1px solid #eee;
}

.actions{
  font-size:11px;
  margin-top:5px;
  opacity:.5;
  display:flex;
  gap:10px;
}

.actions span{
  cursor:pointer;
}

/* THINKING */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#999;border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* INPUT CHAT */
.bottom{
  padding:15px;
  border-top:1px solid #eee;
  display:flex;
}

.bottom textarea{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  resize:none;
}

/* LOGIN MODAL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.loginBox{
  background:#111;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

.loginBox input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.loginBox button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- LOGIN -->
<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign up</button>
  </div>
</div>

<div class="top">
  <div class="logo">ILYASS AI</div>

  <div class="auth">
    <button class="btn login" onclick="openLogin()">Login</button>
    <button class="btn signup" onclick="openLogin()">Sign up</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="center">
  <div class="title"> Ask Anything?? </div>

  <div class="inputBox">
    <input id="homeInput" placeholder="so What do you want to know ?"
      onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput" rows="1" placeholder="Send a message..."
      onkeydown="handleKey(event)"></textarea>
  </div>
</div>

<script>

/* OPEN LOGIN */
function openLogin(){
  document.getElementById("loginOverlay").style.display="flex";
}

/* SUPABASE */
const { createClient } = supabase;
const supabaseClient = createClient(
  "https://idjgsgtupuymysptxrbl.supabase.co",
  "sb_publishable_XLIIiXZRcS5hrvdQP_pkMA_w2I11xFH"
);

let loggedIn=false;

/* LOGIN */
async function login(){
  const email=emailInput.value;
  const password=passwordInput.value;

  const {error}=await supabaseClient.auth.signInWithPassword({email,password});
  if(error){alert(error.message);return;}

  loggedIn=true;
  loginOverlay.style.display="none";
}

/* SIGNUP */
async function signup(){
  const email=emailInput.value;
  const password=passwordInput.value;

  const {error}=await supabaseClient.auth.signUp({email,password});
  if(error){alert(error.message);return;}

  alert("Check email 📩");
}

/* SHIFT ENTER */
function handleKey(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
}

/* SAME LOGIC (UNCHANGED) */
function startChat(){
  if(!loggedIn){alert("Login first");return;}

  const text=homeInput.value.trim();
  if(!text)return;

  home.style.display="none";
  chat.style.display="flex";

  addMessage(text,"user");
  homeInput.value="";
  askAI(text);
}

function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.dataset.text=text;

  const content=document.createElement("div");
  div.appendChild(content);

  messages.appendChild(div);
  typeText(content,text);

  if(type==="ai"){
    const actions=document.createElement("div");
    actions.className="actions";
    actions.innerHTML=`
      <span onclick="copyText(this)">Copy</span>
      <span onclick="retry(this)">Retry</span>
    `;
    div.appendChild(actions);
  }

  scrollBottom();
}

function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length)clearInterval(int);
  },15);
}

function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  messages.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom(){
  messages.scrollTop=messages.scrollHeight;
}

async function askAI(text){
  const t=showThinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();
    t.remove();
    addMessage(data.reply || "No response","ai");

  }catch{
    t.remove();
    addMessage("⚠️ Error","ai");
  }
}

function send(){
  if(!loggedIn){alert("Login first");return;}

  const text=chatInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  chatInput.value="";
  askAI(text);
}

function copyText(el){
  const msg=el.closest(".msg");
  navigator.clipboard.writeText(msg.dataset.text);
}

function retry(el){
  let prev=el.closest(".msg").previousElementSibling;
  while(prev && !prev.classList.contains("user")){
    prev=prev.previousElementSibling;
  }
  if(prev){askAI(prev.dataset.text);}
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let dots=[];
for(let i=0;i<50;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  dots.forEach(d=>{
    d.x+=d.vx;
    d.y+=d.vy;

    if(d.x<0||d.x>canvas.width)d.vx*=-1;
    if(d.y<0||d.y>canvas.height)d.vy*=-1;

    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.fillStyle="#10a37f";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
