<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

/* ===== ADD ONLY (NO CHANGE) ===== */

/* layout fix */
body{
    display:flex;
    overflow-x:hidden;
}

/* SIDEBAR IMPROVED */
.sidebar{
    width:220px;
    background:#0b0b0b;
    border-right:1px solid #1f1f1f;
    height:100vh;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:16px;
    transition:.3s;
    z-index:3;
}

.sidebar.hiddenSide{
    width:60px;
}

.sidebar.hiddenSide .text{
    display:none;
}

/* toggle icon */
.toggle-btn{
    cursor:pointer;
}

/* sidebar buttons */
.side-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:#111;
    border:1px solid #2a2a2a;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.side-btn:hover{
    background:#1a1a1a;
}

/* CHAT CENTER FIX */
.chat-view{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* MESSAGES FIX */
.messages-list{
    width:100%;
    max-width:900px;
    margin:auto;
    padding:40px 20px;
    animation:fadeIn .4s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* MESSAGE WRAP */
.msg-wrapper{
    max-width:100%;
    word-break:break-word;
}

/* CODE BLOCK FIX */
pre, code{
    max-width:100%;
    overflow:auto;
    background:#111;
    padding:16px;
    border-radius:12px;
    border:1px solid #2a2a2a;
}

/* INPUT FIX */
.chat-input-container{
    width:100%;
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* TOP NAV GLASS */
.top-nav{
    position:sticky;
    top:0;
    z-index:5;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.6);
}

/* HERO ANIMATION */
.hero-logo{
    animation: float 4s ease-in-out infinite;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* FIRST MESSAGE 3D */
.chat-view.active3d{
    transform: perspective(1000px) rotateX(6deg) scale(.98);
    transition:.6s;
}

/* KEEP ORIGINAL */
#tsparticles{position:fixed;inset:0;z-index:0;}
.search-box{backdrop-filter:blur(20px);background:rgba(20,20,20,0.6);border:1px solid rgba(255,255,255,0.08);}
.search-box:focus-within{box-shadow:0 0 20px rgba(255,255,255,0.1);}
.hero-logo h1{letter-spacing:-2px;}
.send-btn{box-shadow:0 0 10px rgba(255,255,255,0.2);}

</style>
</head>

<body>

<!-- SIDEBAR (ADDED ONLY) -->
<div class="sidebar" id="sidebar">

    <div class="toggle-btn" onclick="toggleSidebar()">
        <i data-lucide="panel-left"></i>
    </div>

    <div class="side-btn" onclick="location.reload()">
        <i data-lucide="plus"></i>
        <span class="text">New Chat</span>
    </div>

    <div class="side-btn" id="loginSide">
        <i data-lucide="log-in"></i>
        <span class="text">Log in</span>
    </div>

    <div class="side-btn">
        <i data-lucide="help-circle"></i>
        <span class="text">Help</span>
    </div>

    <div class="side-btn">
        <i data-lucide="layout-grid"></i>
        <span class="text">Apps</span>
    </div>

    <div class="side-btn">
        <i data-lucide="credit-card"></i>
        <span class="text">Pricing</span>
    </div>

</div>

<div id="tsparticles"></div>

<div class="container">

<!-- ⚠️ KEEP YOUR ORIGINAL HEADER / MAIN / CHAT EXACTLY -->
<!-- ⚠️ ما تبدل حتى سطر من الكود ديالك -->

<!-- هنا حط نفس الكود ديالك بلا حتى تغيير -->

</div>

<script src="ControleAi.js"></script>

<script>

/* KEEP ORIGINAL */
lucide.createIcons();
AI.init("messages", "https://my-webxyu.vercel.app/api/chat");

/* SIDEBAR TOGGLE */
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("hiddenSide");
}

/* FIRST MESSAGE 3D + AUTO HIDE */
let firstMessage = true;

const oldStartChat = startChat;
startChat = function(){
    if(firstMessage){
        document.getElementById("chat").classList.add("active3d");
        setTimeout(()=>document.getElementById("chat").classList.remove("active3d"),800);
        document.getElementById("sidebar").classList.add("hiddenSide");
        firstMessage=false;
    }
    oldStartChat();
};

</script>

</body>
</html>
