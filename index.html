<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILYASS AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial;}
body{background:#0a0a0a;color:white;height:100vh;display:flex;}

/* SIDEBAR */
.sidebar{
  width:260px;background:#111;padding:15px;
  display:flex;flex-direction:column;gap:10px;
  border-right:1px solid #222;
}

.chatItem{
  padding:10px;
  border-radius:10px;
  background:#1a1a1a;
  cursor:pointer;
}
.chatItem.active{background:#22c55e;color:black}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;}

.messages{
  flex:1;padding:20px;overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
}

.msg{max-width:65%;padding:12px;border-radius:14px;}
.user{margin-left:auto;background:#22c55e;color:black;}
.ai{background:#1f1f1f;}

.input{display:flex;padding:10px;background:#111;}
input{flex:1;padding:12px;border-radius:10px;border:none;background:#1a1a1a;color:white;}
button{margin-left:10px;padding:10px;border:none;border-radius:10px;background:#22c55e;}

/* SUGGESTIONS */
.suggestions{
  display:flex;
  gap:10px;
  padding:10px;
}
.suggestions div{
  padding:8px 12px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <div onclick="newChat()">+ New Chat</div>
  <div id="chatList"></div>
</div>

<div class="chat">

  <div class="suggestions">
    <div onclick="quick('Write a C++ code')">💻 Code</div>
    <div onclick="quick('Translate to French')">🌍 Translate</div>
    <div onclick="quick('Explain simply')">🧠 Explain</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" onkeydown="handleKey(event)" placeholder="Ask..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

/* CHAT STORAGE */
let chats = JSON.parse(localStorage.getItem("chats")||"{}");
let currentChat = null;

/* NEW CHAT */
function newChat(){
  const id = Date.now();
  chats[id] = [];
  currentChat = id;
  saveChats();
  renderChats();
  renderMessages();
}

/* SAVE */
function saveChats(){
  localStorage.setItem("chats", JSON.stringify(chats));
}

/* RENDER SIDEBAR */
function renderChats(){
  const list=document.getElementById("chatList");
  list.innerHTML="";
  for(let id in chats){
    const div=document.createElement("div");
    div.className="chatItem "+(id==currentChat?"active":"");
    div.innerText="Chat "+id;
    div.onclick=()=>{
      currentChat=id;
      renderChats();
      renderMessages();
    };
    list.appendChild(div);
  }
}

/* RENDER MESSAGES */
function renderMessages(){
  const box=document.getElementById("messages");
  box.innerHTML="";
  if(!currentChat) return;

  chats[currentChat].forEach(m=>{
    addMessageUI(m.text,m.type,false);
  });
}

/* ADD MESSAGE */
function addMessage(text,type){
  chats[currentChat].push({text,type});
  saveChats();
  addMessageUI(text,type,true);
}

function addMessageUI(text,type,scroll=true){
  const div=document.createElement("div");
  div.className="msg "+type;

  // CODE DETECT
  if(text.includes("```")){
    div.innerHTML="<pre>"+text+"</pre>";
  }else{
    div.innerText=text;
  }

  document.getElementById("messages").appendChild(div);
  if(scroll) document.getElementById("messages").scrollTop=999999;
}

/* QUICK PROMPT */
function quick(t){
  document.getElementById("input").value=t;
}

/* KEY */
function handleKey(e){
  if(e.key==="Enter"){send();}
}

/* SEND */
async function send(){
  if(!currentChat) newChat();

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();
    addMessage(data.reply,"ai");

  }catch{
    addMessage("Error","ai");
  }
}

/* INIT */
newChat();
renderChats();

</script>

</body>
</html>
