<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:linear-gradient(135deg,#0b0b0b,#0f172a);
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:rgba(20,20,20,0.7);
  backdrop-filter:blur(12px);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid rgba(255,255,255,0.05);
}

.logo{
  font-weight:bold;
  font-size:18px;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  -webkit-background-clip:text;
  color:transparent;
}

/* NEW CHAT */
.newchat{
  margin-top:15px;
  padding:10px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  font-weight:600;
  transition:0.2s;
}
.newchat:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #22c55e;
}

.recents{
  margin-top:15px;
  font-size:12px;
  opacity:.6;
}

.chatList{
  max-height:400px;
  overflow-y:auto;
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chatItem{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  transition:0.2s;
}
.chatItem:hover{
  background:rgba(255,255,255,0.1);
}

.chatTitle{
  flex:1;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

/* MENU */
.menuBtn{
  width:25px;
  height:25px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.menuBtn:hover{
  background:rgba(255,255,255,0.1);
}

.dropdown{
  position:absolute;
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  display:none;
  flex-direction:column;
  overflow:hidden;
}
.dropdown div{
  padding:10px;
  cursor:pointer;
}
.dropdown div:hover{
  background:#222;
}

/* PROFILE */
.profile{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
}

.profileInfo{font-size:12px;}

.profile button{
  margin-top:5px;
  width:100%;
  padding:6px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:70%;
  padding:14px;
  border-radius:14px;
  font-size:14px;
  line-height:1.5;
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:black;
}

.ai{
  align-self:flex-start;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(8px);
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  color:white;
}

button{
  margin-left:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  cursor:pointer;
  font-weight:bold;
}
button:hover{
  box-shadow:0 0 10px #22c55e;
}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="logo">◆ ILYASS AI</div>
    <div class="newchat" onclick="newChat()">+ New Chat</div>

    <div class="recents">Recents</div>
    <div class="chatList" id="chatList"></div>
  </div>

  <div class="profile">
    <div class="avatar" onclick="uploadPhoto()">
      <img id="avatarImg" style="width:100%;height:100%;display:none;">
      <span id="avatarText">U</span>
    </div>

    <div class="profileInfo">
      <div id="profileName">User</div>
      <div id="profileEmail" style="opacity:.6"></div>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <input type="file" id="fileInput" hidden onchange="handlePhoto(event)">
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
      onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>
</div>

<div id="dropdown" class="dropdown"></div>

<script>

let currentChatId=null;
let activeMenuId=null;

/* USER */
window.onload=()=>{
  const user=JSON.parse(localStorage.getItem("user"));
  if(user){
    document.getElementById("profileEmail").innerText=user.email;
    document.getElementById("avatarText").innerText=user.email[0].toUpperCase();
    loadChats();
  }
};

/* STORAGE */
function getUserKey(){
  const user=JSON.parse(localStorage.getItem("user"));
  return "chats_"+user.email;
}

/* LOAD */
function loadChats(){
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const list=document.getElementById("chatList");
  list.innerHTML="";

  chats.forEach(c=>{
    const div=document.createElement("div");
    div.className="chatItem";

    div.innerHTML=`
      <div class="chatTitle" onclick="openChat(${c.id})">${c.title}</div>
      <div class="menuBtn" onclick="toggleMenu(event, ${c.id})">⋯</div>
    `;

    list.appendChild(div);
  });
}

/* MENU */
function toggleMenu(e,id){
  e.stopPropagation();
  activeMenuId=id;

  const menu=document.getElementById("dropdown");
  menu.style.display="flex";
  menu.style.top=e.pageY+"px";
  menu.style.left=e.pageX+"px";

  menu.innerHTML=`
    <div onclick="renameChat()">Rename</div>
    <div onclick="deleteChat()">Delete</div>
  `;
}

document.addEventListener("click",()=>{
  document.getElementById("dropdown").style.display="none";
});

/* DELETE */
function deleteChat(){
  let chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  chats=chats.filter(c=>c.id!==activeMenuId);
  localStorage.setItem(getUserKey(),JSON.stringify(chats));
  loadChats();
}

/* RENAME */
function renameChat(){
  const name=prompt("New name:");
  if(!name) return;

  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===activeMenuId);
  chat.title=name;

  localStorage.setItem(getUserKey(),JSON.stringify(chats));
  loadChats();
}

/* NEW CHAT */
function newChat(){
  currentChatId=Date.now();
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];

  chats.push({id:currentChatId,title:"New chat",messages:[]});
  localStorage.setItem(getUserKey(),JSON.stringify(chats));

  loadChats();
  document.getElementById("messages").innerHTML="";
}

/* OPEN */
function openChat(id){
  currentChatId=id;
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===id);

  const box=document.getElementById("messages");
  box.innerHTML="";

  chat.messages.forEach(m=>{
    addMessage(m.text,m.type);
  });
}

/* SAVE */
function saveMessage(text,type){
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===currentChatId);

  chat.messages.push({text,type});

  if(chat.messages.length===1){
    chat.title=text.slice(0,25);
  }

  localStorage.setItem(getUserKey(),JSON.stringify(chats));
  loadChats();
}

/* MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
}

/* SEND */
async function send(){
  if(!currentChatId){
    newChat();
  }

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  saveMessage(text,"user");
  input.value="";

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    addMessage(data.reply || "AI","ai");
    saveMessage(data.reply || "AI","ai");

  }catch{
    addMessage("⚠️ Error","ai");
  }
}

/* PHOTO */
function uploadPhoto(){
  document.getElementById("fileInput").click();
}

function handlePhoto(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    document.getElementById("avatarImg").src=reader.result;
    document.getElementById("avatarImg").style.display="block";
    document.getElementById("avatarText").style.display="none";
  };
  reader.readAsDataURL(file);
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

</script>

</body>
</html>
