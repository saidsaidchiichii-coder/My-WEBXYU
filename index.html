<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:
    radial-gradient(circle at 85% 50%, rgba(255,255,255,0.15), transparent 40%),
    linear-gradient(135deg, #000000 0%, #05070a 40%, #0b0f14 100%);
  background-blend-mode: screen;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:auto;
  transition:1s;
}

/* 🎬 CINEMATIC INTRO */
body.loaded{
  animation:introFade 2s ease forwards;
}
@keyframes introFade{
  from{opacity:0;filter:blur(20px);transform:scale(1.05);}
  to{opacity:1;filter:blur(0);transform:scale(1);}
}

/* GLOBAL HOVER 3D */
button, .send, .inputBox{
  transition:.25s;
}
button:hover, .send:hover{
  transform:scale(1.08);
}

/* 3D ANIM */
.fadeOut{animation:zoomOut .6s forwards;}
.fadeIn{animation:zoomIn .6s forwards;}
.slideUp{animation:slideUp .4s ease;}

@keyframes zoomOut{
  from{opacity:1;transform:scale(1) rotateX(0deg);}
  to{opacity:0;transform:scale(1.1) rotateX(10deg);}
}
@keyframes zoomIn{
  from{opacity:0;transform:scale(0.9) rotateX(-10deg);}
  to{opacity:1;transform:scale(1) rotateX(0deg);}
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

/* PARTICLES */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{font-weight:bold;color:white;}

/* 🧊 3D LOGO */
.logo{
  transform-style:preserve-3d;
  animation:logoSpin 6s linear infinite;
}
@keyframes logoSpin{
  0%{transform:rotateY(0deg);}
  100%{transform:rotateY(360deg);}
}

.auth{display:flex;gap:10px;}

.btn{
  padding:8px 16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
}

.login{background:#1a1a1a;color:white;}
.signup{background:white;color:black;}

/* HOME */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
}

.title{
  font-size:40px;
  font-weight:bold;
  color:white;
  transition:.3s;
}

.inputBox{
  width:600px;
  max-width:90%;
  background:rgba(255,255,255,0.08);
  border-radius:999px;
  padding:12px 15px;
  display:flex;
  box-shadow:0 5px 30px rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}
.inputBox:hover{
  transform:scale(1.02);
}

.inputBox input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  color:white;
}

.send{
  width:40px;
  height:40px;
  border-radius:50%;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  cursor:pointer;
}

/* CHAT */
.chat{
  display:none;
  flex:1;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:65%;
  padding:12px;
  border-radius:12px;
  animation:slideUp .3s ease;
  transition:.5s;
}

.user{
  align-self:flex-end;
  background:white;
  color:black;
}

.ai{
  align-self:flex-start;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  color:white;
}

/* THINKING */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#aaa;border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* INPUT */
.bottom{
  padding:15px;
  border-top:1px solid rgba(255,255,255,0.1);
  display:flex;
}

.bottom textarea{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  resize:none;
}

/* LOGIN MODAL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  display:none;
  align-items:center;
  justify-content:center;
}

.loginBox{
  background:#111;
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
  animation:zoomIn .4s ease;
  color:white;
}

.loginBox input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.loginBox button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign up</button>
  </div>
</div>

<div class="top">
  <div class="logo">ILYASS AI</div>

  <div class="auth">
    <button class="btn login" onclick="openLogin()">Login</button>
    <button class="btn signup" onclick="openLogin()">Sign up</button>
  </div>
</div>

<div id="home" class="center">
  <div class="title">Ask Anything</div>

  <div class="inputBox"> 
    <input id="homeInput"
      onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput"
      onkeydown="handleKey(event)"></textarea>
  </div>
</div>

<script>

let loggedIn=false;

function openLogin(){
  loginOverlay.style.display="flex";
}

const { createClient } = supabase;
const supabaseClient = createClient(
  "https://idjgsgtupuymysptxrbl.supabase.co",
  "sb_publishable_XLIIiXZRcS5hrvdQP_pkMA_w2I11xFH"
);

async function login(){
  const {error}=await supabaseClient.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });

  if(error){alert(error.message);return;}

  loggedIn=true;
  loginOverlay.style.display="none";
}

async function signup(){
  const {error}=await supabaseClient.auth.signUp({
    email:email.value,
    password:password.value
  });

  if(error){alert(error.message);return;}

  alert("Check email 📩");
}

function handleKey(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
}

function startChat(){
  const text=homeInput.value.trim();
  if(!text)return;

  if(!loggedIn){
    openLogin();
    return;
  }

  home.classList.add("fadeOut");

  setTimeout(()=>{
    home.style.display="none";
    chat.style.display="flex";
    chat.classList.add("fadeIn");

    addMessage(text,"user");
    askAI(text);

  },600);
}

function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },15);
}

/* 🧊 3D MESSAGE REVEAL */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;

  const content=document.createElement("div");
  div.appendChild(content);

  div.style.opacity="0";
  div.style.transform="translateY(40px) scale(0.9) rotateX(20deg)";

  messages.appendChild(div);

  setTimeout(()=>{
    div.style.opacity="1";
    div.style.transform="translateY(0) scale(1) rotateX(0deg)";
  },50);

  if(type==="ai"){
    typeText(content,text);
  }else{
    content.innerText=text;
  }

  scrollBottom();
}

function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  messages.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom(){
  messages.scrollTop=messages.scrollHeight;
}

async function askAI(text){
  const t=showThinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    setTimeout(()=>{
      t.remove();
      addMessage(data.reply || "No response","ai");
    },1200);

  }catch{
    t.remove();
    addMessage("Error","ai");
  }
}

function send(){
  if(!loggedIn){openLogin();return;}

  const text=chatInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  chatInput.value="";
  askAI(text);
}

/* 🌌 PARALLAX MOUSE */
document.addEventListener("mousemove",(e)=>{
  const x=(e.clientX/window.innerWidth-0.5);
  const y=(e.clientY/window.innerHeight-0.5);

  document.querySelectorAll(".msg, .inputBox, .title").forEach(el=>{
    el.style.transform=`
      translate(${x*10}px, ${y*10}px)
      rotateY(${x*10}deg)
      rotateX(${-y*10}deg)
    `;
  });
});

/* 🌀 SCROLL CAMERA */
window.addEventListener("scroll",()=>{
  const scroll=window.scrollY;
  document.body.style.transform=`perspective(1200px) translateZ(${scroll*-0.5}px)`;
});

/* 🎬 INTRO LOAD */
window.addEventListener("load",()=>{
  document.body.classList.add("loaded");
});

/* 🌠 PARTICLES PARALLAX */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let dots=[];
for(let i=0;i<50;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dots.forEach((d,i)=>{
    d.x+=d.vx*(i%3+1);
    d.y+=d.vy*(i%3+1);

    if(d.x<0||d.x>canvas.width)d.vx*=-1;
    if(d.y<0||d.y>canvas.height)d.vy*=-1;

    ctx.beginPath();
    ctx.arc(d.x,d.y,2+(i%3),0,Math.PI*2);
    ctx.fillStyle="rgba(16,163,127,0.7)";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
