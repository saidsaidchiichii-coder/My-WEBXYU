<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILYASS AI AGENT </title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, Arial, sans-serif;
}

body{
  background:#000;
  color:#fff;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* NAV */
.nav{
  height:60px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo svg{
  width:28px;
  height:28px;
}

.right{
  display:flex;
  align-items:center;
  gap:12px;
}

.btn{
  padding:8px 14px;
  border-radius:999px;
  font-size:14px;
  cursor:pointer;
  transition:0.2s;
}

.signin{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
}

.signup{
  background:#fff;
  color:#000;
}

.btn:hover{
  opacity:0.85;
}

/* CENTER */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  animation:fade 0.4s ease-out;
}

@keyframes fade{
  from{opacity:0; transform:scale(0.98);}
  to{opacity:1; transform:scale(1);}
}

.title{
  font-size:48px;
  font-weight:600;
  margin-bottom:30px;
}

/* INPUT BOX */
.box{
  width:700px;
  max-width:90%;
  background:#111;
  border-radius:999px;
  display:flex;
  align-items:center;
  padding:10px 14px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.05);
  transition:0.2s;
}

.box:focus-within{
  box-shadow:0 0 0 2px rgba(255,255,255,0.15);
}

.icon{
  color:#888;
  font-size:18px;
  margin-right:8px;
}

input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:#fff;
  font-size:16px;
}

input::placeholder{
  color:rgba(255,255,255,0.4);
}

.auto{
  font-size:13px;
  color:#ccc;
  margin-right:10px;
  cursor:pointer;
}

.mic{
  font-size:16px;
  margin-right:10px;
  cursor:pointer;
  color:#ccc;
}

.send{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:none;
  transition:0.2s;
}

.send:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

/* BADGE */
.badge{
  margin-top:12px;
  font-size:12px;
  color:#aaa;
  background:#111;
  padding:6px 12px;
  border-radius:999px;
}

/* FOOTER */
footer{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="left">
    <div class="logo">
      <!-- Simple Grok-style star logo -->
      <svg viewBox="0 0 24 24" fill="white">
        <path d="M12 2l2.5 7.5L22 12l-7.5 2.5L12 22l-2.5-7.5L2 12l7.5-2.5L12 2z"/>
      </svg>
    </div>
    <b>Grok</b>
  </div>

  <div class="right">
    <div class="btn signin" onclick="alert('Sign in UI only (no backend)')">Sign in</div>
    <div class="btn signup" onclick="alert('Sign up UI only (no backend)')">Sign up</div>
  </div>
</div>

<!-- CENTER -->
<div class="center">

  <div class="title">Grok</div>

  <div class="box">
    <div class="icon">📎</div>

    <input id="input" placeholder="What's on your mind?" />

    <div class="auto">Auto ▼</div>
    <div class="mic">🎤</div>

    <button class="send" id="btn">➤</button>
  </div>

  <div class="badge">New · Hold Ctrl+D to dictate</div>
</div>

<footer>
By messaging Grok, you agree to our Terms and Privacy Policy.
</footer>

<script>

const input = document.getElementById("input");
const btn = document.getElementById("btn");

function setLoading(state){
  btn.disabled = state;
  btn.innerHTML = state ? "..." : "➤";
}

/* FIXED ENTER KEY */
input.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    send();
  }
});

btn.addEventListener("click", send);

async function send(){

  const text = input.value.trim();
  if(!text) return;

  setLoading(true);

  try{

    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ message: text })
    });

    let data;
    try{
      data = await res.json();
    }catch(e){
      const txt = await res.text();
      throw new Error(txt);
    }

    if(!res.ok){
      throw new Error(data.error || "Server error");
    }

    alert("AI: " + (data.reply || "No response"));

  }catch(err){
    alert("ERROR: " + err.message);
  }

  input.value = "";
  setLoading(false);
}

</script>

</body>
</html>
