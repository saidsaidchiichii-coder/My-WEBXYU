<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Agent Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  background:#050510;
  overflow:hidden;
  color:white;
}

/* 🌈 RGB animated background */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: linear-gradient(45deg, #ff00ff, #00ffff, #22c55e, #ffcc00, #ff00ff);
  animation: moveBG 8s linear infinite;
  filter: blur(80px);
  opacity:0.25;
}

@keyframes moveBG{
  0%{transform:translate(0,0);}
  50%{transform:translate(-25%,-25%);}
  100%{transform:translate(0,0);}
}

/* LOGIN CARD */
.login-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  padding:25px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  z-index:10;
}

.login-box h2{
  text-align:center;
  margin-bottom:15px;
}

/* INPUTS */
.login-box input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.login-btn{
  background:linear-gradient(90deg,#22c55e,#00ffff);
}

.signup-btn{
  background:linear-gradient(90deg,#ff00ff,#ffcc00);
}

.btn:hover{
  transform:scale(1.05);
}

/* AI DASHBOARD */
.ai-box{
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  padding:20px;
  z-index:5;
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.agent{
  margin-top:40px;
  text-align:center;
}

.agent h1{
  font-size:40px;
  background:linear-gradient(90deg,#ff00ff,#00ffff,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.chat{
  margin-top:20px;
  display:flex;
  justify-content:center;
}

.chat input{
  width:60%;
  padding:15px;
  border-radius:999px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

.chat button{
  margin-left:10px;
  padding:15px 20px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:#22c55e;
}
</style>
</head>

<body>

<!-- LOGIN FORM -->
<div class="login-box" id="loginBox">
  <h2>AI LOGIN</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="btn login-btn" onclick="login()">LOGIN</button>
  <button class="btn signup-btn" onclick="signUp()">SIGN UP</button>
</div>

<!-- AI DASHBOARD -->
<div class="ai-box" id="aiBox">

  <div class="nav">
    <h3>⚡ AI AGENT</h3>
    <button onclick="logout()" style="background:red;color:white;border:none;padding:8px 12px;border-radius:8px;">Logout</button>
  </div>

  <div class="agent">
    <h1>WELCOME TO YOUR AI</h1>
    <p>Ask anything below 👇</p>

    <div class="chat">
      <input id="msg" placeholder="Ask AI...">
      <button onclick="send()">➤</button>
    </div>
  </div>

</div>

<script>
const supabaseUrl = "https://ypqkmuflothekoaxwupn.supabase.co";
const supabaseKey = "YOUR_ANON_KEY";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

/* SIGN UP */
async function signUp(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await supabase.auth.signUp({ email, password });
  alert("Check your email 📩");
}

/* LOGIN */
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(data.user){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("aiBox").style.display="block";
  }
}

/* LOGOUT */
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* AI SEND */
async function send(){
  const text = document.getElementById("msg").value;
  if(!text) return;

  alert("AI: " + text);
}
</script>

</body>
</html>
