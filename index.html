<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Nexus Pro - Enterprise AI Platform</title>
<meta name="description" content="Professional AI chat platform with auth, real-time chat, file uploads, PWA"/>

<style>
*{
  margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

:root{
  --bg-primary: linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#000 100%);
  --glass-bg: rgba(15,23,42,0.9);
  --glass-border: rgba(255,255,255,0.1);
  --accent: #22c55e;
  --accent-hover: #16a34a;
  --danger: #ef4444;
  --text-primary: #f8fafc;
  --text-secondary: rgba(248,250,252,0.8);
}

body{
  height:100vh;background:var(--bg-primary);color:var(--text-primary);overflow:hidden;
}

/* ANIMATIONS */
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-20px) rotate(180deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* LOGIN */
.center{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:20px;gap:2rem}
.hero-title{font-size:clamp(2.5rem,8vw,4rem);font-weight:800;background:linear-gradient(135deg,#22c55e,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.subtitle{font-size:1.1rem;color:var(--text-secondary);max-width:450px;text-align:center;line-height:1.6}

.login-box{position:relative;width:clamp(340px,35vw,420px);padding:2.5rem;border-radius:24px;background:var(--glass-bg);backdrop-filter:blur(25px);border:1px solid var(--glass-border);box-shadow:0 25px 60px -15px rgba(0,0,0,0.6)}
.login-box::before{content:"";position:absolute;inset:-3px;background:linear-gradient(45deg,#ff00ff,#00ffff,#22c55e,#ffcc00,#ff00ff);background-size:400% 400%;animation:shimmer 5s ease infinite;z-index:-1;border-radius:26px}
.login-box::after{content:"";position:absolute;inset:2px;background:var(--glass-bg);border-radius:22px;z-index:-1}

.form-row{margin-bottom:1.5rem}
.form-row label{display:block;font-size:0.9rem;font-weight:500;color:var(--text-secondary);margin-bottom:0.5rem}
input{width:100%;padding:1rem 1.25rem;border:2px solid transparent;border-radius:16px;background:rgba(255,255,255,0.08);color:var(--text-primary);font-size:1rem;backdrop-filter:blur(10px);transition:all 0.3s ease}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(34,197,94,0.2);background:rgba(255,255,255,0.12)}
input::placeholder{color:var(--text-secondary)}
input.error{border-color:var(--danger)}

.btn{width:100%;padding:1.1rem;border:none;border-radius:16px;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-hover));color:white;box-shadow:0 10px 30px rgba(34,197,94,0.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 15px 40px rgba(34,197,94,0.5)}
.btn-secondary{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;box-shadow:0 10px 30px rgba(59,130,246,0.4)}
.btn-secondary:hover{transform:translateY(-2px);box-shadow:0 15px 40px rgba(59,130,246,0.5)}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none!important}

.loading{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#fff;margin-right:0.5rem;animation:pulse 1s linear infinite}
.error-msg{background:rgba(239,68,68,0.2);border:1px solid var(--danger);color:#fecaca;padding:1rem;border-radius:12px;margin:1rem 0;font-size:0.9rem;display:none}

/* APP */
.app{display:none;height:100vh;flex-direction:column;overflow:hidden}
.nav{padding:1rem 1.5rem;background:var(--glass-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);display:flex;justify-content:space-between;align-items:center;font-weight:600}
.nav-title{font-size:1.3rem;background:linear-gradient(135deg,var(--accent),#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logout{background:linear-gradient(135deg,var(--danger),#dc2626);padding:0.6rem 1.2rem;border:none;color:white;border-radius:12px;font-weight:500;cursor:pointer;transition:all 0.2s}
.logout:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(239,68,68,0.4)}

.chat{flex:1;padding:1.5rem;overflow-y:auto;scroll-behavior:smooth}
.msg{margin:1.5rem 0;animation:slideIn 0.4s ease-out;display:flex;gap:1rem}
.user{justify-content:flex-end}
.bubble{max-width:75%;padding:1.1rem 1.3rem;border-radius:20px;font-size:0.95rem;box-shadow:0 4px 20px rgba(0,0,0,0.3);word-wrap:break-word}
.user .bubble{background:linear-gradient(135deg,var(--accent),var(--accent-hover));color:white;border-bottom-right-radius:6px}
.ai .bubble{background:var(--glass-bg);backdrop-filter:blur(15px);border:1px solid var(--glass-border);border-bottom-left-radius:6px}

.typing{display:flex;align-items:center;gap:1rem;padding:1.1rem 1.3rem;background:var(--glass-bg);border-radius:20px 20px 20px 6px;max-width:75%;border:1px solid var(--glass-border)}
.typing-dots{display:flex;gap:0.3rem}
.typing-dots span{width:10px;height:10px;border-radius:50%;background:var(--accent);animation:pulse 1.4s infinite ease-in-out}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}

.inputBox{padding:1.5rem;background:var(--glass-bg);backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);display:flex;gap:1rem;align-items:flex-end}
.inputBox input{flex:1;padding:1rem 1.25rem;border:2px solid var(--glass-border);border-radius:24px;background:rgba(255,255,255,0.05);color:var(--text-primary);font-size:1rem}
.inputBox input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(34,197,94,0.1)}
.sendBtn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;color:white;font-size:1.3rem;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.sendBtn:hover:not(:disabled){transform:scale(1.08);box-shadow:0 10px 30px rgba(59,130,246,0.5)}
.sendBtn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* DASHBOARD */
.dashboard{display:none;padding:2rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem;margin-bottom:2rem}
.stat-card{background:var(--glass-bg);padding:2rem;border-radius:20px;border:1px solid var(--glass-border);text-align:center;transition:all 0.3s}
.stat-card:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(0,0,0,0.4)}
.stat-number{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent),#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* RESPONSIVE */
@media(max-width:768px){.login-box{width:90vw;padding:2rem}.nav{padding:1rem}.inputBox{padding:1rem}.msg{gap:0.5rem}.bubble{max-width:90%}}
@media(max-width:480px){.hero-title{font-size:2rem}.subtitle{display:none}}

/* SCROLLBAR */
.chat::-webkit-scrollbar{width:6px}.chat::-webkit-scrollbar-track{background:transparent}.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:3px}
</style>
</head>

<body>
<!-- LOADING SCREEN -->
<div id="loadingScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-primary);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;gap:2rem">
  <div style="font-size:4rem;animation:pulse 2s infinite">🤖</div>
  <div style="display:flex;gap:0.5rem">
    <div style="width:20px;height:20px;background:var(--accent);border-radius:50%;animation:pulse 1s infinite"></div>
    <div style="width:20px;height:20px;background:var(--accent);border-radius:50%;animation:pulse 1s infinite 0.2s"></div>
    <div style="width:20px;height:20px;background:var(--accent);border-radius:50%;animation:pulse 1s infinite 0.4s"></div>
  </div>
  <div style="font-size:1.2rem;color:var(--text-secondary)">Initializing AI Nexus Pro...</div>
</div>

<!-- LOGIN -->
<div class="center" id="loginPage">
  <div class="hero-title">AI Nexus Pro</div>
  <div class="subtitle">Enterprise AI Platform • Secure • Scalable • Intelligent</div>
  
  <div class="login-box">
    <h2 style="text-align:center;margin-bottom:1.5rem;font-size:1.8rem;font-weight:700">Welcome Back</h2>
    
    <div id="errorMsg" class="error-msg"></div>
    
    <div class="form-row">
      <label for="email">Email Address</label>
      <input id="email" type="email" placeholder="your@email.com" required>
    </div>
    
    <div class="form-row">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" required>
    </div>

    <button class="btn btn-primary" id="loginBtn">
      <span id="loginText">🚀 Sign In</span>
      <span id="loginSpinner" class="loading" style="display:none"></span>
    </button>
    
    <div style="text-align:center;margin-top:1.5rem;color:var(--text-secondary);font-size:0.9rem">
      Don't have an account? 
      <button class="btn btn-secondary" id="signupBtn" style="background:none;padding:0.3rem 0;color:#3b82f6;font-weight:600;cursor:pointer;border:none">Create Free Account</button>
    </div>
  </div>
  
  <div style="color:var(--text-secondary);font-size:0.85rem">Trusted by 10,000+ teams worldwide</div>
</div>

<!-- MAIN APP -->
<div class="app" id="app">
  <div class="nav">
    <div class="nav-title">🤖 AI Nexus Pro</div>
    <div style="display:flex;gap:1rem;align-items:center">
      <span id="userEmail" style="font-size:0.9rem;color:var(--text-secondary)"></span>
      <button class="logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="inputBox">
    <input id="msgInput" placeholder="Ask AI anything... (Ctrl+Enter to send)" maxlength="4000">
    <button class="sendBtn" id="sendBtn" disabled>➤</button>
  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

class AINexusPro{
  constructor(){
    this.supabase=Supabase.createClient("https://ypqkmuflothekoaxwupn.supabase.co","sb_publishable_c_HDHKad3Sjgz5Ho47gwWg_63AAuQY8");
    this.currentUser=null;
    this.chatMessages=[];
    this.isTyping=false;
    this.init();
  }

  init(){
    this.bindEvents();
    this.hideLoading();
    this.checkAuth();
  }

  bindEvents(){
    // Login/Signup
    document.getElementById('loginBtn').onclick=()=>this.handleLogin();
    document.getElementById('signupBtn').onclick=()=>this.handleSignup();
    
    // Chat
    document.getElementById('msgInput').oninput=e=>this.toggleSendBtn(e.target.value);
    document.getElementById('msgInput').onkeypress=e=>this.handleKeyPress(e);
    document.getElementById('sendBtn').onclick=()=>this.sendMessage();
    document.getElementById('logoutBtn').onclick=()=>this.logout();
    
    // Form validation
    ['email','password'].forEach(id=>{
      document.getElementById(id).onblur=e=>this.validateField(e.target);
      document.getElementById(id).oninput=e=>this.clearError(e.target);
    });
  }

  async checkAuth(){
    const {data:{session}}=await this.supabase.auth.getSession();
    if(session){
      this.currentUser=session.user;
      this.showApp();
      document.getElementById('userEmail').textContent=this.currentUser.email;
      this.loadChatHistory();
    }
  }

  async handleLogin(){
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value.trim();
    
    if(!this.validateLogin(email,password)) return;
    
    this.setLoading('loginBtn',true);
    try{
      const {data, error}=await this.supabase.auth.signInWithPassword({email,password});
      if(error) throw error;
      
      this.currentUser=data.user;
      this.showApp();
      document.getElementById('userEmail').textContent=this.currentUser.email;
      this.loadChatHistory();
    }catch(error){
      this.showError(`Login failed: ${error.message}`);
    }finally{
      this.setLoading('loginBtn',false);
    }
  }

  async handleSignup(){
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value.trim();
    
    if(!this.validateLogin(email,password)) return;
    
    this.setLoading('signupBtn',true);
    try{
      const {error}=await this.supabase.auth.signUp({email,password});
      if(error) throw error;
      this.showSuccess('Check your email to verify your account!');
    }catch(error){
      this.showError(`Signup failed: ${error.message}`);
    }finally{
      this.setLoading('signupBtn',false);
    }
  }

  validateLogin(email,password){
    if(!email || !password){
      this.showError('Please fill all fields');
      return false;
    }
    if(!email.includes('@')){
      this.showError('Please enter a valid email');
      return false;
    }
    if(password.length<6){
      this.showError('Password must be at least 6 characters');
      return false;
    }
    return true;
  }

  validateField(input){
    input.classList.toggle('error',input.validity.valid===false);
  }

  clearError(input){
    input.classList.remove('error');
  }

  toggleSendBtn(message){
    document.getElementById('sendBtn').disabled=!message.trim();
  }

  handleKeyPress(e){
    if(e.key==='Enter' && !e.shiftKey){
      e.preventDefault();
      this.sendMessage();
    }
  }
