<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

/* 🌈 LOGIN RGB BOX */
.loginBox{
  position:relative;
  z-index:1;
  overflow:hidden;
  border-radius:16px;
}

.loginBox::before{
  content:"";
  position:absolute;
  inset:-3px;
  background:linear-gradient(
    90deg,
    #ff004c,#00f5ff,#7cff00,#ff00e5,#ff004c
  );
  background-size:300% 300%;
  animation:rgbMove 4s linear infinite;
  z-index:-1;
  filter:blur(12px);
  opacity:0.9;
}

.loginBox::after{
  content:"";
  position:absolute;
  inset:2px;
  background:#111;
  border-radius:14px;
  z-index:-1;
}

@keyframes rgbMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

body{
  background:#0f0f0f;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111;
  padding:20px;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.newchat{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  filter: blur(6px);
  pointer-events:none;
}

.chat.active{
  filter:none;
  pointer-events:auto;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:14px;
  white-space:pre-wrap;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1f1f1f;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#111;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}

/* THINKING */
.thinking{
  display:flex;
  gap:4px;
  align-items:center;
}

.dot{
  width:6px;height:6px;border-radius:50%;
  background:#aaa;
  animation:bounce 1.2s infinite ease-in-out;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
  0%,80%,100%{transform:scale(0.6);opacity:0.4;}
  40%{transform:scale(1);opacity:1;}
}

/* LOGIN */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginBox{
  width:320px;
  padding:25px;
  background:#111;
  text-align:center;
}

.loginBox input{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

.error{
  color:red;
  font-size:12px;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <h2>Welcome</h2>
    <p>Login to continue</p>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p id="error" class="error"></p>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat">+ New Chat</div>
</div>

<!-- CHAT -->
<div class="chat" id="chat">

  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 كيفاش نعاونك؟</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
    onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
/* SUPABASE INIT */
const supabaseUrl = "https://idjgsgtupuymysptxrbl.supabase.co";
const supabaseKey = "sb_publishable_XLIIiXZRcS5hrvdQP_pkMA_w2I11xFH";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let loggedIn = false;
let thinkingEl = null;

/* LOGIN */
async function login(){

  const email=document.getElementById("email").value;
  const pass=document.getElementById("password").value;
  const error=document.getElementById("error");

  error.innerText="";

  const { data, error: err } = await supabase.auth.signInWithPassword({
    email,
    password: pass
  });

  if(err){
    error.innerText = err.message;
    return;
  }

  document.getElementById("loginOverlay").style.display="none";
  document.getElementById("chat").classList.add("active");

  loggedIn = true;
}

/* CHAT UI */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;

  const box=document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.id="thinking";

  div.innerHTML=`
    <div class="thinking">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;

  document.getElementById("messages").appendChild(div);
}

function removeThinking(){
  const t=document.getElementById("thinking");
  if(t) t.remove();
}

/* SEND */
async function send(){

  if(!loggedIn) return;

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  showThinking();

  try{

    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    removeThinking();
    addMessage(data.reply || "No response","ai");

  }catch(err){

    removeThinking();
    addMessage("❌ ERROR:\n"+err.message,"ai");
  }
}
</script>

</body>
</html>
