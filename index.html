<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ilyass AI Clone</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#000;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* NAV */
.nav{
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
  z-index:3;
}

.nav-left{
  font-weight:700;
}

/* CENTER */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:2;
}

.title{
  font-size:48px;
  margin-bottom:30px;
}

/* INPUT */
.input-box{
  width:700px;
  max-width:90%;
  height:60px;
  background:#111;
  border-radius:999px;
  display:flex;
  align-items:center;
  padding:0 14px;
}

.input-box input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:16px;
}

.send{
  width:38px;
  height:38px;
  border-radius:50%;
  background:white;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* CHAT */
.chat-box{
  position:absolute;
  top:70px;
  bottom:0;
  width:100%;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  pointer-events:none;
}

.msg{
  max-width:70%;
  padding:12px 16px;
  border-radius:12px;
  white-space:pre-wrap;
  animation:fadeUp 0.2s ease;
  pointer-events:auto;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.user{
  background:#22c55e;
  color:black;
  align-self:flex-end;
}

.ai{
  background:#1f2937;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-left">◆ ILYASS AI AGENT</div>
</div>

<div class="chat-box" id="messages"></div>

<div class="center">
  <div class="title">ILYASS AI AGENT</div>

  <div class="input-box">
    <input id="input" placeholder="What's on your mind?" />
    <div class="send" id="sendBtn">➤</div>
  </div>
</div>

<div class="footer">
 Contact WebSite Owner "ILYASS"
</div>

<script>
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
let loading = false;

/* ENTER */
input.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener("click", send);

function addMessage(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  const box = document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

/* ✨ TYPING EFFECT */
function typeMessage(text){
  const div = document.createElement("div");
  div.className = "msg ai";
  document.getElementById("messages").appendChild(div);

  let i = 0;
  const speed = 15;

  function typing(){
    if(i < text.length){
      div.innerText += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}

/* LOADING */
function setLoading(state){
  loading = state;
  sendBtn.innerText = state ? "..." : "➤";
}

async function send(){
  if(loading) return;

  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  setLoading(true);

  try{
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    typeMessage(data.reply || "No response");

  }catch(err){
    addMessage("❌ ERROR:\n" + err.message,"ai");
  }

  setLoading(false);
}
</script>

</body>
</html>
