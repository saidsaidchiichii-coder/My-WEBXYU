<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IK AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:250px;
background:#111827;
padding:20px;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
margin:5px 0;
padding:10px;
border-radius:10px;
max-width:70%;
word-wrap:break-word;
white-space:pre-wrap;
}

.user{
background:#22c55e;
color:black;
margin-left:auto;
}

.ai{
background:#1f2937;
}

.input{
display:flex;
padding:10px;
background:#111827;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

button{
margin-left:10px;
padding:10px;
background:#22c55e;
border:none;
cursor:pointer;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}
</style>

</head>

<body>

<div class="sidebar">
<h3>IDK AI 🚀</h3>
</div>

<div class="chat">

<div class="messages" id="messages">
<div class="msg ai">Hello 👋 كيف نعاونك اليوم؟</div>
</div>

<div class="input">
<input id="input" placeholder="Type your message..."
onkeydown="if(event.key==='Enter') send()" />
<button id="btn" onclick="send()">Send</button>
</div>

</div>

<script>

function addMessage(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  const box = document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function setLoading(state){
  document.getElementById("btn").disabled = state;
  document.getElementById("btn").innerText = state ? "..." : "Send";
}

async function send(){

  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  setLoading(true);

  try{

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    // 🔥 SAFE JSON HANDLING (no crash)
    let data;
    try {
      data = await res.json();
    } catch (e) {
      const txt = await res.text();
      throw new Error(txt);
    }

    if(!res.ok){
      throw new Error(data.error || "Server error");
    }

    addMessage(data.reply || "No response","ai");

  }catch(err){
    addMessage("❌ ERROR:\n" + err.message,"ai");
  }

  setLoading(false);
}

</script>

</body>
</html>
