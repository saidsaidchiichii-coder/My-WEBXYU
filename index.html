<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IK AI - واجهة الدردشة المتقدمة</title>
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-tertiary: #1f2937;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent-primary: #22c55e;
            --accent-hover: #16a34a;
            --user-msg-bg: #22c55e;
            --ai-msg-bg: #374151;
            --sidebar-width: 280px;
            --border-radius: 16px;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, #0f172a 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            display: flex;
            height: 100vh;
            max-width: 100vw;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .chat-item {
            padding: 16px 20px;
            cursor: pointer;
            border-radius: var(--border-radius);
            margin: 0 12px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(-4px);
        }

        .chat-item.active {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.1));
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .chat-item::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--accent-primary);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .chat-item:hover::before,
        .chat-item.active::before {
            opacity: 1;
        }

        .chat-preview {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            max-width: 70%;
            animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 8px;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message-content {
            padding: 16px 20px;
            border-radius: var(--border-radius);
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: var(--ai-msg-bg);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
            background: var(--ai-msg-bg);
            border-radius: var(--border-radius);
            border-bottom-left-radius: 4px;
            max-width: 70%;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-primary);
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* INPUT AREA */
        .input-container {
            padding: 24px 32px 32px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        .input-field {
            flex: 1;
            padding: 16px 24px;
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            border-radius: 32px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            resize: none;
            min-height: 56px;
            max-height: 200px;
            line-height: 1.5;
        }

        .input-field:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        .input-field::placeholder {
            color: var(--text-secondary);
        }

        .send-button {
            width: 56px;
            height: 56px;
            border: none;
            background: var(--accent-primary);
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-button:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ANIMATIONS */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                z-index: 1000;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                width: 100%;
            }

            .messages-container,
            .input-container {
                padding-left: 24px;
                padding-right: 24px;
            }

            .chat-header {
                padding-left: 24px;
                padding-right: 24px;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">IK AI</div>
                <button class="new-chat-btn" id="newChatBtn">
                    ➕ دردشة جديدة
                </button>
            </div>
            <div class="chat-history" id="chatHistory">
                <!-- Chat sessions will be populated here -->
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="chat-header">
                <h1 class="chat-title" id="chatTitle">دردشة جديدة</h1>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div class="message ai">
                    <div class="message-content">
                        مرحبا! أنا IK AI، مساعدك الذكي. كيفاش نقدر نساعدك اليوم؟ 🚀
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        class="input-field" 
                        id="messageInput" 
                        placeholder="اكتب رسالتك هنا... (اضغط Enter للإرسال)"
                        rows="1"
                        disabled
                    ></textarea>
                    <button class="send-button" id="sendButton" disabled>
                        ➤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        class IKAiChat {
            constructor() {
                this.chats = JSON.parse(localStorage.getItem('ik-ai-chats')) || [];
                this.currentChatId = null;
                this.isLoading = false;
                
                this.elements = {
                    sidebar: document.getElementById('sidebar'),
                    chatHistory: document.getElementById('chatHistory'),
                    messagesContainer: document.getElementById('messagesContainer'),
                    messageInput: document.getElementById('messageInput'),
                    sendButton: document.getElementById('sendButton'),
                    newChatBtn: document.getElementById('newChatBtn'),
                    chatTitle: document.getElementById('chatTitle')
                };

                this.init();
            }

            init() {
                this.bindEvents();
                this.renderChatHistory();
                this.scrollToBottom();
                this.enableInput();
            }

            bindEvents() {
                this.elements.newChatBtn.addEventListener('click', () => this.createNewChat());
                this.elements.sendButton.addEventListener('click', () => this.sendMessage());
                this.elements.messageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });
                this.elements.messageInput.addEventListener('input', this.autoResize.bind(this));
            }

            createNewChat() {
                const newChat = {
                    id: Date.now().toString(),
                    title: 'دردشة جديدة',
                    messages: [],
                    createdAt: new Date().toISOString()
                };
                
                this.chats.unshift(newChat);
                this.currentChatId = newChat.id;
                this.renderChatHistory();
                this.loadChat(newChat.id);
                this.saveChats();
            }

            loadChat(chatId) {
                const chat = this.chats.find(c => c.id === chatId);
                if (!chat) return;

                this.currentChatId = chatId;
                this.elements.chatTitle.textContent = chat.title;
                this.renderMessages(chat.messages);
                this.renderChatHistory();
                this.scrollToBottom();
            }

            renderChatHistory() {
                this.elements.chatHistory.innerHTML = this.chats.map(chat => `
                    <div class="chat-item ${chat.id === this.currentChatId ? 'active' : ''}" 
                         data-chat-id="${chat.id}" 
                         onclick="app.loadChat('${chat.id}')">
                        <div class="chat-preview">${chat.title}</div>
                    </div>
                `).join('');
            }

            renderMessages(messages) {
                this.elements.messagesContainer.innerHTML = messages.map(msg => `
                    <div class="message ${msg.role}">
                        <div class="message-content">${this.escapeHtml(msg.content)}</div>
                    </div>
                `).join('');
            }

            async sendMessage() {
                const message = this.elements.messageInput.value.trim();
                if (!message || this.isLoading) return;

                // Add user message
                const userMessage = { role: 'user', content: message };
                this.addMessage(userMessage);
                this.elements.messageInput.value = '';
                this.autoResize();
                this.disableInput();

                // Show typing indicator
                this.showTypingIndicator();

                try {
                    // Simulate API call (replace with real API)
                    const aiResponse = await this.fetchAIResponse(message);
                    
                    // Remove typing indicator and add AI response
                    this.removeTypingIndicator();
                    this.addMessage({ role: 'ai', content: aiResponse });
                    
                } catch (error) {
                    this.removeTypingIndicator();
                    this.addMessage({ role: 'ai', content: 'عذرا، حصل خطأ. جرب مرة أخرى.' });
                }

                this.enableInput();
                this.scrollToBottom();
            }

            async fetchAIResponse(message) {
                // Simulate API delay
                await new Promise(resolve => setTimeout(resolve, 1500 + Math.random() * 1000));
                
                // Mock AI responses (replace with real /api/chat)
                const responses = [
                    `شكرا على سؤالك "${message}"! هادي إجابة مفصلة...`,
                    `ممتاز! بخصوص "${message}"، نقدر نقولك...`,
                    `فهمت سؤالك "${message}". الجواب هو...`,
                    `بخصوص "${message}"، هادي المعلومات اللي عندي...`
                ];
                
                return responses[Math.floor(Math.random() * responses.length)];
            }

            addMessage(message) {
                const currentChat = this.chats.find(c => c.id === this.currentChatId);
                if (currentChat) {
                    currentChat.messages.push(message);
                    currentChat.title = message.content.length > 30 
                        ? message.content.substring(0, 30) + '...'
                        : message.content;
                    
                    this.renderMessages(currentChat.messages);
                    this.saveChats();
                }
            }

            showTypingIndicator() {
                this.isLoading = true;
                const typingHtml = `
                    <div class="typing-indicator">
                        <div>IK AI يكتب...</div>
                        <div class="typing-dots">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                `;
                this.elements.messagesContainer.insertAdjacentHTML('beforeend', typingHtml);
                this.scrollToBottom();
            }

            removeTypingIndicator() {
                this.isLoading = false;
