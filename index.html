<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* LOGIN */
.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}

.loginBox{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  width:300px;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:200px;
  height:100%;
  background:#111;
  padding:10px;
}

.logo{
  font-size:20px;
  margin-bottom:20px;
}

.newchat{
  padding:10px;
  background:#222;
  margin:5px 0;
  border-radius:10px;
  cursor:pointer;
}

/* CHAT */
.chat{
  margin-left:210px;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.messages{
  flex:1;
  padding:10px;
}

.msg{
  padding:10px;
  margin:5px 0;
  background:#222;
  border-radius:10px;
}

.ai{
  background:#1d4ed8;
}

.input{
  display:flex;
  padding:10px;
  background:#111;
}

.input input{
  flex:1;
  margin-right:10px;
}
</style>

</head>

<body>

<!-- LOGIN (hidden but kept) -->
<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <h2>◆ ILYASS AI</h2>
    <p>Quick login</p>

    <input placeholder="email">
    <input type="password" placeholder="password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>
    <button onclick="ownerSkip()" style="background:#9333ea;">Skip</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat">+ New Chat</div>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 How can I help you?</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..." 
    onkeydown="if(event.key==='Enter') send()"/>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
/* 🔥 AUTO LOGIN BYPASS */
window.onload = () => {
  document.getElementById("loginOverlay").style.display = "none";
};

/* fake functions */
function login(){
  alert("Login disabled in this version");
}

function signup(){
  alert("Signup disabled in this version");
}

function ownerSkip(){
  document.getElementById("loginOverlay").style.display = "none";
}

/* chat */
function send(){
  let input = document.getElementById("input");
  let messages = document.getElementById("messages");

  if(!input.value) return;

  let userMsg = document.createElement("div");
  userMsg.className = "msg";
  userMsg.innerText = input.value;
  messages.appendChild(userMsg);

  let aiMsg = document.createElement("div");
  aiMsg.className = "msg ai";
  aiMsg.innerText = "I'm a demo AI 🤖";
  messages.appendChild(aiMsg);

  input.value = "";
}
</script>

</body>
</html>
