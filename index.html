<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="top">
  <div class="logo">ILYASS AI</div>

  <div class="auth">
    <button class="btn login">Login</button>
    <button class="btn signup">Sign up</button>
  </div>
</div>

<!-- NAVIGATION -->
<div class="nav">
  <button onclick="go('home')" class="active">Home</button>
  <button onclick="go('earn')">Earn Money</button>
  <button onclick="go('settings')">Settings</button>
</div>

<!-- HOME (CHAT) -->
<div id="home" class="center section" style="display:flex;">

  <div class="title">Ask anything</div>

  <div class="inputBox">
    <input id="homeInput" placeholder="What do you want to know?"
      onkeydown="if(event.key==='Enter') startChat()">

    <div class="send" onclick="startChat()">➤</div>
  </div>

</div>

<!-- CHAT AREA -->
<div id="chat" class="chat">

  <div id="messages" class="messages"></div>

  <div class="bottom">
    <input id="chatInput" placeholder="Send a message..."
      onkeydown="if(event.key==='Enter') send()">
  </div>

</div>

<!-- EARN MONEY -->
<div id="earn" class="section" style="display:none; padding:20px; color:white;">
  <h1>💰 Earn Money</h1>
  <p>Coming soon...</p>
</div>

<!-- SETTINGS -->
<div id="settings" class="section" style="display:none; padding:20px; color:white;">
  <h1>⚙️ Settings</h1>
  <p>Customize your experience</p>
</div>

<!-- SCRIPTS -->
<script src="navigation.js"></script>

<script>

/* 🔥 YOUR VERCEL API */
const API_URL = "https://my-webxyu.vercel.app/api/chat";

/* START CHAT */
function startChat(){
  const text=document.getElementById("homeInput").value.trim();
  if(!text) return;

  document.getElementById("home").style.display="none";
  document.getElementById("chat").style.display="flex";

  addMessage(text,"user");
  document.getElementById("homeInput").value="";

  askAI(text);
}

/* ADD MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  document.getElementById("messages").appendChild(div);
  typeText(div,text);
}

/* TYPE EFFECT */
function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },10);
}

/* THINKING */
function thinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`
    <div class="thinking">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>`;
  document.getElementById("messages").appendChild(div);
  return div;
}

/* CALL API */
async function askAI(message){
  const t = thinking();

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    t.remove();
    addMessage(data.reply || "No response","ai");

  }catch(err){
    t.remove();
    addMessage("Error connecting to API ❌","ai");
  }
}

/* SEND */
function send(){
  const input=document.getElementById("chatInput");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  askAI(text);
}

</script>

</body>
</html>
