<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:
    radial-gradient(circle at 90% 50%, rgba(255,255,255,0.15), transparent 40%),
    linear-gradient(135deg,#000000,#0b0f14);
  height:100vh;
  overflow:hidden;
  color:white;
  perspective:1200px;
}

/* INTRO */
body.loaded{
  animation:intro 1.2s ease forwards;
}
@keyframes intro{
  from{opacity:0;transform:scale(1.1);}
  to{opacity:1;transform:scale(1);}
}

/* CURSOR GLOW */
.cursor{
  position:fixed;
  width:200px;
  height:200px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 70%);
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
  z-index:999;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
  transform:translateZ(40px);
}

.btn{
  padding:8px 16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  transition:.3s cubic-bezier(.25,.8,.25,1);
}
.btn:hover{
  transform:scale(1.1) rotateX(5deg);
}

.login{background:#1a1a1a;color:white;}
.signup{background:white;color:black;}

/* HOME */
.center{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:25px;
  transform-style:preserve-3d;
}

.title{
  font-size:42px;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;}
}

/* INPUT */
.inputBox{
  width:600px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);
  border-radius:999px;
  padding:14px;
  display:flex;
  transition:.3s;
}
.inputBox:hover{
  transform:scale(1.05) rotateX(5deg);
}

.inputBox input{
  flex:1;
  background:none;
  border:none;
  color:white;
  outline:none;
}

.send{
  width:42px;
  height:42px;
  border-radius:50%;
  background:white;
  color:black;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:.3s;
}
.send:hover{transform:scale(1.2);}

/* CHAT */
.chat{
  display:none;
  height:100%;
  flex-direction:column;
  transform-style:preserve-3d;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
}

.msg{
  margin:10px 0;
  max-width:60%;
  padding:12px;
  border-radius:14px;
  animation:msgIn .4s ease;
}

@keyframes msgIn{
  from{opacity:0;transform:translateY(20px) rotateX(20deg);}
  to{opacity:1;}
}

.user{
  background:white;
  color:black;
  margin-left:auto;
}

.ai{
  background:rgba(255,255,255,0.08);
}

/* THINKING */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#aaa;border-radius:50%;
  animation:blink 1s infinite;
}
@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* INPUT */
.bottom{
  padding:15px;
}
textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  border:none;
  color:white;
}

/* LOGIN */
.overlay{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(15px);
}

.loginBox{
  background:#111;
  padding:30px;
  border-radius:20px;
  width:300px;
  animation:fadeUp .6s;
}
.loginBox input{
  width:100%;
  margin:6px 0;
  padding:10px;
}
.loginBox button{
  width:100%;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <h2>Login</h2>
    <input id="email">
    <input id="password" type="password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign up</button>
  </div>
</div>

<div class="top">
  <div>ILYASS AI</div>
  <div>
    <button class="btn login" onclick="openLogin()">Login</button>
    <button class="btn signup" onclick="openLogin()">Sign up</button>
  </div>
</div>

<div id="home" class="center">
  <div class="title">Ask Anything</div>

  <div class="inputBox">
    <input id="homeInput" onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput" onkeydown="handleKey(event)"></textarea>
  </div>
</div>

<script>

/* INTRO */
window.onload=()=>document.body.classList.add("loaded");

/* CURSOR LIGHT */
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* LOGIN */
let loggedIn=false;
function openLogin(){loginOverlay.style.display="flex";}

/* SUPABASE */
const { createClient } = supabase;
const supabaseClient = createClient(
  "https://idjgsgtupuymysptxrbl.supabase.co",
  "sb_publishable_XLIIiXZRcS5hrvdQP_pkMA_w2I11xFH"
);

async function login(){
  const {error}=await supabaseClient.auth.signInWithPassword({
    email:email.value,password:password.value
  });
  if(error){alert(error.message);return;}
  loggedIn=true;loginOverlay.style.display="none";
}

async function signup(){
  const {error}=await supabaseClient.auth.signUp({
    email:email.value,password:password.value
  });
  if(error){alert(error.message);return;}
  alert("Check email");
}

/* SHIFT ENTER */
function handleKey(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
}

/* START */
function startChat(){
  const text=homeInput.value.trim();
  if(!text)return;

  if(!loggedIn){openLogin();return;}

  home.style.display="none";
  chat.style.display="flex";

  addMessage(text,"user");
  askAI(text);
}

/* TYPE */
function typeText(el,text){
  let i=0;
  const int=setInterval(()=>{
    el.innerHTML+=text[i++];
    if(i>=text.length)clearInterval(int);
  },15);
}

/* ADD */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  const c=document.createElement("div");
  div.appendChild(c);
  messages.appendChild(div);

  if(type==="ai") typeText(c,text);
  else c.innerText=text;

  messages.scrollTop=messages.scrollHeight;
}

/* THINK */
function thinking(){
  const d=document.createElement("div");
  d.className="msg ai";
  d.innerHTML=`<div class="thinking">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  messages.appendChild(d);
  return d;
}

/* AI */
async function askAI(text){
  const t=thinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    setTimeout(()=>{
      t.remove();
      addMessage(data.reply || "No response","ai");
    },1500);

  }catch{
    t.remove();
    addMessage("Error","ai");
  }
}

/* SEND */
function send(){
  if(!loggedIn){openLogin();return;}

  const text=chatInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  chatInput.value="";
  askAI(text);
}

</script>

</body>
</html>
