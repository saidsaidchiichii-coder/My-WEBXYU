<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI App</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0b0f19;
  color:white;
}

/* LOGIN */
#loginPage{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input{
  width:260px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1a1a1a;
  color:white;
}

button{
  width:260px;
  padding:10px;
  border:none;
  border-radius:999px;
  background:#22c55e;
  cursor:pointer;
  font-weight:bold;
}

/* APP */
#app{
  display:none;
  height:100vh;
  flex-direction:column;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* MSG */
.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
  padding:10px;
  border-radius:10px;
  max-width:60%;
}

.ai{
  align-self:flex-start;
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  max-width:60%;
}

/* INPUT */
.bar{
  display:flex;
  gap:10px;
  padding:10px;
  border-top:1px solid #222;
}

.bar input{
  flex:1;
}
.bar button{
  width:100px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>LOGIN</h2>
  <input id="email" placeholder="Email"/>
  <input id="pass" type="password" placeholder="Password"/>

  <button onclick="login()">LOGIN</button>
  <button onclick="signup()">SIGNUP</button>
</div>

<!-- APP -->
<div id="app">

  <div id="chat"></div>

  <div class="bar">
    <input id="msg" placeholder="Ask AI..."/>
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

/* LOGIN */
function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if(!email || !pass){
    alert("Fill all fields");
    return;
  }

  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="flex";
}

/* SIGNUP */
function signup(){
  alert("Signup success (demo)");
}

/* CHAT */
function send(){
  const input = document.getElementById("msg");
  const msg = input.value.trim();
  if(!msg) return;

  const chat = document.getElementById("chat");

  // USER
  chat.innerHTML += `<div class="user">${msg}</div>`;

  // AI RESPONSE (FIXED LOGIC)
  let reply = ai(msg);
  chat.innerHTML += `<div class="ai">${reply}</div>`;

  input.value="";
  chat.scrollTop = chat.scrollHeight;
}

/* SIMPLE AI */
function ai(msg){

  let m = msg.toLowerCase();

  if(m.includes("hi") || m.includes("hello")){
    return "Hello 👋 كيفاش نعاونك؟";
  }

  if(m.includes("1+1")){
    return "2";
  }

  if(m.includes("who are you")){
    return "I am your AI assistant 🤖";
  }

  return "I got: " + msg;
}

</script>

</body>
</html>
