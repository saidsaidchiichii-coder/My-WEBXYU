<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  height:100vh;
  background: radial-gradient(circle at top, #0f172a, #000);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* 🔥 RGB CARD */
.login-box{
  position:relative;
  width:340px;
  padding:30px;
  border-radius:18px;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index:1;
  overflow:hidden;
}

/* RGB BORDER ANIMATION */
.login-box::before{
  content:"";
  position:absolute;
  top:-3px;
  left:-3px;
  right:-3px;
  bottom:-3px;
  z-index:-1;
  background:linear-gradient(
    90deg,
    #ff00ff,
    #00ffff,
    #22c55e,
    #ffcc00,
    #ff00ff
  );
  background-size:300% 300%;
  animation: rgbMove 4s linear infinite;
  border-radius:20px;
}

.login-box::after{
  content:"";
  position:absolute;
  inset:2px;
  background:rgba(10,10,20,0.95);
  border-radius:16px;
  z-index:-1;
}

@keyframes rgbMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

/* BUTTONS */
button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.login-btn{
  background:#22c55e;
}

.signup-btn{
  background:#00c2ff;
}
</style>
</head>

<body>

<div class="login-box">
  <h2 style="text-align:center;margin-bottom:15px;">LOGIN</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="login-btn" id="loginBtn">LOGIN</button>
  <button class="signup-btn" id="signupBtn">SIGN UP</button>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://ypqkmuflothekoaxwupn.supabase.co";
const supabaseKey = "sb_publishable_xxxxxxx"; // 👈 حط key ديالك هنا

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

/* INPUTS */
const email = document.getElementById("email");
const password = document.getElementById("password");

const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");

/* =========================
   SIGN UP
========================= */
signupBtn.addEventListener("click", async () => {
  const { data, error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });

  if(error){
    alert("❌ Signup failed:\n" + error.message);
  } else {
    alert("📩 Check your email to confirm account");
  }
});

/* =========================
   LOGIN
========================= */
loginBtn.addEventListener("click", async () => {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){
    alert("❌ Login failed:\n" + error.message);
    return;
  }

  if(!data.user){
    alert("❌ No user found");
    return;
  }

  alert("✅ Login success!");
  console.log(data.user);
});
</script>

</body>
</html>
