<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI SaaS Project</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  height:100vh;
  background: radial-gradient(circle at top, #0f172a, #000);
  color:white;
}

/* LOGIN */
.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:360px;
  padding:30px;
  border-radius:18px;
  position:relative;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  inset:-3px;
  background:linear-gradient(90deg,#ff00ff,#00ffff,#22c55e,#ffcc00,#ff00ff);
  background-size:300% 300%;
  animation:rgb 4s linear infinite;
  z-index:-1;
  border-radius:20px;
}

.card::after{
  content:"";
  position:absolute;
  inset:2px;
  background:rgba(10,10,20,0.95);
  border-radius:16px;
  z-index:-1;
}

@keyframes rgb{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.login{background:#22c55e;}
.signup{background:#00c2ff;}

/* APP */
.app{
  display:none;
  height:100vh;
  flex-direction:column;
}

.nav{
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid #222;
}

.logout{
  background:red;
  border:none;
  padding:8px 12px;
  color:white;
  border-radius:8px;
}

.chat{
  flex:1;
  overflow:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:10px 14px;
  border-radius:12px;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1f2937;
}

.inputBar{
  display:flex;
  padding:10px;
  border-top:1px solid #222;
}

.inputBar input{
  flex:1;
}

.inputBar button{
  width:80px;
  margin-left:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="loginPage">
  <div class="card">
    <h2 style="text-align:center;margin-bottom:10px;">LOGIN</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="login" id="loginBtn">LOGIN</button>
    <button class="signup" id="signupBtn">SIGN UP</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="nav">
    🤖 AI AGENT
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="inputBar">
    <input id="msg" placeholder="Ask AI...">
    <button onclick="send()">➤</button>
  </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const client = supabase.createClient(
  "https://ypqkmuflothekoaxwupn.supabase.co",
  "sb_publishable_c_HDHKad3Sjgz5Ho47gwWg_63AAuQY8"
);

/* AUTH */
const email = document.getElementById("email");
const password = document.getElementById("password");

document.getElementById("signupBtn").onclick = async () => {
  const { error } = await client.auth.signUp({
    email: email.value,
    password: password.value
  });

  if(error) return alert(error.message);

  alert("📩 Check email");
};

document.getElementById("loginBtn").onclick = async () => {
  const { data, error } = await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error) return alert(error.message);

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "flex";
};

/* CHAT */
function send(){
  const msg = document.getElementById("msg");
  if(!msg.value) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="msg user">${msg.value}</div>
    <div class="msg ai">AI: ${msg.value}</div>
  `;

  msg.value = "";
}

/* LOGOUT */
function logout(){
  location.reload();
}
</script>

</body>
</html>
