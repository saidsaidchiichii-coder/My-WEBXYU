<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:#0b0b0b;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:#0f0f0f;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid #1f1f1f;
}

.logo{font-weight:bold;font-size:18px;}

.newchat{
  margin-top:15px;
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

.recents{
  margin-top:15px;
  font-size:12px;
  opacity:.6;
}

.chatList{
  max-height:400px;
  overflow-y:auto;
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chatList::-webkit-scrollbar{
  width:5px;
}
.chatList::-webkit-scrollbar-thumb{
  background:#333;
  border-radius:10px;
}

.chatItem{
  padding:10px;
  background:#151515;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.chatItem:hover{background:#222;}

/* PROFILE */
.profile{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
}

.profileInfo{font-size:12px;}

.profile button{
  margin-top:6px;
  width:100%;
  padding:7px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#ef4444,#dc2626);
  font-weight:bold;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:14px;
  border-radius:14px;
  line-height:1.5;
  font-size:14px;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1a1a1a;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#0f0f0f;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">

  <div>
    <div class="logo">◆ ILYASS AI</div>

    <div class="newchat" onclick="newChat()">+ New Chat</div>

    <div class="recents">Recents</div>
    <div class="chatList" id="chatList"></div>
  </div>

  <div class="profile">
    <div class="avatar" onclick="uploadPhoto()">
      <img id="avatarImg" style="width:100%;height:100%;border-radius:50%;object-fit:cover;display:none;">
      <span id="avatarText">U</span>
    </div>

    <div class="profileInfo">
      <div id="profileName">User</div>
      <div id="profileEmail" style="opacity:.6"></div>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <input type="file" id="fileInput" hidden accept="image/*" onchange="handlePhoto(event)">

</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
      onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

const SUPABASE_URL = "https://idjgsgtupuymysptxrbl.supabase.co";
const SUPABASE_KEY = "sb_publishable_XLIIiXZRcS5hrvdQP_pkMA_w2I11xFH";

let currentChatId = null;

/* LOAD USER */
window.onload = () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if(user){
    document.getElementById("profileEmail").innerText = user.email;
    document.getElementById("avatarText").innerText = user.email[0].toUpperCase();

    const saved = localStorage.getItem("avatar_"+user.email);
    if(saved){
      document.getElementById("avatarImg").src = saved;
      document.getElementById("avatarImg").style.display="block";
      document.getElementById("avatarText").style.display="none";
    }

    loadChats();
  }
};

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* PHOTO */
function uploadPhoto(){
  document.getElementById("fileInput").click();
}

function handlePhoto(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(){
    const img = document.getElementById("avatarImg");
    const text = document.getElementById("avatarText");

    img.src = reader.result;
    img.style.display = "block";
    text.style.display = "none";

    const user = JSON.parse(localStorage.getItem("user"));
    localStorage.setItem("avatar_"+user.email, reader.result);
  };
  reader.readAsDataURL(file);
}

/* CHAT STORAGE */
function getUserKey(){
  const user = JSON.parse(localStorage.getItem("user"));
  return "chats_" + user.email;
}

function loadChats(){
  const chats = JSON.parse(localStorage.getItem(getUserKey())) || [];
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach(c=>{
    const div = document.createElement("div");
    div.className="chatItem";
    div.innerText=c.title;
    div.onclick=()=>openChat(c.id);
    list.appendChild(div);
  });
}

/* NEW CHAT */
function newChat(){
  currentChatId = Date.now();

  const chats = JSON.parse(localStorage.getItem(getUserKey())) || [];

  chats.push({
    id: currentChatId,
    title:"New chat",
    messages:[]
  });

  localStorage.setItem(getUserKey(), JSON.stringify(chats));
  loadChats();

  document.getElementById("messages").innerHTML="";
}

/* OPEN CHAT */
function openChat(id){
  currentChatId = id;

  const chats = JSON.parse(localStorage.getItem(getUserKey())) || [];
  const chat = chats.find(c=>c.id===id);

  const box = document.getElementById("messages");
  box.innerHTML="";

  chat.messages.forEach(m=>{
    addMessage(m.text, m.type);
  });
}

/* SAVE */
function saveMessage(text,type){
  const chats = JSON.parse(localStorage.getItem(getUserKey())) || [];
  const chat = chats.find(c=>c.id===currentChatId);

  chat.messages.push({text,type});

  if(chat.messages.length === 1){
    chat.title = text.slice(0,25);
  }

  localStorage.setItem(getUserKey(), JSON.stringify(chats));
  loadChats();
}

/* UI */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
}

/* SEND */
async function send(){

  if(!currentChatId){
    newChat();
  }

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  saveMessage(text,"user");

  input.value="";

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    addMessage(data.reply || "AI response","ai");
    saveMessage(data.reply || "AI response","ai");

  }catch{
    addMessage("⚠️ Error","ai");
  }
}

</script>

</body>
</html>
