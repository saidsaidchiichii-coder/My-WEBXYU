<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<header class="top-nav">
  <div class="logo-container" onclick="location.reload()">Grok</div>

  <div class="nav-right">
    <button class="btn-signin" onclick="openAuth('login')">Sign in</button>
    <button class="btn-signup" onclick="openAuth('register')">Sign up</button>
  </div>
</header>

<main class="container">
  <section id="home" class="home-view">
    <h1 class="title">Grok</h1>

    <textarea id="homeInput" placeholder="Ask anything..."></textarea>
    <button onclick="startChat()">Send</button>
  </section>

  <section id="chat" class="chat-view hidden">
    <div id="messages"></div>
  </section>
</main>

<!-- ================= AUTH MODAL ================= -->
<div id="authModal" class="auth-modal hidden">
  <div class="auth-card">

    <h2 id="authTitle">Create account</h2>

    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="confirmPassword" type="password" placeholder="Confirm password">

    <label class="agree">
      <input type="checkbox" id="agree">
      I agree to terms
    </label>

    <button class="auth-btn" onclick="submitAuth()">Continue</button>

    <p class="switch">
      Already have account?
      <span onclick="toggleAuth()">Login</span>
    </p>

  </div>
</div>

<script src="ControleAi.js"></script>

<script>
lucide.createIcons();
AI.init("messages", "http://localhost:3000/api/chat");

let mode = "register";

function openAuth(m) {
  mode = m;
  document.getElementById("authModal").classList.remove("hidden");
  updateUI();
}

function toggleAuth() {
  mode = mode === "login" ? "register" : "login";
  updateUI();
}

function updateUI() {
  document.getElementById("authTitle").textContent =
    mode === "login" ? "Welcome back" : "Create account";

  document.getElementById("username").style.display =
    mode === "login" ? "none" : "block";

  document.getElementById("confirmPassword").style.display =
    mode === "login" ? "none" : "block";

  document.querySelector(".agree").style.display =
    mode === "login" ? "none" : "flex";
}

async function submitAuth() {
  const email = emailEl.value;
  const password = passwordEl.value;

  if (mode === "register") {
    const username = usernameEl.value;
    const confirm = confirmPassword.value;
    const agree = document.getElementById("agree").checked;

    if (!agree) return alert("You must agree");
    if (password !== confirm) return alert("Passwords not match");
  }

  const res = await fetch("http://localhost:3000/" + mode, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    authModal.classList.add("hidden");
  } else {
    alert("Error");
  }
}
</script>

</body>
</html>
