<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:
    radial-gradient(circle at 100% 50%, rgba(255,255,255,0.12), transparent 40%),
    linear-gradient(135deg,#000000,#0b0f14);
  height:100vh;
  overflow:hidden;
  color:white;
}

/* SOFT CURSOR LIGHT */
.cursor{
  position:fixed;
  width:150px;
  height:150px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
  transform:translate(-50%,-50%);
  z-index:999;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.btn{
  padding:8px 16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  transition:.25s;
}
.btn:hover{transform:scale(1.08);}

.login{background:#1a1a1a;color:white;}
.signup{background:white;color:black;}

/* HOME */
.center{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:25px;
}

.title{
  font-size:42px;
}

/* INPUT */
.inputBox{
  width:600px;
  max-width:90%;
  background:rgba(255,255,255,0.05);
  border-radius:999px;
  padding:14px;
  display:flex;
  backdrop-filter:blur(10px);
  transition:.3s;
}
.inputBox:hover{transform:scale(1.02);}

.inputBox input{
  flex:1;
  background:none;
  border:none;
  color:white;
  outline:none;
}

.send{
  width:42px;
  height:42px;
  border-radius:50%;
  background:white;
  color:black;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

/* CHAT */
.chat{
  display:none;
  height:100%;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
}

.msg{
  margin:10px 0;
  max-width:60%;
  padding:12px;
  border-radius:14px;
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;}
}

.user{
  background:white;
  color:black;
  margin-left:auto;
}

.ai{
  background:rgba(255,255,255,0.08);
}

/* THINKING */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#aaa;border-radius:50%;
  animation:blink 1s infinite;
}
@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* INPUT */
.bottom{
  padding:15px;
}
textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  border:none;
  color:white;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="top">
  <div>ILYASS AI</div>
  <div>
    <button class="btn login">Login</button>
    <button class="btn signup">Sign up</button>
  </div>
</div>

<div id="home" class="center">
  <div class="title">Ask Anything</div>

  <div class="inputBox">
    <input id="homeInput" onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput" onkeydown="handleKey(event)"></textarea>
  </div>
</div>

<script>

/* CURSOR LIGHT FIX */
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* SHIFT ENTER */
function handleKey(e){
  if(e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    send();
  }
}

/* START */
function startChat(){
  const text=homeInput.value.trim();
  if(!text)return;

  home.style.display="none";
  chat.style.display="flex";

  addMessage(text,"user");
  askAI(text);
}

/* TYPE */
function typeText(el,text){
  let i=0;
  const int=setInterval(()=>{
    el.innerHTML+=text[i++];
    if(i>=text.length)clearInterval(int);
  },15);
}

/* ADD */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;

  const c=document.createElement("div");
  div.appendChild(c);
  messages.appendChild(div);

  if(type==="ai") typeText(c,text);
  else c.innerText=text;

  messages.scrollTop=messages.scrollHeight;
}

/* THINK */
function thinking(){
  const d=document.createElement("div");
  d.className="msg ai";
  d.innerHTML=`<div class="thinking">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  messages.appendChild(d);
  return d;
}

/* AI */
async function askAI(text){
  const t=thinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    setTimeout(()=>{
      t.remove();
      addMessage(data.reply || "No response","ai");
    },1500);

  }catch{
    t.remove();
    addMessage("Error","ai");
  }
}

/* SEND */
function send(){
  const text=chatInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  chatInput.value="";
  askAI(text);
}

</script>

</body>
</html>
