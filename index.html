<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat UI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#0b0f19;
color:#fff;
height:100vh;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#0f172a;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:18px;
font-weight:800;
color:#00ff9c;
}

.new-chat{
padding:10px;
background:#111827;
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
cursor:pointer;
text-align:center;
transition:.3s;
}
.new-chat:hover{
background:#1f2937;
}

/* CHAT AREA */
.chat-area{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP BAR */
.topbar{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
background:#0f172a;
}

/* MESSAGES */
.messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:70%;
padding:12px 15px;
border-radius:12px;
line-height:1.4;
}

.user{
background:#00ff9c;
color:#000;
align-self:flex-end;
}

.ai{
background:#111827;
border:1px solid rgba(255,255,255,0.1);
align-self:flex-start;
}

/* INPUT */
.input-box{
display:flex;
padding:15px;
border-top:1px solid rgba(255,255,255,0.08);
background:#0f172a;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#111827;
color:#fff;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#00ff9c;
cursor:pointer;
font-weight:bold;
}
button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">⚡ MY AI</div>

<div class="new-chat">+ New Chat</div>

<p style="opacity:0.5;font-size:12px;margin-top:10px">
Chat UI like ChatGPT
</p>
</div>

<!-- CHAT -->
<div class="chat-area">

<div class="topbar">
AI Assistant
</div>

<div class="messages" id="messages">
<div class="msg ai">Hello 👋 كيف نعاونك اليوم؟</div>
</div>

<div class="input-box">
<input id="input" placeholder="Type your message..." />
<button onclick="send()">Send</button>
</div>

</div>

<script>

const OPENAI_API_KEY = "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"; 
// 👈 هنا دير API ديالك

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();
if(!text) return;

addMessage(text,"user");
input.value="";

try{

const res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${OPENAI_API_KEY}`
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"You are a helpful assistant."},
{role:"user",content:text}
]
})
});

const data = await res.json();
const reply = data.choices[0].message.content;

addMessage(reply,"ai");

}catch(err){
addMessage("Error: "+err.message,"ai");
}

}

function addMessage(text,type){

const div = document.createElement("div");
div.className = "msg " + type;
div.innerText = text;

document.getElementById("messages").appendChild(div);
document.getElementById("messages").scrollTop = 999999;

}
</script>

</body>
</html>
