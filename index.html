<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

body{
  background:#0f0f0f;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.newchat{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:14px;
  white-space:pre-wrap;
}

/* USER */
.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

/* AI */
.ai{
  align-self:flex-start;
  background:#1f1f1f;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#111;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}

/* 🔥 CHATGPT THINKING DOTS */
.thinking{
  display:inline-flex;
  gap:4px;
  align-items:center;
}

.dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:#aaa;
  animation:bounce 1.2s infinite ease-in-out;
}

.dot:nth-child(2){
  animation-delay:0.2s;
}
.dot:nth-child(3){
  animation-delay:0.4s;
}

@keyframes bounce{
  0%,80%,100%{transform:scale(0.6);opacity:0.4;}
  40%{transform:scale(1);opacity:1;}
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat">+ New Chat</div>
</div>

<!-- CHAT -->
<div class="chat">

  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 كيفاش نعاونك؟</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
    onkeydown="if(event.key==='Enter') send()" />
    <button id="btn" onclick="send()">Send</button>
  </div>

</div>

<script>

let loggedIn = true;
let thinkingEl = null;

/* ADD MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;

  const box=document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

/* 🔥 CHATGPT STYLE THINKING */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.id="thinking";

  div.innerHTML=`
    <div class="thinking">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;

  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop=document.getElementById("messages").scrollHeight;

  thinkingEl=div;
}

function removeThinking(){
  if(thinkingEl){
    thinkingEl.remove();
    thinkingEl=null;
  }
}

/* LOADING BUTTON */
function setLoading(state){
  const btn=document.getElementById("btn");
  btn.disabled=state;
  btn.innerText=state ? "..." : "Send";
}

/* SEND */
async function send(){

  if(!loggedIn) return;

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  setLoading(true);

  // 🧠 SHOW THINKING BEFORE REQUEST
  showThinking();

  try{

    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    // 🧠 REMOVE THINKING WHEN DONE
    removeThinking();

    addMessage(data.reply || "No response","ai");

  }catch(err){

    removeThinking();
    addMessage("❌ ERROR:\n"+err.message,"ai");
  }

  setLoading(false);
}

</script>

</body>
</html>
