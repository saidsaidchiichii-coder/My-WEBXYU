<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ilyass AI Clone</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background: radial-gradient(circle at top, #0f172a, #000);
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* NAV */
.nav{
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
  font-weight:700;
  border-bottom:1px solid #111;
}

.nav span{
  color:#22c55e;
  margin-left:8px;
  font-size:12px;
}

.btn{
  background:#22c55e;
  color:black;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* CHAT */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
  display:none;
}

/* LOGIN BOX */
.login-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.login-box input{
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

/* CENTER */
.center{
  position:absolute;
  top:60px;
  bottom:80px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

.title{
  font-size:48px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* INPUT */
.input-area{
  position:fixed;
  bottom:80px;
  left:0;
  width:100%;
  height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
  border-top:1px solid #111;
}

.input-box{
  width:700px;
  max-width:95%;
  height:55px;
  background:rgba(255,255,255,0.05);
  border-radius:999px;
  display:flex;
  align-items:center;
  padding:0 14px;
}

.input-box input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:white;
}

.send{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#22c55e;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#555;
  padding:5px;
}
</style>
</head>

<body>

<div class="nav">
  ◆ ILYASS AI <span id="status">● offline</span>
  <button class="btn" onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div class="chat-box" id="messages"></div>

<div class="center" id="centerBox">
  <div class="title">ILYASS AGENT AI</div>
</div>

<div class="input-area">
  <div class="input-box">
    <input id="input" placeholder="Ask anything..." />
    <div class="send" onclick="send()">➤</div>
  </div>
</div>

<div class="footer">
  Contact: saidsaidchiichii@gmail.com
</div>

<script>
const supabaseUrl = "https://ypqkmuflothekoaxwupn.supabase.co";
const supabaseKey = "PUT_YOUR_ANON_KEY_HERE";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

const loginBox = document.getElementById("loginBox");
const chatBox = document.getElementById("messages");
const status = document.getElementById("status");

/* SIGN UP */
async function signUp(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({ email, password });
  alert("Check email!");
}

/* LOGIN */
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email, password
  });

  if(data.user){
    loginBox.style.display="none";
    chatBox.style.display="flex";
    status.innerText="● online";
  }
}

/* LOGOUT */
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* SEND */
async function send(){
  const text = document.getElementById("input").value;
  if(!text) return;

  const row = document.createElement("div");
  row.innerText = "You: " + text;
  chatBox.appendChild(row);

  document.getElementById("input").value="";

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  const data = await res.json();

  const bot = document.createElement("div");
  bot.innerText = "AI: " + data.reply;
  chatBox.appendChild(bot);
}

/* CHECK SESSION */
async function checkUser(){
  const { data } = await supabase.auth.getSession();

  if(data.session){
    loginBox.style.display="none";
    chatBox.style.display="flex";
    status.innerText="● online";
  }
}

checkUser();
</script>

</body>
</html>
