<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:linear-gradient(135deg,#ffffff,#f3f4f6);
  height:100vh;
  display:flex;
  flex-direction:column;
  animation:fadeIn .6s ease;
  position: relative; /* للـ3D canvas */
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;}
}

/* 🔥 3D CANVAS - فوق كلشي */
#threeCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0; /* تحت الـUI */
  pointer-events: none; /* ما يعطلش الـclicks */
}

/* باقي الـCSS نفسو بالضبط */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
  position: relative; z-index: 10;
}

.logo{font-weight:bold;font-size:18px;}

.auth{display:flex;gap:10px;}

.btn{
  padding:8px 16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
}

.login{background:#eee;}
.signup{background:#111;color:white;}

/* CENTER */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
  position: relative; z-index: 10;
}

.title{font-size:40px;font-weight:bold;}

/* INPUT */
.inputBox{
  width:600px;
  max-width:90%;
  background:white;
  border-radius:999px;
  padding:12px 15px;
  display:flex;
  align-items:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  position: relative; z-index: 10;
}

.inputBox input{
  flex:1;
  border:none;
  outline:none;
  font-size:15px;
}

.send{
  width:40px;height:40px;
  border-radius:50%;
  background:#10a37f;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{display:none;flex:1;flex-direction:column; position: relative; z-index: 10;}

/* باقي الـCSS نفسو... */
.messages{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:65%;
  padding:12px;
  border-radius:12px;
}

.user{align-self:flex-end;background:#10a37f;color:white;}
.ai{align-self:flex-start;background:white;border:1px solid #eee;}

/* باقي نفسو... */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#999;border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

.bottom{
  padding:15px;
  border-top:1px solid #eee;
  display:flex;
}
.bottom input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<!-- 🔥 3D BACKGROUND -->
<canvas id="threeCanvas"></canvas>

<div class="top">
  <div class="logo">ILYASS AI</div>
  <div class="auth">
    <button class="btn login">Login</button>
    <button class="btn signup">Sign up</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="center">
  <div class="title">Ask anything</div>

  <div class="inputBox">
    <input id="homeInput" placeholder="What do you want to know?"
      onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <input id="chatInput" placeholder="Send a message..."
      onkeydown="if(event.key==='Enter') send()">
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* 🔥 3D EFFECTS - فوق الكود الأصلي */

// Mouse position
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

// Three.js Scene
const canvas = document.getElementById('threeCanvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0); // شفاف

camera.position.z = 5;

// 1️⃣ موجات نيون
const neonWave = new THREE.Group();
for(let i = 0; i < 20; i++) {
  const geometry = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-10 + i*1, 0, 0),
    new THREE.Vector3(-10 + i*1, Math.sin(Date.now() * 0.001 + i) * 2, 0)
  ]);
  const material = new THREE.LineBasicMaterial({ 
    color: new THREE.Color().setHSL(0.4 + i*0.02, 1, 0.5 + Math.sin(Date.now()*0.001)*0.2),
    transparent: true, opacity: 0.6
  });
  const line = new THREE.Line(geometry, material);
  neonWave.add(line);
}
scene.add(neonWave);

// 2️⃣ كريستال عائم
const crystalGeo = new THREE.OctahedronGeometry(0.3);
const crystalMat = new THREE.MeshPhongMaterial({ 
  color: 0x00ff88, 
  transparent: true, opacity: 0.8,
  shininess: 100
});
const crystal = new THREE.Mesh(crystalGeo, crystalMat);
crystal.position.set(0, 0, -2);
scene.add(crystal);

// 3️⃣ مجرة نجوم
const starsGeo = new THREE.BufferGeometry();
const starsVertices = [];
for(let i = 0; i < 200; i++) {
  starsVertices.push(
    (Math.random() - 0.5) * 20,
    (Math.random() - 0.5) * 20,
    (Math.random() - 0.5) * 20
  );
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
const starsMat = new THREE.PointsMaterial({ color: 0x00bfff, size: 0.05 });
const stars = new THREE.Points(starsGeo, starsMat);
scene.add(stars);

// 4️⃣ شبكة عصبية
const nodes = [];
for(let i = 0; i < 15; i++) {
  const node = new THREE.Mesh(
    new THREE.SphereGeometry(0.08),
    new THREE.MeshBasicMaterial({ color: 0x00ff88 })
  );
  node.position.set(
    (Math.random() - 0.5) * 8,
    (Math.random() - 0.5) * 8,
    (Math.random() - 0.5) * 4
  );
  nodes.push(node);
  scene.add(node);
}

// 5️⃣ فقاعات معدنية
function createBubble() {
  const bubble = new THREE.Mesh(
    new THREE.SphereGeometry(Math.random() * 0.3 + 0.1),
    new THREE.MeshPhongMaterial({ 
      color: 0x888888, 
      transparent: true, opacity: 0.7,
      metalness: 0.8, roughness: 0.2
    })
  );
  bubble.position.set(
    (Math.random() - 0.5) * 10,
    -5, 
    (Math.random() - 0.5) * 5
  );
  scene.add(bubble);
  
  // انفجار بعد ثواني
  setTimeout(() => {
    scene.remove(bubble);
  }, 4000);
}

// إضاءة
const light = new THREE.PointLight(0xffffff, 1, 100);
light.position.set(0, 0, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040, 0.3));

// Animate loop
function animate() {
  requestAnimationFrame(animate);

  // موجات نيون تتحرك مع الماوس
  neonWave.rotation.y = mouseX * 0.5;
  neonWave.children.forEach((line, i) => {
    line.material.color.setHSL(0.4 + i*0.02, 1, 0.5 + Math.sin(Date.now()*0.001 + i)*0.2);
  });

  // كريستال يدور ويتكسر
  crystal.rotation.x += 0.01;
  crystal.rotation.y += 0.02 + mouseX * 0.1;
  crystal.scale.setScalar(1 + Math.sin(Date.now() * 0.005) * 0.1);

  // مجرة تدور
  stars.rotation.y += 0.002;
  stars.rotation.x = mouseY * 0.3;

  // شبكة عصبية تضيء
  nodes.forEach((node, i) => {
    node.rotation.y += 0.01;
    const time = Date.now() * 0.001 + i;
    node.material.color.setHSL(0.4, 1, 0.3 + Math.sin(time) * 0.3);
    node.scale.setScalar(1 + Math.sin(time) * 0.2);
  });

  // فقاعات جديدة
  if(Math.random() < 0.1) createBubble();

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* 🔥 باقي كودك الأصلي نفسو بالضبط */
const API_URL = "https://my-webxyu.vercel.app/api/chat";

function startChat(){
  const text=document.getElementById("homeInput").value.trim();
  if(!text) return;

  document.getElementById("home").style.display="none";
  document.getElementById("chat").style.display="flex";

  addMessage(text,"user");
  document.getElementById("homeInput").value="";

  askAI(text);
}

function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  document.getElementById("messages").appendChild(div);
  typeText(div,text);
}

function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },10);
}

function thinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`
    <div class="thinking">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>`;
  document.getElementById("messages").appendChild(div);
  return div;
}

async function askAI(message){
  const t = thinking();

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    t.remove();
    addMessage(data.reply || "No response","ai");

  }catch(err){
    t.remove();
    addMessage("Error connecting to API ❌","ai");
  }
}

function send(){
  const input=document.getElementById("chatInput");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  askAI(text);
}
</script>

</body>
</html>
