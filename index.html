<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

body{
  background:#0f0f0f;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.newchat{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:12px 14px;
  border-radius:14px;
  white-space: pre-wrap;
  position:relative;
  word-wrap: break-word;
}

/* USER */
.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

/* AI */
.ai{
  align-self:flex-start;
  background:#1f1f1f;
}

/* 🔥 CODE BLOCK FIX */
pre{
  background:#000;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
  font-size:13px;
  white-space: pre;
}

code{
  font-family: monospace;
}

/* COPY BUTTON */
.copyBtn{
  position:absolute;
  top:5px;
  right:5px;
  font-size:10px;
  padding:3px 6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#333;
  color:white;
  opacity:0;
}

.msg.ai:hover .copyBtn{
  opacity:1;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#111;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}

/* THINKING */
.thinking{
  display:flex;
  gap:5px;
  align-items:center;
}

.dot{
  width:6px;
  height:6px;
  background:#aaa;
  border-radius:50%;
  animation:bounce 0.5s infinite ease-in-out;
}

.dot:nth-child(2){animation-delay:0.1s;}
.dot:nth-child(3){animation-delay:0.2s;}

@keyframes bounce{
  0%,100%{transform:translateY(0); opacity:0.4;}
  50%{transform:translateY(-4px); opacity:1;}
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat">+ New Chat</div>
</div>

<div class="chat">

  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 كيفاش نعاونك؟</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
    onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

let thinkingEl = null;

/* AUTO SCROLL */
function scrollToBottom(){
  const box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;
}

/* ADD MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
  scrollToBottom();
  return div;
}

/* AI MESSAGE WITH COPY */
function addAIMessage(text){
  const div=document.createElement("div");
  div.className="msg ai";

  const btn=document.createElement("button");
  btn.className="copyBtn";
  btn.innerText="Copy";
  btn.onclick=()=>navigator.clipboard.writeText(div.innerText);

  div.appendChild(btn);
  document.getElementById("messages").appendChild(div);

  scrollToBottom();
  return div;
}

/* THINKING */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`
    <div class="thinking">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;
  document.getElementById("messages").appendChild(div);
  thinkingEl = div;
  scrollToBottom();
}

function hideThinking(){
  if(thinkingEl){
    thinkingEl.remove();
    thinkingEl=null;
  }
}

/* TYPE (FIXED for CODE too) */
function typeText(element, text, speed = 10){
  let i = 0;
  element.innerHTML = "";

  const interval = setInterval(() => {
    element.innerHTML += text[i];
    i++;

    scrollToBottom();

    if(i >= text.length){
      clearInterval(interval);
    }
  }, speed);
}

/* SEND */
async function send(){

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  showThinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    hideThinking();

    setTimeout(()=>{
      const msg = addAIMessage("");
      typeText(msg, data.reply || "No response", 8);
    }, 300);

  }catch{
    hideThinking();
    addMessage("Chat error","ai");
  }
}

</script>

</body>
</html>
