<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP -->
<div class="top">
  <div class="logo">ILYASS AI</div>

 
  <div class="ai-config-box">
    <div class="ai-title">🧠 AI CONFIG</div>
    <div id="aiConfigText" class="ai-text"></div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="center">
  <div class="title">Ask anything</div>

  <div class="inputBox">
    <input id="homeInput" placeholder="What do you want to know?"
      onkeydown="if(event.key==='Enter') startChat()">

    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <input id="chatInput" placeholder="Send a message..."
      onkeydown="if(event.key==='Enter') send()">
  </div>
</div>

<script src="ai_config.js"></script>
<script src="ControleAi.js"></script>

<script>
AI.init("messages","https://my-webxyu.vercel.app/api/chat");


// 🧠 SHOW AI CONFIG (NEW)
document.addEventListener("DOMContentLoaded", () => {
  const box = document.getElementById("aiConfigText");

  if (window.AI_CONFIG) {
    box.innerHTML = `
      Name: ${AI_CONFIG.name}<br>
      Style: ${AI_CONFIG.style.tone}<br>
      Length: ${AI_CONFIG.style.length}<br>
      Language: ${AI_CONFIG.language}
    `;
  } else {
  }
});


function startChat(){
  const text=document.getElementById("homeInput").value.trim();
  if(!text) return;

  document.getElementById("home").style.display="none";
  document.getElementById("chat").style.display="flex";

  AI.user(text);
  document.getElementById("homeInput").value="";

  AI.ask(text);
}

function send(){
  const input=document.getElementById("chatInput");
  const text=input.value.trim();
  if(!text) return;

  AI.user(text);
  input.value="";

  AI.ask(text);
}
</script>

</body>
</html>
