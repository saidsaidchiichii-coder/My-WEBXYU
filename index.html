<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:#f7f7f8;
  color:#111;
  height:100vh;
  display:flex;
  animation:fadeIn .5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:#ffffff;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid #e5e5e5;
}

.logo{font-weight:bold;font-size:18px;}

.newchat{
  margin-top:15px;
  padding:12px;
  background:#10a37f;
  color:white;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  font-weight:600;
}
.newchat:hover{background:#0d8c6d;}

.recents{
  margin-top:20px;
  font-size:12px;
  color:#777;
}

.chatList{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  max-height:400px;
  overflow:auto;
}

.chatItem{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#f1f1f1;
  border-radius:10px;
  cursor:pointer;
}
.chatItem:hover{background:#e7e7e7;}

.menuBtn{
  cursor:pointer;
  padding:0 5px;
}

/* PROFILE */
.profile{
  background:#f1f1f1;
  padding:10px;
  border-radius:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#10a37f;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  overflow:hidden;
}

.logout{
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:65%;
  padding:14px;
  border-radius:14px;
  font-size:14px;
  line-height:1.5;
}

.user{
  align-self:flex-end;
  background:#10a37f;
  color:white;
}

.ai{
  align-self:flex-start;
  background:white;
  border:1px solid #e5e5e5;
}

/* THINKING */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#999;border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:white;
  border-top:1px solid #e5e5e5;
}

input{
  flex:1;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
}

.sendBtn{
  margin-left:10px;
  width:45px;
  border:none;
  border-radius:10px;
  background:#10a37f;
  color:white;
  cursor:pointer;
  font-size:18px;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  background:white;
  border:1px solid #ddd;
  border-radius:10px;
  display:none;
  flex-direction:column;
}
.dropdown div{
  padding:10px;
  cursor:pointer;
}
.dropdown div:hover{background:#f1f1f1;}

</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="logo">ILYASS AI</div>
    <div class="newchat" onclick="newChat()">+ New Chat</div>

    <div class="recents">Recents</div>
    <div id="chatList" class="chatList"></div>
  </div>

  <div class="profile">
    <div class="avatar" onclick="uploadPhoto()">
      <img id="avatarImg" style="width:100%;height:100%;display:none;">
      <span id="avatarText">U</span>
    </div>

    <div>
      <div id="profileName">User</div>
      <div id="profileEmail" style="font-size:12px;color:#777;"></div>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <input type="file" id="fileInput" hidden onchange="handlePhoto(event)">
</div>

<div class="chat">
  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="input" placeholder="Send a message..."
      onkeydown="if(event.key==='Enter') send()">
    <button class="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<div id="dropdown" class="dropdown"></div>

<script>

let currentChatId=null;
let activeMenuId=null;

/* USER LOAD */
window.onload=()=>{
  const user=JSON.parse(localStorage.getItem("user"));
  if(user){
    document.getElementById("profileEmail").innerText=user.email;
    document.getElementById("avatarText").innerText=user.email[0].toUpperCase();
    loadChats();
  }
};

/* STORAGE */
function getUserKey(){
  const user=JSON.parse(localStorage.getItem("user"));
  return "chats_"+user.email;
}

/* LOAD CHATS */
function loadChats(){
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const list=document.getElementById("chatList");
  list.innerHTML="";

  chats.forEach(c=>{
    const div=document.createElement("div");
    div.className="chatItem";

    div.innerHTML=`
      <div onclick="openChat(${c.id})">${c.title}</div>
      <div class="menuBtn" onclick="toggleMenu(event,${c.id})">⋯</div>
    `;
    list.appendChild(div);
  });
}

/* MENU */
function toggleMenu(e,id){
  e.stopPropagation();
  activeMenuId=id;

  const menu=document.getElementById("dropdown");
  menu.style.display="flex";
  menu.style.top=e.pageY+"px";
  menu.style.left=e.pageX+"px";

  menu.innerHTML=`
    <div onclick="renameChat()">Rename</div>
    <div onclick="deleteChat()">Delete</div>
  `;
}

document.addEventListener("click",()=>{
  document.getElementById("dropdown").style.display="none";
});

/* DELETE */
function deleteChat(){
  let chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  chats=chats.filter(c=>c.id!==activeMenuId);
  localStorage.setItem(getUserKey(),JSON.stringify(chats));
  loadChats();
}

/* RENAME */
function renameChat(){
  const name=prompt("New name:");
  if(!name) return;

  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===activeMenuId);
  chat.title=name;

  localStorage.setItem(getUserKey(),JSON.stringify(chats));
  loadChats();
}

/* NEW CHAT */
function newChat(){
  currentChatId=Date.now();

  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  chats.push({id:currentChatId,title:"New chat",messages:[]});
  localStorage.setItem(getUserKey(),JSON.stringify(chats));

  loadChats();
  document.getElementById("messages").innerHTML="";
}

/* OPEN */
function openChat(id){
  currentChatId=id;
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===id);

  const box=document.getElementById("messages");
  box.innerHTML="";

  chat.messages.forEach(m=>{
    addMessage(m.text,m.type);
  });
}

/* SAVE */
function saveMessage(text,type){
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===currentChatId);

  chat.messages.push({text,type});

  if(chat.messages.length===1){
    chat.title=text.slice(0,25);
  }

  localStorage.setItem(getUserKey(),JSON.stringify(chats));
  loadChats();
}

/* MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  document.getElementById("messages").appendChild(div);
  typeText(div,text);
}

/* TYPING EFFECT */
function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const interval=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },15);
}

/* THINKING */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  document.getElementById("messages").appendChild(div);
}

function removeThinking(){
  const t=document.querySelector(".thinking");
  if(t) t.parentElement.remove();
}

/* SEND */
async function send(){
  if(!currentChatId){
    newChat();
  }

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  saveMessage(text,"user");
  input.value="";

  showThinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    removeThinking();
    addMessage(data.reply || "AI","ai");
    saveMessage(data.reply || "AI","ai");

  }catch{
    removeThinking();
    addMessage("⚠️ Error","ai");
  }
}

/* PHOTO */
function uploadPhoto(){
  document.getElementById("fileInput").click();
}

function handlePhoto(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    document.getElementById("avatarImg").src=reader.result;
    document.getElementById("avatarImg").style.display="block";
    document.getElementById("avatarText").style.display="none";
  };
  reader.readAsDataURL(file);
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

</script>

</body>
</html>
