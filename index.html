<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Groq Design</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i data-lucide="sparkles"></i>
                <span>AI Studio</span>
            </div>
            <div class="nav-links">
                <button class="nav-btn active" onclick="AI.setMode('chat')">
                    <i data-lucide="message-square"></i> <span>Chat</span>
                </button>
                <button class="nav-btn" onclick="AI.setMode('image')">
                    <i data-lucide="image"></i> <span>Imagine</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div id="messages" class="messages-container">
                <!-- Messages will be injected here by ControleAi.js -->
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="chatInput" placeholder="How can I help you today?" onkeypress="if(event.key === 'Enter') AI.handleSend()">
                    <button class="send-btn" onclick="AI.handleSend()">
                        <i data-lucide="send" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="ControleAi.js"></script>
    <script src="chat.js"></script>
    <script>
        // Initialize AI and Lucide
        document.addEventListener('DOMContentLoaded', () => {
            AI.init('messages');
            lucide.createIcons();
        });
    </script>
</body>
</html>
