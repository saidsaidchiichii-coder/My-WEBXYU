<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --bg-color:#000;
    --text-color:#e7e9ea;
    --secondary-text:#71767b;
    --border-color:#2f3336;
    --input-bg:#16181c;
    --hover-bg:#1d1f23;
    --accent:#1d9bf0;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    background:var(--bg-color);
    color:var(--text-color);
    font-family:Inter;
    overflow:hidden;
}

/* NAV */
.top-nav{
    height:56px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 16px;
    border-bottom:1px solid var(--border-color);
}

.nav-right button{
    margin-left:10px;
    padding:8px 14px;
    border-radius:20px;
    border:1px solid var(--border-color);
    background:transparent;
    color:var(--text-color);
    cursor:pointer;
}

.btn-signup{
    background:var(--text-color);
    color:#000;
}

/* CHAT */
.container{
    height:calc(100vh - 56px);
    display:flex;
    flex-direction:column;
}

.chat{
    flex:1;
    overflow:auto;
    padding:20px;
}

.msg{
    margin:10px 0;
    padding:10px 14px;
    border-radius:14px;
    max-width:70%;
}

.user{
    background:var(--accent);
    margin-left:auto;
}

.ai{
    border:1px solid var(--border-color);
}

/* INPUT */
.input{
    display:flex;
    padding:12px;
    border-top:1px solid var(--border-color);
}

.input input{
    flex:1;
    padding:10px;
    border-radius:12px;
    border:1px solid var(--border-color);
    background:var(--input-bg);
    color:white;
}

/* MODAL */
.auth{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.7);
}

.auth-box{
    width:320px;
    background:var(--input-bg);
    padding:20px;
    border-radius:14px;
}

.auth-box input{
    width:100%;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border-color);
    background:transparent;
    color:white;
}

.auth-box button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="top-nav">
    <div>AI</div>

    <div class="nav-right">
        <button onclick="openAuth('login')">Sign in</button>
        <button class="btn-signup" onclick="openAuth('register')">Sign up</button>
    </div>
</div>

<!-- CHAT -->
<div class="container">

    <div id="chat" class="chat"></div>

    <div class="input">
        <input id="msg" placeholder="Type..." />
        <button onclick="send()">Send</button>
    </div>

</div>

<!-- AUTH -->
<div id="auth" class="auth">
    <div class="auth-box">

        <h3 id="title">Login</h3>

        <input id="email" placeholder="email">
        <input id="password" type="password" placeholder="password">

        <button onclick="submitAuth()">Continue</button>
        <button onclick="closeAuth()">Close</button>

    </div>
</div>

<script>
let mode="login";

function openAuth(m){
    mode=m;
    document.getElementById("auth").style.display="flex";
    document.getElementById("title").innerText=m;
}

function closeAuth(){
    document.getElementById("auth").style.display="none";
}

function submitAuth(){
    let email=document.getElementById("email").value;
    let pass=document.getElementById("password").value;

    fetch("https://my-webxyu.vercel.app/"+mode,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,pass})
    })
    .then(r=>r.json())
    .then(d=>{
        if(d.token){
            localStorage.setItem("token",d.token);
            closeAuth();
        }
    });
}

function send(){
    let input=document.getElementById("msg");
    let chat=document.getElementById("chat");

    let user=document.createElement("div");
    user.className="msg user";
    user.innerText=input.value;
    chat.appendChild(user);

    fetch("https://my-webxyu.vercel.app/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:input.value})
    })
    .then(r=>r.json())
    .then(d=>{
        let ai=document.createElement("div");
        ai.className="msg ai";
        ai.innerText=d.reply;
        chat.appendChild(ai);
    });

    input.value="";
}
</script>

</body>
</html>
