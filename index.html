<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

/* ================= GLOBAL ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:
    radial-gradient(circle at 85% 50%, rgba(255,255,255,0.15), transparent 40%),
    linear-gradient(135deg, #000000 0%, #05070a 40%, #0b0f14 100%);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle, rgba(16,163,127,0.15), transparent 70%);
  animation:glow 5s ease forwards;
  pointer-events:none;
}

@keyframes glow{ from{opacity:0;} to{opacity:1;} }

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{color:white;font-weight:bold;}

.auth{display:flex;gap:10px;}

.btn{
  padding:8px 16px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{transform:scale(1.1);}

.login{background:#1a1a1a;color:white;}
.signup{background:white;color:black;}

/* HOME */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
}

.title{
  font-size:42px;
  color:white;
  animation:float 4s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.inputBox{
  display:flex;
  width:600px;
  max-width:90%;
  background:rgba(255,255,255,0.08);
  border-radius:999px;
  padding:12px;
  backdrop-filter:blur(10px);
}

.inputBox input{
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:white;
}

.send{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#10a37f;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  display:none;
  flex:1;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:65%;
  padding:12px;
  border-radius:12px;
}

.user{align-self:flex-end;background:white;color:black;}
.ai{align-self:flex-start;background:rgba(255,255,255,0.08);color:white;}

/* THINKING */
.thinking{display:flex;gap:6px;}
.dot{
  width:6px;height:6px;background:#aaa;border-radius:50%;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* INPUT */
.bottom{
  display:flex;
  gap:10px;
  padding:15px;
}

.bottom textarea{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

.sendBtn{
  width:50px;
  border:none;
  border-radius:10px;
  background:#10a37f;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="top">
  <div class="logo">ILYASS AI</div>
  <div class="auth">
    <button class="btn login" onclick="openLogin()">Login</button>
    <button class="btn signup" onclick="openLogin()">Sign up</button>
  </div>
</div>

<div id="home" class="center">
  <div class="title">Ask Anything</div>

  <div class="inputBox">
    <input id="homeInput" onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput" onkeydown="handleKey(event)"></textarea>
    <button class="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<script>

const messages = document.getElementById("messages");

/* LOGIN */
function openLogin(){
  alert("Login system already UI only (Supabase not connected)");
}

/* CHAT START */
function startChat(){
  const text = homeInput.value.trim();
  if(!text) return;

  home.style.display="none";
  chat.style.display="flex";

  addMessage(text,"user");
  askAI(text);
}

/* TYPE EFFECT */
function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },15);
}

/* ADD MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;

  const content=document.createElement("div");
  div.appendChild(content);

  messages.appendChild(div);

  if(type==="ai") typeText(content,text);
  else content.innerText=text;

  messages.scrollTop=messages.scrollHeight;
}

/* THINKING */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
  return div;
}

/* 🔥 REAL API FIX HERE */
async function askAI(text){
  const t = showThinking();

  try{
    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    t.remove();
    addMessage(data.reply || "No response", "ai");

  }catch(err){
    t.remove();
    addMessage("Server not connected ❌", "ai");
  }
}

/* SEND */
function handleKey(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
}

function send(){
  const text = chatInput.value.trim();
  if(!text) return;

  addMessage(text,"user");
  chatInput.value="";
  askAI(text);
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let dots=[];
for(let i=0;i<50;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dots.forEach(d=>{
    d.x+=d.vx;
    d.y+=d.vy;

    if(d.x<0||d.x>canvas.width)d.vx*=-1;
    if(d.y<0||d.y>canvas.height)d.vy*=-1;

    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.fillStyle="#10a37f";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
