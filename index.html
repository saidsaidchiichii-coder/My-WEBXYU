<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:
    radial-gradient(circle at 85% 50%, rgba(255,255,255,0.15), transparent 40%),
    linear-gradient(135deg, #000000 0%, #05070a 40%, #0b0f14 100%);

  const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".msg, .title, .inputBox").forEach(el=>{
  observer.observe(el);
});


  .msg, .title, .inputBox{
  opacity:0;
  transform:translateY(40px) scale(0.95);
  transition:0.6s ease;
}

.show{
  opacity:1;
  transform:translateY(0) scale(1);
}
  .title{
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}
  body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle, rgba(16,163,127,0.15), transparent 70%);
  opacity:0;
  animation:glow 5s ease forwards;
}

@keyframes glow{
  to{opacity:1;}
}document.querySelectorAll("button, .send").forEach(btn=>{
  btn.addEventListener("click",function(e){
    const wave=document.createElement("span");
    wave.style.position="absolute";
    wave.style.width="10px";
    wave.style.height="10px";
    wave.style.background="rgba(255,255,255,0.5)";
    wave.style.borderRadius="50%";
    wave.style.left=e.offsetX+"px";
    wave.style.top=e.offsetY+"px";
    wave.style.transform="scale(0)";
    wave.style.pointerEvents="none";

    this.appendChild(wave);

    wave.animate([
      {transform:"scale(0)",opacity:1},
      {transform:"scale(8)",opacity:0}
    ],{duration:500});

    setTimeout(()=>wave.remove(),500);
  });
});
  messages.addEventListener("scroll",()=>{
  const depth = messages.scrollTop;

  messages.style.transform = `
    perspective(1000px)
    translateZ(${depth * -0.2}px)
  `;
});
/* GLOBAL HOVER 3D */
button, .send, .inputBox{
  transition:.25s;
}
button:hover, .send:hover{
  transform:scale(1.08);
}

/* 3D ANIM */
.fadeOut{animation:zoomOut .6s forwards;}
.fadeIn{animation:zoomIn .6s forwards;}
.slideUp{animation:slideUp .4s ease;}

@keyframes zoomOut{
  from{opacity:1;transform:scale(1) rotateX(0deg);}
  to{opacity:0;transform:scale(1.1) rotateX(10deg);}
}
@keyframes zoomIn{
  from{opacity:0;transform:scale(0.9) rotateX(-10deg);}

}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}

}

/* PARTICLES */
canvas{
  position:fixed;
  inset:0;

<body>

<canvas id="particles"></canvas>

<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign up</button>
  </div>
</div>

<div class="top">
  <div class="logo">ILYASS AI</div>

  <div class="auth">
    <button class="btn login" onclick="openLogin()">Login</button>
    <button class="btn signup" onclick="openLogin()">Sign up</button>
  </div>
</div>

<div id="home" class="center">
  <div class="title">Ask Anything</div>

  <div class="inputBox"> 
    <input id="homeInput"
      onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput"
      onkeydown="handleKey(event)"></textarea>
  </div>
</div>

<script>

let loggedIn=false;

function openLogin(){
  loginOverlay.style.display="flex";
}

const { createClient } = supabase;
const supabaseClient = createClient(
  "https://idjgsgtupuymysptxrbl.supabase.co",
  "sb_publishable_XLIIiXZRcS5hrvdQP_pkMA_w2I11xFH"
);

async function login(){
  const {error}=await supabaseClient.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });

  if(error){alert(error.message);return;}

  loggedIn=true;
  loginOverlay.style.display="none";
}

async function signup(){
  const {error}=await supabaseClient.auth.signUp({
    email:email.value,
    password:password.value
  });

  if(error){alert(error.message);return;}

  alert("Check email 📩");
}

function handleKey(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
}

/* ✅ التعديل هنا */
function startChat(){
  const text=homeInput.value.trim();
  if(!text)return;

  home.classList.add("fadeOut");

  setTimeout(()=>{
    home.style.display="none";
    chat.style.display="flex";
    chat.classList.add("fadeIn");

    addMessage(text,"user");
    askAI(text);

  },600);
}

function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },15);
}

function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;

  const content=document.createElement("div");
  div.appendChild(content);

  messages.appendChild(div);

  if(type==="ai"){
    typeText(content,text);
  }else{
    content.innerText=text;
  }

  scrollBottom();
}

function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  messages.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom(){
  messages.scrollTop=messages.scrollHeight;
}

async function askAI(text){
  const t=showThinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    setTimeout(()=>{
      t.remove();
      addMessage(data.reply || "No response","ai");
    },1200);

  }catch{
    t.remove();
    addMessage("Error","ai");
  }
}

function send(){ 
  
  const text=chatInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  chatInput.value="";
  askAI(text);
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let dots=[];
for(let i=0;i<50;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dots.forEach(d=>{
    d.x+=d.vx;
    d.y+=d.vy;

    if(d.x<0||d.x>canvas.width)d.vx*=-1;
    if(d.y<0||d.y>canvas.height)d.vy*=-1;

    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.fillStyle="#10a37f";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
