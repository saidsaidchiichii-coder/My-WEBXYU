<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ilyass AI Clone</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background: radial-gradient(circle at top, #0f172a, #000);
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* NAV */
.nav{
  height:60px;
  display:flex;
  align-items:center;
  padding:0 24px;
  font-weight:700;
  border-bottom:1px solid #111;
}

.nav span{
  color:#22c55e;
  margin-left:8px;
  font-size:12px;
}

/* CHAT */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* CENTER */
.center{
  position:absolute;
  top:60px;
  bottom:80px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  transition:0.3s;
}

.title{
  font-size:48px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* INPUT */
.input-area{
  height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
  border-top:1px solid #111;
}

.input-box{
  width:700px;
  max-width:95%;
  height:55px;
  background:rgba(255,255,255,0.05);
  border-radius:999px;
  display:flex;
  align-items:center;
  padding:0 14px;
  backdrop-filter: blur(10px);
  transition:0.3s;
}

.input-box:focus-within{
  box-shadow:0 0 10px #22c55e;
}

.input-box input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:16px;
}

.send{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#22c55e;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}

.send:hover{
  transform:scale(1.1);
}

/* MESSAGE ROW */
.row{
  display:flex;
  align-items:flex-end;
  gap:10px;
}

/* AVATAR */
.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background:#22c55e;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  flex-shrink:0;
}

/* MESSAGES */
.msg{
  max-width:65%;
  padding:12px 16px;
  border-radius:16px;
  white-space:pre-wrap;
  animation:fadeUp 0.25s ease;
  position:relative;
}

/* TIMESTAMP */
.time{
  font-size:10px;
  opacity:0.5;
  margin-top:4px;
}

.user{
  background:#22c55e;
  color:black;
  align-self:flex-end;
}

.ai{
  background:#1f2937;
  color:#e5e7eb;
}

/* THINKING DOTS */
.thinking{
  display:flex;
  gap:4px;
}

.dot{
  width:6px;
  height:6px;
  background:#aaa;
  border-radius:50%;
  animation:blink 1.2s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
  0%,80%,100%{opacity:0.2;}
  40%{opacity:1;}
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  color:#555;
  padding:5px;
}
</style>
</head>

<body>

<div class="nav">
  ◆ ILYASS AI AGENT <span>● online</span>
</div>

<div class="chat-box" id="messages"></div>

<div class="center" id="centerBox">
  <div class="title">ILYASS AI</div>
</div>

<div class="input-area">
  <div class="input-box">
    <input id="input" placeholder="Ask anything..." />
    <div class="send" id="sendBtn">➤</div>
  </div>
</div>

<div class="footer">
  Contact: saidsaidchiichii@gmail.com
</div>
  
<script>
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const box = document.getElementById("messages");
const center = document.getElementById("centerBox");

let loading = false;
let started = false;

input.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener("click", send);

/* TIME */
function getTime(){
  const d = new Date();
  return d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0');
}

/* ADD MESSAGE */
function addMessage(text,type){
  const row = document.createElement("div");
  row.className = "row";

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.innerText = type === "user" ? "U" : "AI";

  const msgBox = document.createElement("div");
  msgBox.className = "msg " + type;
  msgBox.innerText = text;

  const time = document.createElement("div");
  time.className = "time";
  time.innerText = getTime();

  msgBox.appendChild(time);

  if(type === "user"){
    row.style.justifyContent = "flex-end";
    row.appendChild(msgBox);
    row.appendChild(avatar);
  }else{
    row.appendChild(avatar);
    row.appendChild(msgBox);
  }

  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

/* THINKING */
function showThinking(){
  const row = document.createElement("div");
  row.className = "row";

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.innerText = "AI";

  const msg = document.createElement("div");
  msg.className = "msg ai";

  const thinking = document.createElement("div");
  thinking.className = "thinking";
  thinking.innerHTML = "<div class='dot'></div><div class='dot'></div><div class='dot'></div>";

  msg.appendChild(thinking);

  row.appendChild(avatar);
  row.appendChild(msg);

  box.appendChild(row);
  box.scrollTop = box.scrollHeight;

  return msg;
}

/* TYPE MESSAGE */
function typeMessage(text, element){
  let i = 0;

  function typing(){
    if(i < text.length){
      element.innerText += text.charAt(i);
      i++;
      box.scrollTop = box.scrollHeight;
      setTimeout(typing, 5);
    }
  }

  element.innerText = "";
  typing();
}

/* LOADING */
function setLoading(state){
  loading = state;
  sendBtn.innerText = state ? "..." : "➤";
}

/* SEND */
async function send(){
  if(loading) return;

  const text = input.value.trim();
  if(!text) return;

  if(!started){
    center.style.opacity = "0";
    setTimeout(()=> center.style.display="none",300);
    started = true;
  }

  addMessage(text,"user");
  input.value="";
  setLoading(true);

  const thinkingEl = showThinking();

  try{
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    thinkingEl.innerHTML = "";
    typeMessage(data.reply || "No response", thinkingEl);

  }catch(err){
    thinkingEl.innerText = "❌ ERROR:\n" + err.message;
  }

  setLoading(false);
}
</script>

</body>
</html>
