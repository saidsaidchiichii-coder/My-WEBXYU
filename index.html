<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - AI SaaS</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  height:100vh;
  overflow:hidden;
  background:#0b0f19;
  color:white;
}

/* ================= MAIN SPLIT ================= */
.container{
  display:flex;
  height:100vh;
}

/* ================= LEFT (FORM) ================= */
.left{
  width:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo{
  position:absolute;
  top:20px;
  left:20px;
  font-weight:bold;
  color:#22c55e;
}

/* TITLE */
h1{
  font-size:28px;
  margin-bottom:20px;
  animation:fadeIn 0.7s ease;
}

/* BUTTONS */
.btn{
  width:100%;
  max-width:320px;
  padding:12px;
  margin:6px 0;
  border-radius:999px;
  border:none;
  cursor:pointer;
  transition:0.3s;
  font-weight:600;
}

.btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.black{
  background:#000;
  color:white;
}

.light{
  background:#1f2937;
  color:white;
}

.divider{
  margin:15px 0;
  opacity:0.5;
}

/* INPUTS */
input{
  width:100%;
  max-width:320px;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #333;
  background:#0f172a;
  color:white;
  outline:none;
  transition:0.3s;
}

input:focus{
  border-color:#22c55e;
  box-shadow:0 0 10px rgba(34,197,94,0.3);
}

/* LOGIN BUTTON */
.login-btn{
  background:#22c55e;
  color:black;
}

/* SIGNUP TEXT */
.signup{
  margin-top:10px;
  font-size:13px;
  opacity:0.7;
}

.signup span{
  color:#22c55e;
  cursor:pointer;
}

/* ================= RIGHT (VISUAL) ================= */
.right{
  width:50%;
  position:relative;
  overflow:hidden;
  background:radial-gradient(circle at top, #1a237e, #000);
}

/* floating glow */
.glow{
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(0,255,255,0.3), transparent);
  filter:blur(40px);
  animation:float 6s infinite ease-in-out;
}

.glow:nth-child(2){
  top:30%;
  left:40%;
  background:radial-gradient(circle, rgba(255,0,255,0.3), transparent);
}

.glow:nth-child(3){
  top:60%;
  left:20%;
  background:radial-gradient(circle, rgba(0,255,100,0.3), transparent);
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-30px);}
  100%{transform:translateY(0);}
}

/* center shape */
.centerShape{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:200px;
  border-radius:30px;
  background:linear-gradient(45deg,#00ffff,#ff00ff,#22c55e);
  filter:blur(60px);
  opacity:0.6;
  animation:spin 8s linear infinite;
}

@keyframes spin{
  0%{transform:translate(-50%,-50%) rotate(0deg);}
  100%{transform:translate(-50%,-50%) rotate(360deg);}
}

/* MOBILE */
@media(max-width:900px){
  .container{
    flex-direction:column;
  }
  .left,.right{
    width:100%;
    height:50%;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <div class="logo">⚡ AI SYSTEM</div>

    <h1>Log into your account</h1>

    <button class="btn black">Login with X</button>
    <button class="btn light">Login with Google</button>
    <button class="btn light">Login with Apple</button>

    <div class="divider">──────── OR ────────</div>

    <input placeholder="Email"/>
    <input type="password" placeholder="Password"/>

    <button class="btn login-btn">LOGIN</button>

    <div class="signup">
      Don't have an account? <span>Sign up</span>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="glow"></div>
    <div class="glow"></div>
    <div class="glow"></div>

    <div class="centerShape"></div>

  </div>

</div>

</body>
</html>
