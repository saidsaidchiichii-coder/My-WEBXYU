<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

body{
  background:#0f0f0f;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111;
  padding:20px;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.newchat{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  margin-top:10px;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  filter: blur(6px);
  pointer-events:none;
}

.chat.active{
  filter:none;
  pointer-events:auto;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:14px;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1f1f1f;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#111;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}

/* LOGIN */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.loginBox{
  width:320px;
  padding:25px;
  background:#111;
  text-align:center;
  border-radius:12px;
}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  padding:12px 14px;
  border-radius:10px;
  color:white;
  font-size:14px;
  opacity:0;
  transform:translateY(-15px);
  transition:0.3s;
  z-index:9999;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

.toast.success{background:#22c55e;}
.toast.error{background:#ef4444;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <h2>Welcome</h2>
    <p>Login to continue</p>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <!-- 🔥 OWNER SKIP BUTTON -->
    <button onclick="ownerSkip()" style="margin-top:10px;background:#3b82f6;">
      Skip Login (Owner)
    </button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat">+ New Chat</div>
</div>

<!-- CHAT -->
<div class="chat" id="chat">

  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 كيفاش نعاونك؟</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
    onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

/* SUPABASE */
const supabaseUrl = "https://idjgsgtupuymysptxrbl.supabase.co";
const supabaseKey = "sb_publishable_XLIIiXZRcS5hrvdQP_pkMA_w2I11xFH";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let loggedIn = false;

/* TOAST */
function notify(msg,type="success"){
  const t=document.createElement("div");
  t.className=`toast ${type}`;
  t.innerText=msg;
  document.body.appendChild(t);

  setTimeout(()=>t.classList.add("show"),10);

  setTimeout(()=>{
    t.classList.remove("show");
    setTimeout(()=>t.remove(),300);
  },2500);
}

/* LOGIN */
async function login(){

  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  if(!email || !password){
    notify("Fill all fields","error");
    return;
  }

  const {data,error} = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    notify(error.message,"error");
    return;
  }

  notify("Login success","success");

  document.getElementById("loginOverlay").style.display="none";
  document.getElementById("chat").classList.add("active");

  loggedIn=true;
}

/* 🔥 OWNER SKIP LOGIN */
function ownerSkip(){

  const key = prompt("Enter OWNER KEY:");

  if(key === "ADMIN123"){
    notify("Owner access granted","success");
    document.getElementById("loginOverlay").style.display="none";
    document.getElementById("chat").classList.add("active");
    loggedIn=true;
  }else{
    notify("Wrong owner key","error");
  }
}

/* CHAT */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;

  const box=document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

/* SEND */
async function send(){

  if(!loggedIn){
    notify("Login required","error");
    return;
  }

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  try{

    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();
    addMessage(data.reply || "No response","ai");

  }catch(err){
    notify("Chat error","error");
  }
}

</script>

</body>
</html>
