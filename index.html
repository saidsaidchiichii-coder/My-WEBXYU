<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

body{
  background:#ffffff;
  color:#111;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#f7f7f8;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  border-right:1px solid #e5e5e5;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.newchat{
  padding:10px;
  background:#ececec;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.newchat:hover{
  background:#e2e2e2;
  transform:scale(1.02);
}

.search{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ececec;
  color:#111;
  outline:none;
}

.chatlist{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.chatitem{
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.chatitem:hover{
  background:#eaeaea;
}

.chatitem.active{
  background:#e0e0e0;
  font-weight:bold;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  background:#ffffff;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* MESSAGE */
.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:14px;
  white-space:pre-wrap;
  animation:pop 0.2s ease;
}

@keyframes pop{
  from{opacity:0; transform:translateY(8px);}
  to{opacity:1; transform:translateY(0);}
}

.user{
  align-self:flex-end;
  background:#10a37f;
  color:white;
}

.ai{
  align-self:flex-start;
  background:#f7f7f8;
  color:#111;
  border:1px solid #e5e5e5;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#ffffff;
  border-top:1px solid #e5e5e5;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#f0f0f0;
  color:#111;
  outline:none;
  transition:0.2s;
}

input:focus{
  box-shadow:0 0 0 2px rgba(16,163,127,0.3);
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#10a37f;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.97);
}

/* LOGIN */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginBox{
  width:320px;
  background:#ffffff;
  padding:20px;
  border-radius:14px;
  border:1px solid #e5e5e5;
}

.loginBox input{
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  background:#f7f7f8;
}

.loginBox button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#10a37f;
  color:white;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div class="overlay" id="login">
  <div class="loginBox">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">◆ AI CHAT</div>
  <div class="newchat" onclick="newChat()">+ New Chat</div>
  <input class="search" placeholder="Search chats..." oninput="searchChats(this.value)">
  <div class="chatlist" id="chatlist"></div>
</div>

<!-- CHAT -->
<div class="chat">

  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 كيفاش نعاونك؟</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
    onkeydown="if(event.key==='Enter') send()" />
    <button id="btn" onclick="send()">Send</button>
  </div>

</div>

<script>

let loggedIn=false;

/* LOGIN */
function login(){
  document.getElementById("login").style.display="none";
  loggedIn=true;
}

/* CHAT SYSTEM */
let chats=[];
let currentChat=null;

/* NEW CHAT */
function newChat(){
  const id=Date.now();

  chats.push({
    id,
    messages:[]
  });

  currentChat=id;
  renderChats();
  clearBox();
}

/* TITLE FROM FIRST MESSAGE */
function getTitle(chat){
  const first=chat.messages.find(m=>m.type==="user");
  return first ? first.text.slice(0,25) : "New Chat";
}

/* RENDER */
function renderChats(){
  const list=document.getElementById("chatlist");
  list.innerHTML="";

  chats.forEach(c=>{
    const div=document.createElement("div");
    div.className="chatitem";
    div.innerText=getTitle(c);

    div.onclick=()=>loadChat(c.id);
    list.appendChild(div);
  });
}

/* LOAD CHAT */
function loadChat(id){
  currentChat=id;
  clearBox();

  document.querySelectorAll(".chatitem").forEach(x=>x.classList.remove("active"));
  event?.target?.classList.add("active");

  const chat=chats.find(c=>c.id===id);
  if(!chat) return;

  chat.messages.forEach(m=>{
    addMessage(m.text,m.type,false);
  });

  scrollBottom();
}

/* SEARCH */
function searchChats(val){
  document.querySelectorAll(".chatitem").forEach(i=>{
    i.style.display=i.innerText.toLowerCase().includes(val.toLowerCase())
    ?"block":"none";
  });
}

/* MESSAGE */
function addMessage(text,type,save=true){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;

  document.getElementById("messages").appendChild(div);

  scrollBottom();

  if(save){
    let chat=chats.find(c=>c.id===currentChat);
    if(chat) chat.messages.push({text,type});
    renderChats();
  }
}

/* SCROLL */
function scrollBottom(){
  const box=document.getElementById("messages");
  box.scrollTo({top:box.scrollHeight,behavior:"smooth"});
}

/* CLEAR */
function clearBox(){
  document.getElementById("messages").innerHTML="";
}

/* YOUR AI LOGIC (UNCHANGED) */
async function send(){

  if(!loggedIn) return;

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  document.getElementById("btn").innerText="...";

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    setTimeout(()=>{
      addMessage(data.reply || "No response","ai");
    },300);

  }catch(err){
    addMessage("❌ ERROR:\n"+err.message,"ai");
  }

  document.getElementById("btn").innerText="Send";
}

</script>

</body>
</html>
