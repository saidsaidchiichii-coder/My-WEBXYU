<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat UI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#0a0f1c;
color:#e5e7eb;
height:100vh;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:linear-gradient(180deg,#0f172a,#0b1220);
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
border-right:1px solid rgba(255,255,255,0.06);
}

.logo{
font-size:18px;
font-weight:800;
color:#22c55e;
letter-spacing:1px;
}

.new-chat{
padding:10px;
background:#111827;
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
cursor:pointer;
text-align:center;
transition:0.2s;
}

.new-chat:hover{
background:#1f2937;
}

/* CHAT AREA */
.chat-area{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

.topbar{
padding:15px;
background:#0f172a;
border-bottom:1px solid rgba(255,255,255,0.06);
font-weight:600;
}

/* MESSAGES */
.messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
scroll-behavior:smooth;
}

.msg{
max-width:70%;
padding:12px 14px;
border-radius:14px;
word-wrap:break-word;
line-height:1.4;
font-size:14px;
}

/* USER */
.user{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:#000;
align-self:flex-end;
border-bottom-right-radius:4px;
}

/* AI */
.ai{
background:#111827;
border:1px solid rgba(255,255,255,0.06);
align-self:flex-start;
border-bottom-left-radius:4px;
}

/* INPUT */
.input-box{
display:flex;
padding:15px;
background:#0f172a;
border-top:1px solid rgba(255,255,255,0.06);
}

input{
flex:1;
padding:12px;
border:none;
background:#111827;
color:#fff;
border-radius:10px;
outline:none;
}

input:focus{
border:1px solid #22c55e;
}

button{
margin-left:10px;
padding:12px 18px;
background:#22c55e;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
background:#16a34a;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">AI AGENT SYSTEM</div>
<div class="new-chat" onclick="clearChat()">+ New Chat</div>
</div>

<div class="chat-area">

<div class="topbar">AI Assistant</div>

<div class="messages" id="messages">
<div class="msg ai">Hello 👋 كيف نعاونك اليوم؟</div>
</div>

<div class="input-box">
<input id="input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') send()" />
<button id="btn" onclick="send()">Send</button>
</div>

</div>

<script>

function clearChat(){
document.getElementById("messages").innerHTML =
'<div class="msg ai">Hello 👋 كيف نعاونك اليوم؟</div>';
}

function setLoading(state){
document.getElementById("btn").disabled = state;
document.getElementById("btn").innerText = state ? "..." : "Send";
}

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();
if(!text) return;

addMessage(text,"user");
input.value="";

setLoading(true);

try{

const res = await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({ message: text })
});

const contentType = res.headers.get("content-type");

let data;

if(contentType && contentType.includes("application/json")){
data = await res.json();
}else{
const errText = await res.text();
throw new Error(errText);
}

let reply = "No response";

if(data.choices && data.choices[0]){
reply = data.choices[0].message.content;
}else if(data.error){
reply = "Error: " + data.error;
}

addMessage(reply,"ai");

}catch(err){
addMessage("Error: " + err.message,"ai");
}

setLoading(false);

}

function addMessage(text,type){
const div = document.createElement("div");
div.className = "msg " + type;
div.innerText = text;

const messages = document.getElementById("messages");
messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;
}

</script>

</body>
</html>
