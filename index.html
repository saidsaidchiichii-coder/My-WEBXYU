*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{

  const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".msg, .title, .inputBox").forEach(el=>{
  observer.observe(el);
});


  .msg, .title, .inputBox{
  opacity:0;
  transform:translateY(40px) scale(0.95);
  transition:0.6s ease;

.show{

  transform:translateY(0) scale(1);
}

@keyframes float{

}
  body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle, rgba(16,163,127,0.15), transparent 70%);

  animation:glow 5s ease forwards;
}

@keyframes glow{

}document.querySelectorAll("button, .send").forEach(btn=>{

    wave.style.height="10px";
    wave.style.background="rgba(255,255,255,0.5)";

    wave.animate([
      {transform:"scale(0)",opacity:1},
      {transform:"scale(8)",opacity:0}
    ],{duration:500});

    setTimeout(()=>wave.remove(),500);
  });
});
  messages.addEventListener("scroll",()=>{
