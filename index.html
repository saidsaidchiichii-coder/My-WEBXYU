<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- particles -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
</head>

<body>

<!-- PARTICLES BACKGROUND -->
<div id="tsparticles"></div>

<!-- NAV -->
<header class="top-nav">
    <div class="nav-left">
        <div class="logo-container" onclick="location.reload()">
            <svg class="grok-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
            </svg>
        </div>
    </div>

    <div class="nav-right">
        <button class="nav-btn" id="imagineBtn">
            <i data-lucide="sparkles"></i>
            <span>Imagine</span>
        </button>

        <button class="nav-btn" id="settingsBtn">
            <i data-lucide="settings"></i>
        </button>

        <button class="btn-signin" id="signinBtn">Sign in</button>
        <button class="btn-signup" id="signupBtn">Sign up</button>
    </div>
</header>

<main class="container">

<!-- HOME -->
<section id="home" class="home-view">
    <div class="hero-section">
        <div class="hero-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10"></circle>
            </svg>
            <h1>Grok</h1>
        </div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <div class="input-area">

                <button class="input-icon" id="uploadBtn">
                    <i data-lucide="paperclip"></i>
                </button>

                <textarea id="homeInput" placeholder="How can I help you today?" rows="1"></textarea>

                <div class="input-controls">
                    <button class="control-btn" id="micBtn">
                        <i data-lucide="mic"></i>
                    </button>

                    <button class="control-btn send-btn" onclick="startChat()">
                        <i data-lucide="arrow-up"></i>
                    </button>
                </div>

            </div>
        </div>
    </div>
</section>

<!-- CHAT -->
<section id="chat" class="chat-view hidden">
    <div id="messages" class="messages-list"></div>

    <div class="chat-input-container">
        <div class="search-box">
            <div class="input-area">

                <button class="input-icon" id="uploadBtn2">
                    <i data-lucide="paperclip"></i>
                </button>

                <textarea id="chatInput" placeholder="Send a message..." rows="1"></textarea>

                <div class="input-controls">
                    <button class="control-btn send-btn" onclick="send()">
                        <i data-lucide="arrow-up"></i>
                    </button>
                </div>

            </div>
        </div>
    </div>
</section>

</main>

<!-- SETTINGS MODAL -->
<div class="modal hidden" id="settingsModal">
    <div class="modal-box">
        <h3>Settings</h3>
        <select>
            <option>English</option>
            <option>Arabic</option>
            <option>French</option>
        </select>
        <button onclick="closeSettings()">Close</button>
    </div>
</div>

<script src="ControleAi.js"></script>

<script>
lucide.createIcons();
AI.init("messages", "https://my-webxyu.vercel.app/api/chat");

/* particles FIX */
tsParticles.load("tsparticles", {
    particles: {
        number: { value: 40 },
        size: { value: 1 },
        move: { enable: true, speed: 0.3 },
        opacity: { value: 0.2 }
    }
});

/* views */
const homeView = document.getElementById("home");
const chatView = document.getElementById("chat");

/* auto resize */
function autoResize(t){
    t.style.height = "auto";
    t.style.height = Math.min(t.scrollHeight, 180) + "px";
}

/* start chat */
function startChat(){
    const input = document.getElementById("homeInput");
    const text = input.value.trim();
    if(!text) return;

    homeView.classList.add("hidden");
    chatView.classList.remove("hidden");

    AI.user(text);
    AI.ask(text);

    input.value="";
}

/* send */
function send(){
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if(!text) return;

    AI.user(text);
    AI.ask(text);

    input.value="";
}

/* SETTINGS */
document.getElementById("settingsBtn").onclick = () => {
    document.getElementById("settingsModal").classList.remove("hidden");
};
function closeSettings(){
    document.getElementById("settingsModal").classList.add("hidden");
}

/* IMAGINE FIX */
document.getElementById("imagineBtn").onclick = () => {
    startChat();
};

/* UPLOAD FIX */
document.getElementById("uploadBtn").onclick =
document.getElementById("uploadBtn2").onclick = () => {
    alert("File upload UI ready (backend not attached)");
};

/* SIGN IN / UP (UI ONLY) */
document.getElementById("signinBtn").onclick =
document.getElementById("signupBtn").onclick = () => {
    alert("Auth UI only (no backend connected)");
};
</script>

</body>
</html>
