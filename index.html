<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

/* ===== LAYOUT FIX ===== */
body{
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:#0d0d0d;
    border-right:1px solid #222;
    height:100vh;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:2;
}

.sidebar h3{
    font-size:14px;
    opacity:.6;
}

.side-btn{
    background:#111;
    border:1px solid #2f3336;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.side-btn:hover{
    background:#1a1a1a;
}

/* MAIN FIX */
.container{
    flex:1;
}

/* HERO 3D */
.hero-logo{
    animation: float 4s ease-in-out infinite;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* FIRST MESSAGE 3D */
.chat-view.active3d{
    transform: perspective(1000px) rotateX(5deg) scale(0.98);
    transition: all .6s ease;
}

/* intro animation */
.home-view{
    animation: fadeIntro 1s ease;
}
@keyframes fadeIntro{
    from{opacity:0; transform:scale(1.05);}
    to{opacity:1; transform:scale(1);}
}

/* keep your old styles */
#tsparticles{position:fixed;inset:0;z-index:0;}
.search-box{backdrop-filter:blur(20px);background:rgba(20,20,20,0.6);border:1px solid rgba(255,255,255,0.08);}
.search-box:focus-within{box-shadow:0 0 20px rgba(255,255,255,0.1);}
.hero-logo h1{letter-spacing:-2px;}
.send-btn{box-shadow:0 0 10px rgba(255,255,255,0.2);}

/* PANEL TEXT */
.panel{
    font-size:13px;
    opacity:.7;
    line-height:1.5;
}

.panel a{
    color:white;
    text-decoration:underline;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Grok</h2>

    <div class="side-btn" onclick="location.reload()">+ New Chat</div>

    <div class="panel">
        Get responses tailored to you.<br><br>
        Log in to get answers based on saved chats, plus create images and upload files.
    </div>

    <div class="side-btn" id="loginSide">Log in</div>
    <div class="side-btn">Help</div>
    <div class="side-btn">Apps</div>
    <div class="side-btn">Pricing</div>
</div>

<div id="tsparticles"></div>

<div class="container">

<header class="top-nav">
<div class="nav-left">
    <div class="logo-container" onclick="location.reload()">
        <svg class="grok-logo" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
        </svg>
    </div>
</div>

<div class="nav-right">
    <button class="nav-btn" id="imagineBtn">
        <i data-lucide="sparkles"></i>
        <span>Imagine</span>
    </button>

    <button class="nav-btn" id="settingsBtn">
        <i data-lucide="settings"></i>
    </button>

    <button class="btn-signin" id="signinBtn">Sign in</button>
    <button class="btn-signup" id="signupBtn">Sign up</button>
</div>
</header>

<main>

<section id="home" class="home-view">

<div class="hero-section">
    <div class="hero-logo">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
        </svg>
        <h1>Grok</h1>
    </div>

    <div class="hero-text">
        <h2>Your AI Assistant</h2>
        <p>Ask anything. Get instant smart answers.</p>
    </div>
</div>

<div class="search-container">
<div class="search-box">
<div class="input-area">

<button class="input-icon" id="uploadBtn">
    <i data-lucide="paperclip"></i>
</button>

<textarea id="homeInput" rows="1" placeholder="What do you want to know?"></textarea>

<div class="input-controls">
    <button class="control-btn" id="micBtn">
        <i data-lucide="mic"></i>
    </button>

    <button class="control-btn send-btn" onclick="startChat()">
        <i data-lucide="arrow-up"></i>
    </button>
</div>

</div>
</div>
</div>

</section>

<section id="chat" class="chat-view hidden">
<div id="messages"></div>

<div class="chat-input-container">
<div class="search-box">
<div class="input-area">

<button class="input-icon" id="uploadBtn2">
    <i data-lucide="paperclip"></i>
</button>

<textarea id="chatInput" rows="1" placeholder="Send a message..."></textarea>

<div class="input-controls">
    <button class="control-btn send-btn" onclick="send()">
        <i data-lucide="arrow-up"></i>
    </button>
</div>

</div>
</div>
</div>
</section>

</main>
</div>

<script src="ControleAi.js"></script>

<script>
lucide.createIcons();
AI.init("messages", "https://my-webxyu.vercel.app/api/chat");

tsParticles.load("tsparticles", {
    particles: {
        number: { value: 80 },
        size: { value: 2 },
        move: { enable: true, speed: 1 },
        opacity: { value: 0.4 },
        links: { enable: true, opacity: 0.1 }
    }
});

const homeView = document.getElementById("home");
const chatView = document.getElementById("chat");

document.getElementById("homeInput").addEventListener("keydown", e=>{
    if(e.key==="Enter" && !e.shiftKey){
        e.preventDefault();
        startChat();
    }
});

document.getElementById("chatInput").addEventListener("keydown", e=>{
    if(e.key==="Enter" && !e.shiftKey){
        e.preventDefault();
        send();
    }
});

function autoResize(t){
    t.style.height="auto";
    t.style.height=Math.min(t.scrollHeight,180)+"px";
}

homeInput.oninput=()=>autoResize(homeInput);
chatInput.oninput=()=>autoResize(chatInput);

/* UPDATED (ONLY ADD) */
let firstMessage = true;

function startChat(){
    const input = document.getElementById("homeInput");
    const text = input.value.trim();
    if(!text) return;

    homeView.classList.add("hidden");
    chatView.classList.remove("hidden");

    if(firstMessage){
        chatView.classList.add("active3d");
        setTimeout(()=>chatView.classList.remove("active3d"),800);
        firstMessage = false;
    }

    AI.user(text);
    AI.ask(text);

    input.value="";
}

function send(){
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if(!text) return;

    AI.user(text);
    AI.ask(text);

    input.value="";
}

document.getElementById("settingsBtn").onclick = () => {
    alert("Settings panel");
};

document.getElementById("imagineBtn").onclick = () => {
    const homeInput = document.getElementById("homeInput");
    if(homeInput.value.trim()){
        startChat();
    }else{
        alert("Write something first");
    }
};

document.getElementById("uploadBtn").onclick =
document.getElementById("uploadBtn2").onclick = () => {
    const input = document.createElement("input");
    input.type="file";
    input.click();
};

document.getElementById("signinBtn").onclick =
document.getElementById("signupBtn").onclick =
document.getElementById("loginSide").onclick = () => {
    alert("Auth system ready");
};
</script>

</body>
</html>
