<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

body{
  background:#0f0f0f;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.newchat{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:14px;
  white-space:pre-wrap;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1f1f1f;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#111;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}

/* ================= LOGIN OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.loginBox{
  width:320px;
  background:#111;
  padding:25px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 0 30px rgba(34,197,94,0.2);
}

.loginBox h2{
  margin-bottom:5px;
}

.loginBox p{
  opacity:0.7;
  font-size:13px;
  margin-bottom:15px;
}

.loginBox input{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

.loginBox button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
}

.loginBox .ghost{
  background:#222;
  color:white;
}

.error{
  color:red;
  font-size:12px;
  margin-top:8px;
}
</style>

</head>

<body>

<!-- ================= LOGIN OVERLAY ================= -->
<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <h2>Welcome</h2>
    <p>Login to continue</p>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button class="ghost" onclick="signup()">Sign Up</button>

    <p id="error" class="error"></p>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat">+ New Chat</div>
</div>

<!-- CHAT -->
<div class="chat">

  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 كيفاش نعاونك؟</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
    onkeydown="if(event.key==='Enter') send()" />
    <button id="btn" onclick="send()">Send</button>
  </div>

</div>

<script>

let loggedIn = false;

/* DISABLE CHAT BEFORE LOGIN */
document.querySelector(".chat").style.filter = "blur(8px)";

/* LOGIN */
function login(){

  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    document.getElementById("error").innerText = "Fill all fields";
    return;
  }

  if(pass.length < 3){
    document.getElementById("error").innerText = "Wrong password";
    return;
  }

  document.getElementById("loginOverlay").style.display = "none";
  document.querySelector(".chat").style.filter = "none";

  loggedIn = true;
}

/* SIGNUP (DEMO) */
function signup(){
  alert("Signup success (demo)");
}

/* CHAT */
function addMessage(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  const box = document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function setLoading(state){
  const btn = document.getElementById("btn");
  btn.disabled = state;
  btn.innerText = state ? "..." : "Send";
}

/* YOUR AI LOGIC (UNCHANGED) */
async function send(){

  if(!loggedIn) return;

  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  setLoading(true);

  try{

    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ message:text })
    });

    const data = await res.json();

    addMessage(data.reply || "No response","ai");

  }catch(err){
    addMessage("❌ ERROR:\n" + err.message,"ai");
  }

  setLoading(false);
}

</script>

</body>
</html>
