<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:
    radial-gradient(circle at 85% 50%, rgba(255,255,255,0.15), transparent 40%),
    linear-gradient(135deg, #000000 0%, #05070a 40%, #0b0f14 100%);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* glow fix */
body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:radial-gradient(circle, rgba(16,163,127,0.15), transparent 70%);
  animation:glow 5s forwards;
}
@keyframes glow{to{opacity:1;}}

/* animations */
.fadeIn{animation:fadeIn .6s;}
.fadeOut{animation:fadeOut .6s forwards;}
@keyframes fadeIn{from{opacity:0;transform:scale(.95);}to{opacity:1;}}
@keyframes fadeOut{to{opacity:0;transform:scale(1.05);}}

/* layout */
.top{display:flex;justify-content:space-between;padding:20px;color:white;}
.btn{padding:8px 16px;border-radius:999px;border:none;cursor:pointer;}
.login{background:#1a1a1a;color:white;}
.signup{background:white;color:black;}

.center{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
}

.title{
  font-size:42px;color:white;
  animation:float 4s infinite ease-in-out;
}
@keyframes float{
  50%{transform:translateY(-10px);}
}

/* input */
.inputBox{
  display:flex;
  width:600px;max-width:90%;
  background:rgba(255,255,255,0.08);
  padding:12px;border-radius:999px;
  backdrop-filter:blur(10px);
}

.inputBox input{
  flex:1;background:none;border:none;color:white;outline:none;
}

.send{
  width:40px;height:40px;
  border-radius:50%;
  background:white;color:black;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:.2s;
}
.send:hover{transform:scale(1.1);}

/* chat */
.chat{display:none;flex:1;flex-direction:column;}

.messages{
  flex:1;overflow:auto;padding:20px;
  display:flex;flex-direction:column;gap:10px;
  perspective:1000px;
}

.msg{
  max-width:65%;
  padding:12px;border-radius:12px;
  animation:slideUp .3s ease;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}
}

.user{align-self:flex-end;background:white;color:black;}
.ai{align-self:flex-start;background:rgba(255,255,255,0.08);color:white;}

/* thinking */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#aaa;border-radius:50%;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:1;}}

/* bottom */
.bottom{
  display:flex;gap:10px;padding:15px;
  border-top:1px solid rgba(255,255,255,0.1);
}
textarea{
  flex:1;background:rgba(255,255,255,0.08);
  border:none;border-radius:10px;color:white;padding:10px;
}
.send2{
  width:50px;border-radius:10px;background:white;color:black;
  cursor:pointer;
}

/* modal */
.overlay{
  position:fixed;inset:0;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.4);
}
.loginBox{
  background:#111;padding:30px;border-radius:20px;color:white;
}
</style>
</head>

<body>

<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="top">
  <div>ILYASS AI</div>
  <div>
    <button class="btn login" onclick="openLogin()">Login</button>
  </div>
</div>

<div id="home" class="center">
  <div class="title">What’s in your mind?</div>
  <div class="inputBox">
    <input id="homeInput">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput"></textarea>
    <button class="send2" onclick="send()">Send</button>
  </div>
</div>

<script>
const messages=document.getElementById("messages");

/* start */
function startChat(){
  if(!homeInput.value.trim())return;

  home.classList.add("fadeOut");

  setTimeout(()=>{
    home.style.display="none";
    chat.style.display="flex";
    chat.classList.add("fadeIn");

    addMessage(homeInput.value,"user");
    fakeAI();
  },600);
}

/* messages */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;

  const el=document.createElement("div");
  div.appendChild(el);

  messages.appendChild(div);

  if(type==="ai"){
    typeEffect(el,text);
  }else el.innerText=text;

  messages.scrollTop=messages.scrollHeight;
}

/* typing */
function typeEffect(el,text){
  let i=0;
  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length)clearInterval(int);
  },20);
}

/* thinking */
function fakeAI(){
  const t=document.createElement("div");
  t.className="msg ai";
  t.innerHTML=`<div class="thinking">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  messages.appendChild(t);

  setTimeout(()=>{
    t.remove();
    addMessage("This is AI response with typing effect 🚀","ai");
  },1200);
}

/* send */
function send(){
  if(!chatInput.value.trim())return;
  addMessage(chatInput.value,"user");
  chatInput.value="";
  fakeAI();
}

/* 3D scroll */
messages.addEventListener("scroll",()=>{
  messages.style.transform=`rotateX(${messages.scrollTop/50}deg)`;
});

/* login */
function openLogin(){loginOverlay.style.display="flex";}
function login(){loginOverlay.style.display="none";}
</script>

</body>
</html>
