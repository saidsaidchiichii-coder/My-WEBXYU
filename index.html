<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- NAV -->
<header class="top-nav">
    <div class="nav-left">
        <div class="logo-container" onclick="location.reload()">
            <svg class="grok-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
                <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
                <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
                <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
                <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
                <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
            </svg>
        </div>
    </div>

    <div class="nav-right">
        <button class="nav-btn">
            <i data-lucide="sparkles"></i>
            <span>Imagine</span>
        </button>

        <button class="nav-btn" id="settingsTrigger">
            <i data-lucide="settings"></i>
        </button>

        <button class="btn-signin">Sign in</button>
        <button class="btn-signup">Sign up</button>
    </div>
</header>

<!-- MAIN -->
<main class="container">

<!-- HOME -->
<section id="home" class="home-view">
    <div class="hero-section">
        <div class="hero-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
                <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
                <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
                <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
                <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
                <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
            </svg>
            <h1>Grok</h1>
        </div>
    </div>

    <div class="search-container">
        <div class="search-box">

            <div class="input-area">

                <button class="input-icon">
                    <i data-lucide="paperclip"></i>
                </button>

                <textarea id="homeInput"
                    placeholder="How can I help you today?"
                    rows="1"
                    oninput="autoResize(this)"
                    onkeydown="handleKeydown(event, 'home')"></textarea>

                <div class="input-controls">

                    <div class="mode-selector">
                        <span>Auto</span>
                        <i data-lucide="chevron-down"></i>
                    </div>

                    <button class="control-btn">
                        <i data-lucide="mic"></i>
                    </button>

                    <button class="control-btn send-btn" onclick="startChat()">
                        <i data-lucide="arrow-up"></i>
                    </button>

                </div>
            </div>
        </div>

        <div class="search-hint">
            <i data-lucide="sparkles"></i>
            <span>AI Chat + Image Generator</span>
        </div>
    </div>
</section>

<!-- CHAT -->
<section id="chat" class="chat-view hidden">

    <div id="messages" class="messages-list"></div>

    <div class="chat-input-container">

        <div class="search-box">

            <div class="input-area">

                <button class="input-icon">
                    <i data-lucide="paperclip"></i>
                </button>

                <textarea id="chatInput"
                    placeholder="Send a message..."
                    rows="1"
                    oninput="autoResize(this)"
                    onkeydown="handleKeydown(event, 'chat')"></textarea>

                <div class="input-controls">

                    <div class="mode-selector">
                        <span>Auto</span>
                        <i data-lucide="chevron-down"></i>
                    </div>

                    <button class="control-btn">
                        <i data-lucide="mic"></i>
                    </button>

                    <button class="control-btn send-btn" onclick="send()">
                        <i data-lucide="arrow-up"></i>
                    </button>

                </div>
            </div>
        </div>
    </div>
</section>

</main>

<!-- SCRIPTS -->
<script src="ControleAi.js"></script>

<script>
lucide.createIcons();

// API endpoint ديالك
AI.init("messages", "https://my-webxyu.vercel.app/api/chat");

const homeView = document.getElementById("home");
const chatView = document.getElementById("chat");

function autoResize(t){
    t.style.height = "auto";
    t.style.height = Math.min(t.scrollHeight, 200) + "px";
}

function handleKeydown(e, type){
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        if(type === "home") startChat();
        else send();
    }
}

function startChat(){
    const input = document.getElementById("homeInput");
    const text = input.value.trim();
    if(!text) return;

    homeView.classList.add("hidden");
    chatView.classList.remove("hidden");

    AI.user(text);
    input.value = "";
    AI.ask(text);
}

function send(){
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if(!text) return;

    AI.user(text);
    input.value = "";
    AI.ask(text);
}
</script>

</body>
</html>
