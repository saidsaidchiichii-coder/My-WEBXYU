<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:#f7f7f8;
  height:100vh;
  display:flex;
  flex-direction:column;
  animation:fadeIn .5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:18px 25px;
  border-bottom:1px solid #eee;
  background:white;
}

.logo{font-weight:600;font-size:17px;}

.auth{display:flex;gap:10px;}

.btn{
  padding:7px 14px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  font-size:13px;
}

.login{background:#eee;}
.signup{background:#111;color:white;}

/* CENTER */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
}

.title{font-size:34px;font-weight:600;}

/* INPUT */
.inputBox{
  width:600px;
  max-width:90%;
  background:white;
  border-radius:999px;
  padding:10px 15px;
  display:flex;
  align-items:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.inputBox input{
  flex:1;
  border:none;
  outline:none;
  font-size:14px;
}

.send{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  display:none;
  flex:1;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:25px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.msg{
  max-width:60%;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  line-height:1.5;
  position:relative;
}

.user{
  align-self:flex-end;
  background:#10a37f;
  color:white;
}

.ai{
  align-self:flex-start;
  background:white;
  border:1px solid #eee;
}

/* ACTIONS */
.actions{
  margin-top:5px;
  display:flex;
  gap:10px;
  font-size:12px;
  opacity:.6;
}

.actions span{
  cursor:pointer;
}

/* THINKING */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#999;border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* BOTTOM */
.bottom{
  padding:15px;
  border-top:1px solid #eee;
  background:white;
  display:flex;
  align-items:center;
  gap:10px;
}

.bottom input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.sendBtn{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#111;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top">
  <div class="logo">ILYASS AI</div>

  <div class="auth">
    <button class="btn login">Login</button>
    <button class="btn signup">Sign up</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="center">
  <div class="title">Ask anything</div>

  <div class="inputBox">
    <input id="homeInput" placeholder="What do you want to know?"
      onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">↑</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <input id="chatInput" placeholder="Send a message..."
      onkeydown="if(event.key==='Enter') send()">

    <div class="sendBtn" onclick="send()">↑</div>
  </div>
</div>

<script>

let isTyping=false;

/* START CHAT */
function startChat(){
  const text=document.getElementById("homeInput").value.trim();
  if(!text) return;

  document.getElementById("home").style.display="none";
  document.getElementById("chat").style.display="flex";

  addMessage(text,"user");
  document.getElementById("homeInput").value="";

  realAI(text);
}

/* ADD MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;

  const content=document.createElement("div");
  div.appendChild(content);

  document.getElementById("messages").appendChild(div);

  typeText(content,text);

  if(type==="ai"){
    const actions=document.createElement("div");
    actions.className="actions";
    actions.innerHTML=`
      <span onclick="copyText(\`${text}\`)">Copy</span>
      <span onclick="retry()">Retry</span>
    `;
    div.appendChild(actions);
  }

  scrollBottom();
}

/* TYPE EFFECT */
function typeText(el,text){
  let i=0;
  el.innerHTML="";
  isTyping=true;

  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length){
      clearInterval(int);
      isTyping=false;
    }
  },15);
}

/* THINKING */
function thinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  document.getElementById("messages").appendChild(div);
  scrollBottom();
  return div;
}

/* REAL AI */
async function realAI(message){
  const t = thinking();

  try{
    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({message})
    });

    const data = await res.json();

    t.remove();
    addMessage(data.reply || "AI response","ai");

  }catch{
    t.remove();
    addMessage("⚠️ Error","ai");
  }
}

/* SEND */
function send(){
  if(isTyping) return;

  const input=document.getElementById("chatInput");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  realAI(text);
}

/* COPY */
function copyText(text){
  navigator.clipboard.writeText(text);
}

/* RETRY */
function retry(){
  const msgs=document.querySelectorAll(".msg.user");
  const last=msgs[msgs.length-1];
  if(last){
    realAI(last.innerText);
  }
}

/* SCROLL */
function scrollBottom(){
  const box=document.getElementById("messages");
  box.scrollTop=box.scrollHeight;
}

</script>

</body>
</html>
