<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI SYSTEM</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  height:100vh;
  background:#0b0f19;
  color:white;
  overflow:hidden;
}

/* LOGIN */
.container{
  display:flex;
  height:100vh;
}

.left{
  width:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.right{
  width:50%;
  background:radial-gradient(circle at top,#1a237e,#000);
}

input{
  width:100%;
  max-width:320px;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #333;
  background:#0f172a;
  color:white;
}

.btn{
  width:100%;
  max-width:320px;
  padding:12px;
  margin:6px 0;
  border-radius:999px;
  border:none;
  cursor:pointer;
}

.black{background:#000;color:white;}
.green{background:#22c55e;color:black;}

/* APP (FORM 2 = AI CHAT) */
.app{
  display:none;
  height:100vh;
  flex-direction:column;
}

.nav{
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid #222;
}

.chat{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:10px 14px;
  border-radius:12px;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1f2937;
}

.inputBar{
  display:flex;
  padding:10px;
  border-top:1px solid #222;
}

.inputBar input{
  flex:1;
  max-width:none;
}

.inputBar button{
  width:80px;
  margin-left:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginPage">

  <div class="left">

    <h1>Login</h1>

    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button class="btn green" onclick="login()">LOGIN</button>
    <button class="btn black" onclick="signup()">SIGN UP</button>

  </div>

  <div class="right"></div>

</div>

<!-- FORM 2 = AI CHAT -->
<div class="app" id="app">

  <div class="nav">
    🤖 AI FORM 2
    <button class="btn black" style="width:100px" onclick="logout()">Logout</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="inputBar">
    <input id="msg" placeholder="Ask AI..."/>
    <button class="btn green" onclick="send()">➤</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const client = supabase.createClient(
  "https://ypqkmuflothekoaxwupn.supabase.co",
  "sb_publishable_c_HDHKad3Sjgz5Ho47gwWg_63AAuQY8"
);

/* LOGIN */
async function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password: pass
  });

  if(error){
    alert(error.message);
    return;
  }

  goApp();
}

/* SIGNUP */
async function signup(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const { error } = await client.auth.signUp({
    email,
    password: pass
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("📩 Check email");
}

/* GO APP */
function goApp(){
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

/* CHAT */
function send(){
  const msg = document.getElementById("msg");
  if(!msg.value) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="msg user">${msg.value}</div>
    <div class="msg ai">AI: ${msg.value}</div>
  `;

  msg.value = "";
}

/* LOGOUT */
function logout(){
  location.reload();
}

</script>

</body>
</html>
