<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI SaaS Project</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  height:100vh;
  background: radial-gradient(circle at top, #0f172a, #000);
  color:white;
}

/* LOGIN */
.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  position:relative;
  width:360px;
  padding:30px;
  border-radius:18px;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  overflow:hidden;
}

.login-box::before{
  content:"";
  position:absolute;
  inset:-3px;
  background:linear-gradient(90deg,#ff00ff,#00ffff,#22c55e,#ffcc00,#ff00ff);
  background-size:300% 300%;
  animation: rgb 4s linear infinite;
  z-index:-1;
  border-radius:20px;
}

.login-box::after{
  content:"";
  position:absolute;
  inset:2px;
  background:rgba(10,10,20,0.95);
  border-radius:16px;
  z-index:-1;
}

@keyframes rgb{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.login-btn{background:#22c55e;}
.signup-btn{background:#00c2ff;}

/* APP */
.app{
  display:none;
  height:100vh;
  flex-direction:column;
}

.nav{
  padding:15px;
  border-bottom:1px solid #222;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:red;
  padding:8px 12px;
  border:none;
  color:white;
  border-radius:8px;
}

.chat{
  flex:1;
  padding:20px;
  overflow:auto;
}

.msg{
  margin:10px 0;
}

.user{
  text-align:right;
}

.user span{
  background:#22c55e;
  padding:8px 12px;
  border-radius:10px;
  color:black;
}

.ai span{
  background:#1f2937;
  padding:8px 12px;
  border-radius:10px;
  display:inline-block;
}

.inputBox{
  display:flex;
  padding:10px;
  border-top:1px solid #222;
}

.inputBox input{
  flex:1;
}

.inputBox button{
  width:80px;
  margin-left:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="loginPage">
  <div class="login-box">
    <h2 style="text-align:center">LOGIN</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="login-btn" id="loginBtn">LOGIN</button>
    <button class="signup-btn" id="signupBtn">SIGN UP</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="nav">
    🤖 AI AGENT
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Ask AI...">
    <button onclick="send()">➤</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = supabase.createClient(
  "https://ypqkmuflothekoaxwupn.supabase.co",
  "sb_publishable_c_HDHKad3Sjgz5Ho47gwWg_63AAuQY8"
);

/* LOGIN ELEMENTS */
const email = document.getElementById("email");
const password = document.getElementById("password");

document.getElementById("signupBtn").onclick = async () => {
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });

  if(error) return alert(error.message);
  alert("Check your email 📩");
};

document.getElementById("loginBtn").onclick = async () => {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error) return alert(error.message);

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "flex";
};

/* CHAT */
function send(){
  const msg = document.getElementById("msg");
  if(!msg.value) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="msg user"><span>${msg.value}</span></div>
    <div class="msg ai"><span>AI: I got → ${msg.value}</span></div>
  `;

  msg.value = "";
}

/* LOGOUT */
function logout(){
  location.reload();
}
</script>

</body>
</html>
