<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

body{
  background:#0f0f0f;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.newchat{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

.search{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
  outline:none;
}

.chatlist{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.chatitem{
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  background:transparent;
}

.chatitem:hover{
  background:#1a1a1a;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:14px;
  white-space:pre-wrap;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1f1f1f;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#111;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}

/* LOGIN */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginBox{
  width:320px;
  background:#111;
  padding:20px;
  border-radius:14px;
}

.loginBox input{
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.loginBox button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="overlay" id="login">
  <div class="loginBox">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">◆ AI CHAT</div>

  <div class="newchat" onclick="newChat()">+ New Chat</div>

  <input class="search" placeholder="Search chats..." oninput="searchChats(this.value)">

  <div class="chatlist" id="chatlist"></div>
</div>

<!-- CHAT -->
<div class="chat">

  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 كيفاش نعاونك؟</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
    onkeydown="if(event.key==='Enter') send()" />
    <button id="btn" onclick="send()">Send</button>
  </div>

</div>

<script>

let loggedIn=false;

/* LOGIN */
function login(){
  document.getElementById("login").style.display="none";
  loggedIn=true;
}

/* CHAT DATA */
let chats=[];
let currentChat=null;

/* NEW CHAT */
function newChat(){
  const id=Date.now();

  chats.push({
    id,
    title:"New Chat",
    messages:[]
  });

  currentChat=id;
  renderChats();
  clearBox();
}

/* GET TITLE FROM FIRST USER MESSAGE */
function getChatTitle(chat){
  const first = chat.messages.find(m=>m.type==="user");
  if(!first) return "New Chat";
  return first.text.slice(0,30);
}

/* RENDER SIDEBAR */
function renderChats(){
  const list=document.getElementById("chatlist");
  list.innerHTML="";

  chats.forEach(c=>{
    const div=document.createElement("div");
    div.className="chatitem";

    div.innerText=getChatTitle(c);

    div.onclick=()=>loadChat(c.id);
    list.appendChild(div);
  });
}

/* LOAD CHAT */
function loadChat(id){
  currentChat=id;
  clearBox();

  const chat=chats.find(c=>c.id===id);
  if(!chat) return;

  chat.messages.forEach(m=>{
    addMessage(m.text,m.type,false);
  });
}

/* SEARCH */
function searchChats(val){
  document.querySelectorAll(".chatitem").forEach(i=>{
    i.style.display=i.innerText.toLowerCase().includes(val.toLowerCase())
    ?"block":"none";
  });
}

/* ADD MESSAGE */
function addMessage(text,type,save=true){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;

  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop=999999;

  if(save){
    let chat=chats.find(c=>c.id===currentChat);
    if(chat){
      chat.messages.push({text,type});
    }
    renderChats(); // update title live
  }
}

/* CLEAR */
function clearBox(){
  document.getElementById("messages").innerHTML="";
}

/* ================= YOUR AI LOGIC (UNCHANGED 100%) ================= */
async function send(){

  if(!loggedIn) return;

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  document.getElementById("btn").innerText="...";

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    addMessage(data.reply || "No response","ai");

  }catch(err){
    addMessage("❌ ERROR:\n"+err.message,"ai");
  }

  document.getElementById("btn").innerText="Send";
}

</script>

</body>
</html>
