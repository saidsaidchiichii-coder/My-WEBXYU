<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenFlow Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;height:100vh;overflow:hidden;color:#fff}

/* 🔥 REALISTIC GREEN LIKE YOUR IMAGE */
.gradient-bg{
position:fixed;width:100%;height:100%;
background:linear-gradient(135deg,#0a2e1d,#0f5132,#198754,#20c997);
z-index:-2;
}

/* PARTICLES */
#tsparticles{position:absolute;width:100%;height:100%;z-index:-1}

/* CENTER */
.center{
display:flex;justify-content:center;align-items:center;
height:100vh;flex-direction:column;text-align:center;
}

/* BUTTONS */
.btn{
padding:14px 30px;
border-radius:50px;
border:none;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.btn-main{
background:linear-gradient(135deg,#00ff9c,#00c97b);
color:#000;
box-shadow:0 10px 30px rgba(0,255,156,.4);
}

.btn-main:hover{
transform:translateY(-3px) scale(1.05);
}

/* GLASS LOGIN */
.login-box{
display:none;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
width:300px;
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translate(-50%,-40%)}
to{opacity:1;transform:translate(-50%,-50%)}
}

.input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
outline:none;
}

/* GOOGLE BUTTON */
.google{
background:#fff;color:#000;
display:flex;align-items:center;justify-content:center;
gap:10px;
}

/* DASHBOARD */
.dashboard{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* TITLE */
h1{
font-size:3rem;
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="gradient-bg"></div>
<div id="tsparticles"></div>

<!-- HOME -->
<div class="center" id="home">
<h1>GreenFlow</h1>

<button class="btn btn-main" onclick="openLogin()">Login</button>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

<button class="btn google" onclick="loginSuccess()">Continue with Google</button>

<p style="margin:10px 0">OR</p>

<input class="input" placeholder="Email or Username">
<input class="input" type="password" placeholder="Password">

<button class="btn btn-main" style="width:100%" onclick="loginSuccess()">Login</button>

</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dash">
<h1>Welcome 🎉</h1>
<p>You are logged in successfully</p>

<button class="btn btn-main" onclick="logout()">Logout</button>
</div>

<script>
// PARTICLES
tsParticles.load("tsparticles", {
particles:{
number:{value:60},
color:{value:"#00ff9c"},
links:{enable:true,color:"#00ff9c",opacity:0.3},
move:{enable:true,speed:1},
size:{value:3},
opacity:{value:0.5}
}
});

// OPEN LOGIN
function openLogin(){
document.getElementById("loginBox").style.display="block";
}

// LOGIN SUCCESS
function loginSuccess(){
document.getElementById("home").style.display="none";
document.getElementById("loginBox").style.display="none";
document.getElementById("dash").style.display="flex";
}

// LOGOUT
function logout(){
location.reload();
}
</script>

</body>
</html>
