<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

/* ================= GLOBAL ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:
    radial-gradient(circle at 85% 50%, rgba(255,255,255,0.15), transparent 40%),
    linear-gradient(135deg, #000000 0%, #05070a 40%, #0b0f14 100%);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ================= BACKGROUND FX ================= */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle, rgba(16,163,127,0.15), transparent 70%);
  animation:glow 5s ease forwards;
  pointer-events:none;
}

@keyframes glow{
  from{opacity:0;}
  to{opacity:1;}
}

/* ================= TOP BAR ================= */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{
  color:white;
  font-weight:bold;
}

.auth{
  display:flex;
  gap:10px;
}

.btn{
  padding:8px 16px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.1);
}

.login{background:#1a1a1a;color:white;}
.signup{background:white;color:black;}

/* ================= HOME ================= */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
}

.title{
  font-size:42px;
  color:white;
  animation:float 4s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.inputBox{
  display:flex;
  width:600px;
  max-width:90%;
  background:rgba(255,255,255,0.08);
  border-radius:999px;
  padding:12px;
  backdrop-filter:blur(10px);
  transition:.3s;
}

.inputBox:hover{
  transform:scale(1.02);
}

.inputBox input{
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:white;
}

.send{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#10a37f;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
  transition:.3s;
}

.send:hover{
  transform:scale(1.1);
}

/* ================= CHAT ================= */
.chat{
  display:none;
  flex:1;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  perspective:1000px;
}

/* 3D scroll */
.messages.scrolling{
  transform:rotateX(5deg);
}

/* ================= MESSAGES ================= */
.msg{
  max-width:65%;
  padding:12px;
  border-radius:12px;
  animation:slideUp .3s ease;
}

@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

.user{
  align-self:flex-end;
  background:white;
  color:black;
}

.ai{
  align-self:flex-start;
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(255,255,255,0.1);
}

/* ================= THINKING ================= */
.thinking{
  display:flex;
  gap:6px;
}

.dot{
  width:6px;
  height:6px;
  background:#aaa;
  border-radius:50%;
  animation:blink 1s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* ================= INPUT CHAT ================= */
.bottom{
  display:flex;
  gap:10px;
  padding:15px;
  border-top:1px solid rgba(255,255,255,0.1);
}

.bottom textarea{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  resize:none;
}

.sendBtn{
  width:50px;
  border:none;
  border-radius:10px;
  background:#10a37f;
  color:white;
  cursor:pointer;
  transition:.3s;
}

.sendBtn:hover{
  transform:scale(1.1);
}

/* ================= LOGIN ================= */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.loginBox{
  background:#111;
  padding:30px;
  border-radius:20px;
  width:300px;
  color:white;
  text-align:center;
  animation:zoomIn .4s ease;
}

@keyframes zoomIn{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.loginBox input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

.loginBox button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign up</button>
  </div>
</div>

<div class="top">
  <div class="logo">ILYASS AI</div>
  <div class="auth">
    <button class="btn login" onclick="openLogin()">Login</button>
    <button class="btn signup" onclick="openLogin()">Sign up</button>
  </div>
</div>

<div id="home" class="center">
  <div class="title">Ask Anything</div>

  <div class="inputBox">
    <input id="homeInput" onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput" onkeydown="handleKey(event)"></textarea>
    <button class="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<script>

/* ===== FIX VARIABLES ===== */
const messages = document.getElementById("messages");

/* ===== LOGIN ===== */
function openLogin(){
  loginOverlay.style.display="flex";
}

/* ===== CHAT ===== */
function startChat(){
  const text = homeInput.value.trim();
  if(!text) return;

  home.style.display="none";
  chat.style.display="flex";

  addMessage(text,"user");
  askAI(text);
}

/* ===== TYPE EFFECT ===== */
function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML += text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },15);
}

/* ===== ADD MESSAGE ===== */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;

  const content=document.createElement("div");
  div.appendChild(content);

  messages.appendChild(div);

  if(type==="ai"){
    typeText(content,text);
  }else{
    content.innerText=text;
  }

  scrollBottom();
}

/* ===== THINKING ===== */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  messages.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom(){
  messages.scrollTop=messages.scrollHeight;
}

/* ===== AI CALL ===== */
async function askAI(text){
  const t = showThinking();

  setTimeout(()=>{
    t.remove();
    addMessage("This is a demo AI response working perfectly ✅","ai");
  },1200);
}

/* ===== SEND ===== */
function handleKey(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
}

function send(){
  const text=chatInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  chatInput.value="";
  askAI(text);
}

/* ===== 3D SCROLL ===== */
messages.addEventListener("scroll",()=>{
  messages.classList.add("scrolling");
  setTimeout(()=>messages.classList.remove("scrolling"),200);
});

/* ===== PARTICLES ===== */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let dots=[];
for(let i=0;i<60;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dots.forEach(d=>{
    d.x+=d.vx;
    d.y+=d.vy;

    if(d.x<0||d.x>canvas.width)d.vx*=-1;
    if(d.y<0||d.y>canvas.height)d.vy*=-1;

    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.fillStyle="#10a37f";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
