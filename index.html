<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok - AI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'inter': ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out forwards',
            'scale-in': 'scaleIn 0.3s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            scaleIn: {
              '0%': { transform: 'scale(0.98)' },
              '100%': { transform: 'scale(1)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    .glow-border:focus-within {
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 0 0 4px rgba(255,255,255,0.05);
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen overflow-hidden">
  <!-- Top Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex items-center justify-between h-16 backdrop-blur-sm">
    <!-- Logo -->
    <div class="flex items-center space-x-2">
      <div class="w-8 h-8 bg-gradient-to-r from-purple-500 to-blue-500 rounded-lg flex items-center justify-center shadow-lg">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
      </div>
    </div>

    <!-- Right side nav -->
    <div class="flex items-center space-x-3">
      <button class="text-gray-400 hover:text-white px-3 py-1 text-sm font-medium transition-colors duration-200" aria-label="Imagine">
        Imagine
      </button>
      <button class="p-2 text-gray-400 hover:text-white rounded-full hover:bg-white/10 transition-all duration-200" aria-label="Settings">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
      
      <button class="px-4 py-2 text-sm font-medium text-white border border-white/20 bg-transparent hover:border-white/40 rounded-full transition-all duration-200" aria-label="Sign in">
        Sign in
      </button>
      
      <button class="px-6 py-2 text-sm font-semibold text-black bg-white hover:bg-white/90 rounded-full shadow-lg hover:shadow-xl transition-all duration-200" aria-label="Sign up">
        Sign up
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex flex-col min-h-screen pt-16 pb-12">
    <div class="flex-1 flex flex-col items-center justify-center px-4">
      <!-- Logo & Title -->
      <div class="text-center mb-10 animate-fade-in">
        <div class="w-20 h-20 mx-auto mb-6 bg-gradient-to-r from-purple-500 via-blue-500 to-indigo-500 rounded-2xl flex items-center justify-center shadow-2xl animate-scale-in">
          <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <h1 class="text-5xl md:text-6xl font-semibold tracking-tight bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent">
          Grok
        </h1>
      </div>

      <!-- Main Input Container -->
      <div class="w-full max-w-2xl animate-fade-in">
        <div class="relative group">
          <!-- Input Container -->
          <div class="bg-[#111111] border border-white/5 rounded-3xl px-5 py-4 flex items-center shadow-[0_0_0_1px_rgba(255,255,255,0.05)] hover:shadow-[0_0_0_1px_rgba(255,255,255,0.1)] focus-within:glow-border transition-all duration-300">
            
            <!-- Left attachment icon -->
            <button class="p-2 text-gray-500 hover:text-white rounded-xl hover:bg-white/10 transition-all duration-200 mr-3" aria-label="Attach file">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
              </svg>
            </button>

            <!-- Input Field -->
            <input 
              type="text" 
              placeholder="What's on your mind?" 
              class="flex-1 bg-transparent border-none outline-none text-white placeholder-gray-500 text-base placeholder:text-gray-500/70 font-normal"
              aria-label="Message Grok"
            />

            <!-- Right side elements -->
            <div class="flex items-center space-x-3 ml-3">
              
              <!-- Auto dropdown -->
              <div class="flex items-center space-x-1 px-3 py-1.5 bg-white/5 rounded-2xl text-xs text-gray-400 hover:bg-white/10 cursor-pointer transition-all duration-200 group/auto">
                <span>Auto</span>
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>

              <!-- Microphone -->
              <button class="p-2 text-gray-400 hover:text-white rounded-2xl hover:bg-white/10 transition-all duration-200" aria-label="Voice input">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                </svg>
              </button>

              <!-- Main Send Button -->
              <button class="w-11 h-11 bg-white rounded-2xl flex items-center justify-center shadow-lg hover:shadow-xl hover:scale-105 active:scale-95 transition-all duration-200" aria-label="Send message">
                <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-4l-4 4z"/>
                </svg>
              </button>

            </div>
          </div>

          <!-- Subtext badge -->
          <div class="flex items-center mt-4 px-4">
            <div class="inline-flex items-center px-4 py-2 bg-[#111111] border border-white/10 rounded-2xl text-xs text-gray-500">
              <span>New</span>
              <span class="ml-2">·</span>
              <span class="ml-2">Hold Ctrl+D to dictate</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 text-center">
      <p class="text-xs text-gray-500 leading-relaxed">
        By messaging Grok, you agree to our 
        <a href="#" class="text-gray-400 hover:text-white transition-colors duration-200">Terms</a> and 
        <a href="#" class="text-gray-400 hover:text-white transition-colors duration-200 ml-1">Privacy Policy</a>.
      </p>
    </div>
  </main>

  <script>
    // Add staggered animations
    document.addEventListener('DOMContentLoaded', () => {
      const elements = document.querySelectorAll('.animate-fade-in, .animate-scale-in');
      elements.forEach((el, index) => {
        el.style.animationDelay = `${index * 0.1}s`;
      });
    });

    // Input focus animations
    const inputContainer = document.querySelector('.glow-border');
    const input = document.querySelector('input');
    
    input.addEventListener('focus', () => {
      inputContainer.classList.add('glow-border');
    });
    
    input.addEventListener('blur', () => {
      if (!input.value) {
        inputContainer.classList.remove('glow-border');
      }
    });

    // Responsive nav collapse
    function handleResize() {
      const navRight = document.querySelector('nav > div:last-child');
      if (window.innerWidth < 768) {
        navRight.classList.add('space-x-2');
        navRight.querySelector('button:last-child').textContent = 'Sign up';
        navRight.querySelector('button:last-child').classList.add('px-4', 'text-xs');
      } else {
        navRight.classList.remove('space-x-2');
        navRight.querySelector('button:last-child').textContent = 'Sign up';
        navRight.querySelector('button:last-child').classList.remove('px-4', 'text-xs');
      }
    }

    window.addEventListener('resize', handleResize);
    handleResize();
  </script>
</body>
</html>
