<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ilyass AI Clone</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#000;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* NAVBAR */
.nav{
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
}

.nav-left{
  font-weight:700;
  letter-spacing:1px;
}

.nav-right button{
  margin-left:12px;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid #ffffff33;
  background:transparent;
  color:white;
  cursor:pointer;
}

.nav-right button:hover{
  opacity:0.85;
}

/* CENTER */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  animation: fadeIn 300ms ease-out;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.98);}
  to{opacity:1; transform:scale(1);}
}

.title{
  font-size:48px;
  font-weight:600;
  margin-bottom:30px;
}

/* CHAT BOX INPUT */
.input-box{
  width:700px;
  max-width:90%;
  height:60px;
  background:#111;
  border-radius:999px;
  display:flex;
  align-items:center;
  padding:0 14px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.05);
}

.input-box input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:16px;
  padding-left:10px;
}

.input-box input::placeholder{
  color:rgba(255,255,255,0.4);
}

.icon{
  color:#888;
  margin:0 8px;
  cursor:pointer;
}

.auto{
  font-size:14px;
  color:#ccc;
  margin-right:10px;
  cursor:pointer;
}

.send{
  width:38px;
  height:38px;
  border-radius:50%;
  background:white;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:bold;
}

/* CHAT AREA */
.chat-box{
  position:absolute;
  top:70px;
  bottom:0;
  width:100%;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:10px 14px;
  border-radius:10px;
  word-wrap:break-word;
  white-space:pre-wrap;
}

.user{
  background:#22c55e;
  color:black;
  align-self:flex-end;
}

.ai{
  background:#1f2937;
  align-self:flex-start;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:12px;
  color:#666;
}
.footer span{
  color:#999;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-left">◆ ILYASS AI AGENT</div>
  <div class="nav-right">
    <button>Imagine</button>
  </div>
</div>

<!-- CHAT MESSAGES (EMPTY NOW) -->
<div class="chat-box" id="messages"></div>

<!-- CENTER INPUT -->
<div class="center">

  <div class="title">ILYASS AI AGENT</div>

  <div class="input-box">
    <span class="icon">📎</span>

    <input id="input"
      placeholder="What's on your mind?" />

    <span class="auto">Auto ▼</span>

    <span class="icon">🎤</span>

    <div class="send" id="sendBtn">➤</div>
  </div>

  <div class="subtext">New · Hold Ctrl+D to dictate</div>

</div>

<!-- FOOTER -->
<div class="footer">
 Contact WebSite Owner "ILYASS" To Get Any Access on Our Website, you agree to our <span>Terms</span> and <span>Privacy Policy</span>.
</div>

<script>

const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
let loading = false;

/* ENTER KEY FIX */
input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener("click", send);

function addMessage(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  const box = document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function setLoading(state){
  loading = state;
  sendBtn.innerText = state ? "..." : "➤";
  sendBtn.style.pointerEvents = state ? "none" : "auto";
}

async function send(){

  if(loading) return;

  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  setLoading(true);

  try{

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ message: text })
    });

    let data;
    try{
      data = await res.json();
    }catch(e){
      const txt = await res.text();
      throw new Error(txt);
    }

    if(!res.ok){
      throw new Error(data.error || "Server error");
    }

    addMessage(data.reply || "No response","ai");

  }catch(err){
    addMessage("❌ ERROR:\n" + err.message,"ai");
  }

  setLoading(false);
}

</script>

</body>
</html>
