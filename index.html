<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok - AI Chat</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out forwards',
            'scale-in': 'scaleIn 0.3s ease-out forwards',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            scaleIn: { '0%': { transform: 'scale(0.98)' }, '100%': { transform: 'scale(1)' } }
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }

    .glow-border {
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1),
                  0 0 0 4px rgba(255,255,255,0.05);
    }
  </style>
</head>

<body class="bg-black text-white min-h-screen overflow-hidden">

<!-- NAV -->
<nav class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex justify-between h-16 backdrop-blur-sm">
  <div class="text-white font-bold">Grok</div>

  <div class="flex items-center space-x-3">
    <button class="text-gray-400">Imagine</button>
    <button class="px-4 py-2 border border-white/20 rounded-full">Sign in</button>
    <button class="px-4 py-2 bg-white text-black rounded-full">Sign up</button>
  </div>
</nav>

<!-- MAIN -->
<main class="flex flex-col min-h-screen pt-24 items-center">

  <h1 class="text-5xl mb-10">Grok</h1>

  <!-- CHAT BOX -->
  <div id="chatContainer" class="w-full max-w-2xl space-y-4 mb-6"></div>

  <!-- INPUT -->
  <div id="inputBox"
       class="w-full max-w-2xl flex items-center bg-[#111] border border-white/10 rounded-3xl px-4 py-3">

    <input id="messageInput"
           type="text"
           placeholder="What's on your mind?"
           class="flex-1 bg-transparent outline-none text-white px-2" />

    <button id="sendBtn"
            class="w-11 h-11 bg-white text-black rounded-2xl ml-2">
      ➤
    </button>
  </div>

</main>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const input = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const chat = document.getElementById("chatContainer");
  const inputBox = document.getElementById("inputBox");

  function addMessage(text) {
    const msg = document.createElement("div");
    msg.className = "p-3 bg-white/10 rounded-xl text-white";
    msg.textContent = text;
    chat.appendChild(msg);
  }

  function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage("You: " + text);
    input.value = "";

    // demo bot reply
    setTimeout(() => {
      addMessage("AI: I received -> " + text);
    }, 500);
  }

  // CLICK SEND
  sendBtn.addEventListener("click", sendMessage);

  // ENTER KEY
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  // focus effect
  input.addEventListener("focus", () => {
    inputBox.classList.add("glow-border");
  });

  input.addEventListener("blur", () => {
    if (!input.value) inputBox.classList.remove("glow-border");
  });

});
</script>

</body>
</html>
