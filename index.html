<script>

const SUPABASE_URL = "https://idjgsgtupuymysptxrbl.supabase.co";
const SUPABASE_KEY = "sb_publishable_XLIIiXZRcS5hrvdQP_pkMA_w2I11xFH";

/* AUTO LOGIN */
window.onload = () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if(user){
    showProfile(user);
  }
};

/* PROFILE */
function showProfile(data){
  document.getElementById("authButtons").style.display="none";
  document.getElementById("profileBox").style.display="block";

  document.getElementById("profileName").innerText = data.email;
  document.getElementById("profileEmail").innerText = "Logged in";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* SIGNUP */
async function doSignup(){

  const email = document.getElementById("signupEmail").value.trim();
  const errorEl = document.getElementById("signupError");

  if(!email) return errorEl.innerText="❌ Email required";

  try{
    const res = await fetch(SUPABASE_URL + "/auth/v1/signup",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey":SUPABASE_KEY
      },
      body:JSON.stringify({
        email:email,
        password:"12345678"
      })
    });

    const data = await res.json();

    if(data.error){
      errorEl.innerText="❌ " + data.error.message;
      return;
    }

    errorEl.style.color="lightgreen";
    errorEl.innerText="✔ Check your email 📩 THEN confirm";

  }catch(err){
    console.error(err);
    errorEl.innerText="❌ Network error (check internet OR Supabase URL)";
  }
}

/* LOGIN (REAL CHECK 🔥) */
async function doLogin(){

  const email = document.getElementById("loginEmail").value.trim();
  const errorEl = document.getElementById("loginError");

  if(!email) return errorEl.innerText="❌ Enter email";

  try{
    const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey":SUPABASE_KEY
      },
      body:JSON.stringify({
        email:email,
        password:"12345678"
      })
    });

    const data = await res.json();

    console.log(data);

    if(data.error){

      if(data.error.message.includes("Email not confirmed")){
        errorEl.innerText="❌ خاصك دير Verify للإيميل ديالك 📩";
      }
      else if(data.error.message.includes("Invalid login credentials")){
        errorEl.innerText="❌ هاد الإيميل ما مسجلش";
      }
      else{
        errorEl.innerText="❌ " + data.error.message;
      }

      return;
    }

    /* SUCCESS LOGIN */
    localStorage.setItem("user", JSON.stringify({
      email: email
    }));

    showProfile({email});
    closeLogin();

  }catch(err){
    console.error(err);
    errorEl.innerText="❌ Network error (CORS / URL / KEY)";
  }
}

</script>
