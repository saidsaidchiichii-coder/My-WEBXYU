<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

/* ===== SIDEBAR FIX ===== */
body{
    display:flex;
}

/* sidebar smaller */
.sidebar{
    width:220px;
    background:#0b0b0b;
    border-right:1px solid #1f1f1f;
    height:100vh;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:16px;
    transition:.3s;
}

/* hidden state */
.sidebar.hiddenSide{
    width:60px;
    padding:10px;
}

/* hide text when collapsed */
.sidebar.hiddenSide .text{
    display:none;
}

/* buttons */
.side-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:#111;
    border:1px solid #2a2a2a;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.side-btn:hover{
    background:#1a1a1a;
}

/* toggle icon button */
.toggle-btn{
    cursor:pointer;
    margin-bottom:10px;
}

/* panel text */
.panel{
    font-size:12px;
    opacity:.6;
}

/* MAIN */
.container{
    flex:1;
}

/* ===== HERO / ANIM ===== */
.hero-logo{
    animation: float 4s ease-in-out infinite;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* 3D FIRST MESSAGE */
.chat-view.active3d{
    transform: perspective(1000px) rotateX(6deg) scale(.98);
    transition:.6s;
}

/* KEEP ORIGINAL */
#tsparticles{position:fixed;inset:0;z-index:0;}
.search-box{backdrop-filter:blur(20px);background:rgba(20,20,20,0.6);border:1px solid rgba(255,255,255,0.08);}
.search-box:focus-within{box-shadow:0 0 20px rgba(255,255,255,0.1);}
.hero-logo h1{letter-spacing:-2px;}
.send-btn{box-shadow:0 0 10px rgba(255,255,255,0.2);}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <!-- TOGGLE ICON -->
    <div class="toggle-btn" onclick="toggleSidebar()">
        <i data-lucide="panel-left"></i>
    </div>

    <div class="side-btn" onclick="location.reload()">
        <i data-lucide="plus"></i>
        <span class="text">New Chat</span>
    </div>

    <div class="panel text">
        Get responses tailored to you.<br><br>
        Log in to get answers based on saved chats, plus create images and upload files.
    </div>

    <div class="side-btn" id="loginSide">
        <i data-lucide="log-in"></i>
        <span class="text">Log in</span>
    </div>

    <div class="side-btn">
        <i data-lucide="help-circle"></i>
        <span class="text">Help</span>
    </div>

    <div class="side-btn">
        <i data-lucide="layout-grid"></i>
        <span class="text">Apps</span>
    </div>

    <div class="side-btn">
        <i data-lucide="credit-card"></i>
        <span class="text">Pricing</span>
    </div>

</div>

<div id="tsparticles"></div>

<div class="container">

<header class="top-nav">
<div class="nav-left">
    <div class="logo-container" onclick="location.reload()">
        <svg class="grok-logo" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
        </svg>
    </div>
</div>

<div class="nav-right">
    <button class="nav-btn" id="imagineBtn">
        <i data-lucide="sparkles"></i>
        <span>Imagine</span>
    </button>

    <button class="nav-btn" id="settingsBtn">
        <i data-lucide="settings"></i>
    </button>

    <button class="btn-signin" id="signinBtn">Sign in</button>
    <button class="btn-signup" id="signupBtn">Sign up</button>
</div>
</header>

<main class="container">

<section id="home" class="home-view">

<div class="hero-section">
    <div class="hero-logo">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
        </svg>
        <h1>Grok</h1>
    </div>

    <div class="hero-text">
        <h2>Your AI Assistant</h2>
        <p>Ask anything. Get instant smart answers.</p>
    </div>
</div>

<div class="search-container">
<div class="search-box">
<div class="input-area">

<button class="input-icon" id="uploadBtn">
    <i data-lucide="paperclip"></i>
</button>

<textarea id="homeInput" rows="1" placeholder="What do you want to know?"></textarea>

<div class="input-controls">
    <button class="control-btn" id="micBtn">
        <i data-lucide="mic"></i>
    </button>

    <button class="control-btn send-btn" onclick="startChat()">
        <i data-lucide="arrow-up"></i>
    </button>
</div>

</div>
</div>
</div>

</section>

<section id="chat" class="chat-view hidden">
<div id="messages"></div>

<div class="chat-input-container">
<div class="search-box">
<div class="input-area">

<button class="input-icon" id="uploadBtn2">
    <i data-lucide="paperclip"></i>
</button>

<textarea id="chatInput" rows="1" placeholder="Send a message..."></textarea>

<div class="input-controls">
    <button class="control-btn send-btn" onclick="send()">
        <i data-lucide="arrow-up"></i>
    </button>
</div>

</div>
</div>
</div>
</section>

</main>
</div>

<script src="ControleAi.js"></script>

<script>
lucide.createIcons();
AI.init("messages", "https://my-webxyu.vercel.app/api/chat");

tsParticles.load("tsparticles", {
    particles: {
        number: { value: 80 },
        size: { value: 2 },
        move: { enable: true, speed: 1 },
        opacity: { value: 0.4 },
        links: { enable: true, opacity: 0.1 }
    }
});

const homeView = document.getElementById("home");
const chatView = document.getElementById("chat");

/* sidebar toggle */
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("hiddenSide");
}

/* ENTER */
document.getElementById("homeInput").addEventListener("keydown", e=>{
    if(e.key==="Enter" && !e.shiftKey){
        e.preventDefault();
        startChat();
    }
});

document.getElementById("chatInput").addEventListener("keydown", e=>{
    if(e.key==="Enter" && !e.shiftKey){
        e.preventDefault();
        send();
    }
});

function autoResize(t){
    t.style.height="auto";
    t.style.height=Math.min(t.scrollHeight,180)+"px";
}

homeInput.oninput=()=>autoResize(homeInput);
chatInput.oninput=()=>autoResize(chatInput);

/* first message flag */
let firstMessage = true;

function startChat(){
    const input = document.getElementById("homeInput");
    const text = input.value.trim();
    if(!text) return;

    homeView.classList.add("hidden");
    chatView.classList.remove("hidden");

    /* 3D + AUTO HIDE SIDEBAR */
    if(firstMessage){
        chatView.classList.add("active3d");
        setTimeout(()=>chatView.classList.remove("active3d"),800);

        document.getElementById("sidebar").classList.add("hiddenSide");

        firstMessage = false;
    }

    AI.user(text);
    AI.ask(text);

    input.value="";
}

function send(){
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if(!text) return;

    AI.user(text);
    AI.ask(text);

    input.value="";
}

document.getElementById("settingsBtn").onclick = () => {
    alert("Settings panel");
};

document.getElementById("imagineBtn").onclick = () => {
    const homeInput = document.getElementById("homeInput");
    if(homeInput.value.trim()){
        startChat();
    }else{
        alert("Write something first");
    }
};

document.getElementById("uploadBtn").onclick =
document.getElementById("uploadBtn2").onclick = () => {
    const input = document.createElement("input");
    input.type="file";
    input.click();
};

document.getElementById("signinBtn").onclick =
document.getElementById("signupBtn").onclick =
document.getElementById("loginSide").onclick = () => {
    alert("Auth system ready");
};
</script>

</body>
</html>
