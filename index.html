<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> Zentavo AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* 🌑 EXACT CHATGPT WEBSITE DESIGN */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background:#343541;
color:#ececf1;
overflow:hidden;
display:flex;
}

/* SIDEBAR - EXACT CHATGPT WITH CONVERSATIONS */
.sidebar{
width:260px;
background:#202123;
border-right:1px solid #343541;
display:flex;
flex-direction:column;
overflow:hidden;
}

.sidebar-header{
padding:16px;
border-bottom:1px solid #343541;
display:flex;
align-items:center;
gap:12px;
}

.logo{
font-size:20px;
font-weight:700;
background:linear-gradient(135deg, #10a37f 0%, #0e7a5a 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

.new-chat{
margin:16px;
padding:12px 16px;
background:#2a2b32;
border:1px solid #40414f;
border-radius:8px;
cursor:pointer;
font-size:14px;
font-weight:500;
color:#ececf1;
transition:all 0.2s ease;
}

.new-chat:hover{
background:#343541;
border-color:#565869;
}

/* CONVERSATIONS LIST - EXACT CHATGPT */
.conversations{
flex:1;
overflow-y:auto;
padding:8px 0;
}

.conversation-item{
padding:12px 16px;
cursor:pointer;
border-radius:8px;
margin:0 8px;
transition:all 0.2s ease;
font-size:14px;
display:flex;
flex-direction:column;
gap:4px;
}

.conversation-item:hover{
background:#2a2b32;
}

.conversation-item.active{
background:#343541;
border:1px solid #10a37f;
}

.conversation-title{
font-weight:500;
color:#ececf1;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.conversation-preview{
font-size:12px;
color:#8e8ea0;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* MAIN CHAT AREA - EXACT CHATGPT */
.chat-container{
flex:1;
display:flex;
flex-direction:column;
max-width:100%;
}

/* TOPBAR - EXACT CHATGPT */
.topbar{
height:52px;
background:#343541;
border-bottom:1px solid #343541;
display:flex;
align-items:center;
justify-content:center;
padding:0 24px;
font-size:14px;
font-weight:500;
color:#ececf1;
}

/* MESSAGES - EXACT CHATGPT SCROLL */
.messages{
flex:1;
overflow-y:auto;
padding:24px 24px 0;
display:flex;
flex-direction:column;
gap:24px;
scroll-behavior:smooth;
}

/* MESSAGE CONTAINER */
.message-container{
display:flex;
gap:16px;
max-width:85%;
}

/* USER MESSAGE - EXACT CHATGPT */
.user-container{
align-self:flex-end;
}

.user{
padding:12px 16px;
background:#10a37f;
border-radius:18px 18px 4px 18px;
color:#fff;
font-size:15px;
line-height:22px;
max-width:100%;
word-wrap:break-word;
}

/* AI MESSAGE - EXACT CHATGPT */
.ai-container{
align-self:flex-start;
}

.ai{
padding:12px 16px;
background:#2a2b32;
border:1px solid #40414f;
border-radius:18px 18px 18px 4px;
color:#ececf1;
font-size:15px;
line-height:22px;
max-width:100%;
word-wrap:break-word;
}

/* INPUT AREA - EXACT CHATGPT */
.input-area{
padding:24px;
background:#40414f;
border-top:1px solid #565869;
}

.input-container{
max-width:880px;
margin:0 auto;
display:flex;
gap:12px;
align-items:end;
}

.input-box{
flex:1;
padding:12px 16px;
background:#2a2b32;
border:1px solid #40414f;
border-radius:12px;
color:#ececf1;
font-size:15px;
line-height:22px;
outline:none;
resize:none;
max-height:200px;
min-height:40px;
}

.input-box:focus{
border-color:#10a37f;
box-shadow:0 0 0 3px rgba(16,163,127,0.1);
}

.send-btn{
width:40px;
height:40px;
border:none;
border-radius:50%;
background:#10a37f;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:all 0.2s ease;
flex-shrink:0;
}

.send-btn:hover:not(:disabled){
background:#0e7a5a;
}

.send-btn:disabled{
opacity:0.5;
cursor:not-allowed;
}

.send-icon{
width:20px;
height:20px;
color:#fff;
}

/* ANIMATIONS */
@keyframes fadeInUp{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.msg{
animation:fadeInUp 0.2s ease-out;
}

/* SCROLLBAR - CHATGPT STYLE */
.messages::-webkit-scrollbar,
.conversations::-webkit-scrollbar{
width:4px;
}

.messages::-webkit-scrollbar-track,
.conversations::-webkit-scrollbar-track{
background:transparent;
}

.messages::-webkit-scrollbar-thumb,
.conversations::-webkit-scrollbar-thumb{
background:#40414f;
border-radius:2px;
}

.messages::-webkit-scrollbar-thumb:hover,
.conversations::-webkit-scrollbar-thumb:hover{
background:#565869;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="sidebar-header">
<div class="logo"> ILYASS AI </div>
</div>
<div class="new-chat" onclick="newChat()">+ New Chat</div>
<div class="conversations" id="conversations">
<!-- Conversations will be added here -->
</div>
</div>

<div class="chat-container">

<div class="topbar" id="currentChatTitle">New Chat</div>

<div class="messages" id="messages">
<div class="message-container ai-container">
<div class="ai">Hello 👋 كيف نعاونك اليوم؟</div>
</div>
</div>

<div class="input-area">
<div class="input-container">
<textarea id="input" class="input-box" placeholder="Send a message" rows="1" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); send();}" oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';"></textarea>
<button id="btn" class="send-btn" onclick="send()">
<svg class="send-icon" viewBox="0 0 20 20" fill="currentColor">
<path fill-rule="evenodd" d="M3.105 2.289a.75.75 0 0 0-.826.95l1.8 16.5a.75.75 0 0 0 1.47.3l2.7-2.7a.75.75 0 0 1 1.06 0l2.7 2.7a.75.75 0 0 0 1.47-.3l1.8-16.5a.75.75 0 0 0-.826-.95A.75.75 0 0 0 16 2.25H8a3.75 3.75 0 0 1-3.75-3.75A3.75 3.75 0 0 0 3.105 2.289ZM10 17.94l-3.73-3.73a.75.75 0 0 1 0-1.06l2.25-2.25a.75.75 0 1 1 1.06 0l2.25 2.25a.75.75 0 0 1 0 1.06L10 17.94Z" clip-rule="evenodd"/>
</svg>
</button>
</div>
</div>

</div>

<script>

// YOUR SAME EXACT CODE + CHATGPT CONVERSATION HISTORY
let currentChatId = 'chat-1';
let chats = JSON.parse(localStorage.getItem('chats')) || {};
let chatHistory = [];

// Initialize first chat
if(!chats['chat-1']){
  chats['chat-1'] = {
    title: 'New Chat',
    messages: [{role: 'ai', content: 'Hello 👋 كيف نعاونك اليوم؟'}],
    preview: 'Hello 👋 كيف ن...'
  };
}

function updateConversations(){
  const convContainer = document.getElementById('conversations');
  convContainer.innerHTML = '';
  
  Object.keys(chats).forEach(chatId => {
    const chat = chats[chatId];
    const div = document.createElement('div');
    div.className = `conversation-item ${currentChatId === chatId ? 'active' : ''}`;
    div.onclick = () => loadChat(chatId);
    div.innerHTML = `
      <div class="conversation-title">${chat.title}</div>
      <div class="conversation-preview">${chat.preview}</div>
    `;
    convContainer.appendChild(div);
  });
}

function newChat(){
  const newId = 'chat-' + Date.now();
  currentChatId = newId;
  chats[newId] = {
    title: 'New Chat',
    messages: [{role: 'ai', content: 'Hello 👋 كيف نعاونك اليوم؟'}],
    preview: 'Hello 👋 كيف ن...'
  };
  loadChat(newId);
  saveChats();
  updateConversations();
}

function loadChat(chatId){
  currentChatId = chatId;
  const chat = chats[chatId];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('currentChatTitle').textContent = chat.title;
  chat.messages.forEach(msg => addMessage(msg.content, msg.role));
  updateConversations();
}

function saveChats(){
  localStorage.setItem('chats', JSON.stringify(chats));
}

function updateChatTitle(){
  const firstMsg = chats[currentChatId]?.messages?.[1];
  if(firstMsg && firstMsg.role === 'user' && chats[currentChatId].title === 'New Chat'){
    const title = firstMsg.content.length > 30 ? firstMsg.content.substring(0,30) + '...' : firstMsg.content;
    chats[currentChatId].title = title;
    document.getElementById('currentChatTitle').textContent = title;
    updateConversations();
  }
}

function clearChat(){
  newChat();
}

function setLoading(state){
const btn = document.getElementById("btn");
btn.disabled = state;
if(state){
btn.innerHTML = '<div style="width:20px;height:20px;border:2px solid transparent;border-top:2px solid #fff;border-radius:50%;animation:spin 1s linear infinite"></div>';
}else{
btn.innerHTML = '<svg class="send-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3.105 2.289a.75.75 0 0 0-.826.95l1.8 16.5a.75.75 0 0 0 1.47.3l2.7-2.7a.75.75 0 0 1 1.06 0l2.7 2.7a.75.75 0 0 0 1.47-.3l1.8-16.5a.75.75 0 0 0-.826-.95A.75.75 0 0 0 16 2.25H8a3.75 3.75 0 0 1-3.75-3.75A3.75 3.75 0 0 0 3.105 2.289ZM10 17.94l-3.73-3.73a.75.75 0 0 1 0-1.06l2.25-2.25a.75.75 0 1 1 1.06 0l2.25 2.25a.75.75 0 0 1 0 1.06L10 17.94Z" clip-rule="evenodd"/></svg>';
}
}

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();
if(!text) return;

addMessage(text,"user");
input.value="";

setLoading(true);

try{

const res = await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({ message: text })
});

const contentType = res.headers.get("content-type");

let data;

if(contentType && contentType.includes("application/json")){
data = await res.json();
}else{
const errText = await res.text();
throw new Error(errText);
}

let reply = "No response";

if(data.choices && data.choices[0]){
reply = data.choices[0].message.content;
}else if(data.error){
reply = "Error: " + data.error;
}

addMessage(reply,"ai");

}catch(err){
addMessage("Error: " + err.message,"ai");
}

setLoading(false);

}

function addMessage(text,type){
const div = document.createElement("div");
div.className = `message-container ${type}-container`;
div.innerHTML = `<div class="${type}">${text}</div>`;

const messages = document.getElementById("messages");
messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;

// SAVE TO CURRENT CHAT
if(!chats[currentChatId]){
  chats[currentChatId] = {title: 'New Chat', messages: [], preview: ''};
}
chats[currentChatId].messages.push({role: type, content: text});

// Update preview
const preview = chats[currentChatId].messages[chats[currentChatId].messages.length-2]?.content || text;
chats[currentChatId].preview = preview.length > 50 ? preview.substring(0,50) + '...' : preview;

updateChatTitle();
saveChats();
updateConversations();
}

// Initialize
updateConversations();

</script>

<style>
@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
</style>

</body>
</html>
