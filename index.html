 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortenCashout - نفس ستايل shortencashout.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-900 via-black to-blue-900 min-h-screen overflow-x-hidden">

    <!-- Video Background -->
    <video autoplay muted loop class="absolute inset-0 w-full h-full object-cover opacity-30">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-neon-lines-background-12166-large.mp4" type="video/mp4">
    </video>

    <!-- Particles Overlay -->
    <div id="particles-js" class="absolute inset-0 z-10"></div>

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 backdrop-blur-xl bg-black/30 border-b border-white/20">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-3xl font-black bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                Shorten<span class="text-white">Cashout</span>
            </h1>
            <div class="flex space-x-4 space-x-reverse">
                <a href="#features" class="text-white/80 hover:text-cyan-400 font-medium transition-all duration-300">المميزات</a>
                <a href="#pricing" class="text-white/80 hover:text-cyan-400 font-medium transition-all duration-300">الأسعار</a>
                <button class="bg-gradient-to-r from-cyan-500 to-purple-500 text-white px-8 py-3 rounded-full font-bold hover:scale-105 shadow-2xl shadow-cyan-500/25 transition-all duration-300">
                    ابدأ الآن
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="min-h-screen flex items-center justify-center relative z-20 pt-24">
        <div class="text-center max-w-4xl mx-auto px-6" data-aos="fade-up">
            <h1 class="text-7xl md:text-9xl font-black mb-8 bg-gradient-to-r from-cyan-400 via-white to-purple-400 bg-clip-text text-transparent drop-shadow-2xl leading-tight">
                اختصر روابطك<br>
                <span class="text-5xl md:text-7xl">واکسب <span class="text-yellow-400">فلوس</span></span>
            </h1>
            <p class="text-2xl md:text-3xl text-white/80 mb-12 font-light max-w-2xl mx-auto leading-relaxed" data-aos="fade-up" data-aos-delay="200">
                احصل على دفعات فورية لكل نقرة • لا حدود • دعم 24/7
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center" data-aos="zoom-in" data-aos-delay="400">
                <input type="text" placeholder="ضع رابطك هنا..." 
                       class="w-full sm:w-96 px-8 py-6 bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl text-white placeholder-white/60 font-medium text-lg focus:outline-none focus:ring-4 focus:ring-cyan-500/30 transition-all duration-300">
                <button class="bg-gradient-to-r from-cyan-500 to-purple-500 text-white px-12 py-6 rounded-3xl font-black text-xl hover:scale-105 shadow-2xl shadow-cyan-500/50 transition-all duration-300">
                    اختصر الآن 🚀
                </button>
            </div>
        </div>
    </section>

    <!-- Features Section -->
    <section id="features" class="py-40 relative z-20">
        <div class="max-w-6xl mx-auto px-6">
            <h2 class="text-6xl font-black text-center mb-24 text-white" data-aos="fade-up">لماذا تختارنا؟</h2>
            
            <div class="grid md:grid-cols-3 gap-12">
                <!-- Feature 1 -->
                <div class="group relative p-12 bg-white/5 backdrop-blur-xl rounded-3xl border border-white/20 hover:bg-white/10 transition-all duration-500 hover:scale-105 hover:-translate-y-4 cursor-pointer" data-aos="fade-up" data-aos-delay="100">
                    <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/20 to-purple-500/20 rounded-3xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="relative">
                        <div class="w-24 h-24 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-2xl group-hover:rotate-12 transition-transform duration-500">
                            <span class="text-3xl font-black text-white">💰</span>
                        </div>
                        <h3 class="text-3xl font-black mb-6 text-white text-center">دفع فوري</h3>
                        <p class="text-white/80 text-center leading-relaxed">احصل على فلوسك كل يوم بدون تأخير</p>
                    </div>
                </div>

                <!-- Feature 2 -->
                <div class="group relative p-12 bg-white/5 backdrop-blur-xl rounded-3xl border border-white/20 hover:bg-white/10 transition-all duration-500 hover:scale-105 hover:-translate-y-4 cursor-pointer" data-aos="fade-up" data-aos-delay="200">
                    <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/20 to-purple-500/20 rounded-3xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="relative">
                        <div class="w-24 h-24 bg-gradient-to-r from-green-500 to-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-2xl group-hover:rotate-12 transition-transform duration-500">
                            <span class="text-3xl font-black text-white">⚡</span>
                        </div>
                        <h3 class="text-3xl font-black mb-6 text-white text-center">سرعة فائقة</h3>
                        <p class="text-white/80 text-center leading-relaxed">أسرع من المنافسين بـ 10x</p>
                    </div>
                </div>

                <!-- Feature 3 -->
                <div class="group relative p-12 bg-white/5 backdrop-blur-xl rounded-3xl border border-white/20 hover:bg-white/10 transition-all duration-500 hover:scale-105 hover:-translate-y-4 cursor-pointer" data-aos="fade-up" data-aos-delay="300">
                    <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/20 to-purple-500/20 rounded-3xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="relative">
                        <div class="w-24 h-24 bg-gradient-to-r from-orange-500 to-red-500 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-2xl group-hover:rotate-12 transition-transform duration-500">
                            <span class="text-3xl font-black text-white">📱</span>
                        </div>
                        <h3 class="text-3xl font-black mb-6 text-white text-center">متوافق مع الهواتف</h3>
                        <p class="text-white/80 text-center leading-relaxed">يعمل مثالياً على كل الأجهزة</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // AOS
        AOS.init({ duration: 1200, once: true });

        // Particles
        particlesJS('particles-js', {
            particles: {
                number: { value: 100 },
                color: { value: ['#00f5ff', '#ff00ff', '#ffff00'] },
                shape: { type: 'circle' },
                opacity: { value: 0.3, random: true },
                size: { value: 4, random: true },
                move: { speed: 1, direction: 'none', random: true }
            },
            interactivity: {
                events: { onhover: { enable: true, mode: 'repulse' } }
            }
        });

        // GSAP Scroll Animations
        gsap.registerPlugin(ScrollTrigger);
        
        gsap.from(".group", {
            y: 100,
            opacity: 0,
            duration: 1,
            stagger: 0.2,
            scrollTrigger: {
                trigger: "#features",
                start: "top 80%"
            }
        });

        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('nav');
            if (window.scrollY > 100) {
                navbar.style.background = 'rgba(0,0,0,0.4)';
            } else {
                navbar.style.background = 'rgba(0,0,0,0.3)';
            }
        });
    </script>
</body>
</html>
