<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenFlow Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
getAuth, 
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.emailLogin = async function () {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try {
await signInWithEmailAndPassword(auth, email, password);
showDashboard();
} catch (e) {
alert(e.message);
}
};

window.register = async function () {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try {
await createUserWithEmailAndPassword(auth, email, password);
showDashboard();
} catch (e) {
alert(e.message);
}
};

window.googleLogin = async function () {
try {
await signInWithPopup(auth, provider);
showDashboard();
} catch (e) {
alert(e.message);
}
};

window.logout = async function () {
await signOut(auth);
location.reload();
};

onAuthStateChanged(auth, (user) => {
if (user) showDashboard();
});

</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;height:100vh;overflow:hidden;color:#fff}

/* BACKGROUND */
.gradient-bg{
position:fixed;width:100%;height:100%;
background:linear-gradient(135deg,#0a2e1d,#0f5132,#198754,#20c997);
z-index:-2;
}

#tsparticles{position:absolute;width:100%;height:100%;z-index:-1}

/* CENTER */
.center{
display:flex;justify-content:center;align-items:center;
height:100vh;flex-direction:column;text-align:center;
}

/* BUTTON */
.btn{
padding:14px 30px;
border-radius:50px;
border:none;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.btn-main{
background:linear-gradient(135deg,#00ff9c,#00c97b);
color:#000;
box-shadow:0 10px 30px rgba(0,255,156,.4);
}

.btn-main:hover{transform:translateY(-3px) scale(1.05)}

.google{
background:#fff;color:#000;
display:flex;align-items:center;justify-content:center;
gap:10px;
}

/* LOGIN */
.login-box{
display:none;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
width:300px;
}

.input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
outline:none;
}

/* DASHBOARD */
.dashboard{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* NEW SECOND FORM */
.profile-box{
margin-top:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
padding:20px;
border-radius:15px;
width:320px;
}

h1{font-size:3rem;margin-bottom:20px}
</style>
</head>

<body>

<div class="gradient-bg"></div>
<div id="tsparticles"></div>

<!-- HOME -->
<div class="center" id="home">
<h1>GreenFlow</h1>
<button class="btn btn-main" onclick="openLogin()">Login</button>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

<button class="btn google" onclick="googleLogin()">Continue with Google</button>

<p style="margin:10px 0">OR</p>

<input class="input" id="email" placeholder="Email">
<input class="input" id="password" type="password" placeholder="Password">

<button class="btn btn-main" style="width:100%" onclick="emailLogin()">Login</button>
<button class="btn" style="width:100%;margin-top:10px;background:#222;color:#fff" onclick="register()">
Create Account
</button>

</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dash">

<h1>Welcome 🎉</h1>
<p>You are logged in successfully</p>

<!-- 🔥 SECOND FORM -->
<div class="profile-box">
<h3>User Settings</h3>

<input class="input" placeholder="Your Name">
<input class="input" placeholder="Your Goal (e.g. Muscle Gain)">
<input class="input" placeholder="Daily Calories">

<button class="btn btn-main" style="width:100%">Save Profile</button>
</div>

<button class="btn btn-main" style="margin-top:20px" onclick="logout()">Logout</button>
</div>

<script>

// PARTICLES
tsParticles.load("tsparticles", {
particles:{
number:{value:60},
color:{value:"#00ff9c"},
links:{enable:true,color:"#00ff9c",opacity:0.3},
move:{enable:true,speed:1},
size:{value:3},
opacity:{value:0.5}
}
});

// UI
function openLogin(){
document.getElementById("loginBox").style.display="block";
}

function showDashboard(){
document.getElementById("home").style.display="none";
document.getElementById("loginBox").style.display="none";
document.getElementById("dash").style.display="flex";
}
</script>

</body>
</html>
