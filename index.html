<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> Zentavo AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* 🌈 RGB ANIMATION BACKGROUND */
body{
margin:0;
padding:0;
font-family:Inter;
height:100vh;
display:flex;
background:linear-gradient(-45deg,#0a0f1c,#111827,#0f172a,#1f2937);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
color:#e5e7eb;
overflow:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* SIDEBAR */
.sidebar{
width:260px;
background:rgba(15,23,42,0.7);
backdrop-filter: blur(12px);
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:18px;
font-weight:800;
background:linear-gradient(90deg,#ff004c,#00ffcc,#6f00ff,#ffcc00);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgbText 6s linear infinite;
}

@keyframes rgbText{
0%{background-position:0%}
100%{background-position:300%}
}

.new-chat{
padding:10px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
cursor:pointer;
text-align:center;
transition:0.3s;
}

.new-chat:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.1);
}

/* CHAT AREA */
.chat-area{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

.topbar{
padding:15px;
font-weight:600;
background:rgba(15,23,42,0.6);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

/* MESSAGES */
.messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
scroll-behavior:smooth;
}

/* MESSAGE ANIMATION */
.msg{
max-width:70%;
padding:12px 14px;
border-radius:14px;
animation:pop 0.3s ease;
transform-origin:bottom;
}

@keyframes pop{
from{transform:scale(0.8);opacity:0}
to{transform:scale(1);opacity:1}
}

/* USER RGB */
.user{
background:linear-gradient(135deg,#22c55e,#00ffcc,#00aaff);
color:#000;
align-self:flex-end;
border-bottom-right-radius:4px;
box-shadow:0 0 10px rgba(0,255,204,0.4);
}

/* AI RGB */
.ai{
background:rgba(17,24,39,0.8);
border:1px solid rgba(255,255,255,0.08);
align-self:flex-start;
border-bottom-left-radius:4px;
box-shadow:0 0 10px rgba(168,85,247,0.2);
}

/* INPUT */
.input-box{
display:flex;
padding:15px;
background:rgba(15,23,42,0.7);
backdrop-filter: blur(10px);
border-top:1px solid rgba(255,255,255,0.08);
}

input{
flex:1;
padding:12px;
border:none;
background:#111827;
color:#fff;
border-radius:10px;
outline:none;
transition:0.3s;
}

input:focus{
box-shadow:0 0 10px #00ffcc;
}

button{
margin-left:10px;
padding:12px 18px;
background:linear-gradient(90deg,#00ffcc,#6f00ff,#ff004c);
background-size:300%;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
animation:rgbBtn 5s linear infinite;
transition:0.3s;
}

@keyframes rgbBtn{
0%{background-position:0%}
100%{background-position:300%}
}

button:hover{
transform:scale(1.05);
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo"> Nexus AI </div>
<div class="new-chat" onclick="clearChat()">+ New Chat</div>
</div>

<div class="chat-area">

<div class="topbar">AI Assistant</div>

<div class="messages" id="messages">
<div class="msg ai">Hello 👋 كيف نعاونك اليوم؟</div>
</div>

<div class="input-box">
<input id="input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') send()" />
<button id="btn" onclick="send()">Send</button>
</div>

</div>

<script>

/* SAME CODE (NO CHANGE) */

function clearChat(){
document.getElementById("messages").innerHTML =
'<div class="msg ai">Hello 👋 كيف نعاونك اليوم؟</div>';
}

function setLoading(state){
document.getElementById("btn").disabled = state;
document.getElementById("btn").innerText = state ? "..." : "Send";
}

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();
if(!text) return;

addMessage(text,"user");
input.value="";

setLoading(true);

try{

const res = await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({ message: text })
});

const contentType = res.headers.get("content-type");

let data;

if(contentType && contentType.includes("application/json")){
data = await res.json();
}else{
const errText = await res.text();
throw new Error(errText);
}

let reply = "No response";

if(data.choices && data.choices[0]){
reply = data.choices[0].message.content;
}else if(data.error){
reply = "Error: " + data.error;
}

addMessage(reply,"ai");

}catch(err){
addMessage("Error: " + err.message,"ai");
}

setLoading(false);

}

function addMessage(text,type){
const div = document.createElement("div");
div.className = "msg " + type;
div.innerText = text;

const messages = document.getElementById("messages");
messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;
}

</script>

</body>
</html>
