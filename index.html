<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:200px;
  height:100%;
  background:#111;
  padding:10px;
}

.logo{
  font-size:20px;
  margin-bottom:20px;
}

.newchat{
  padding:10px;
  background:#222;
  margin:5px 0;
  border-radius:10px;
  cursor:pointer;
}

/* CHAT */
.chat{
  margin-left:210px;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.messages{
  flex:1;
  padding:10px;
}

.msg{
  padding:10px;
  margin:5px 0;
  background:#222;
  border-radius:10px;
}

.ai{
  background:#1d4ed8;
}

.input{
  display:flex;
  padding:10px;
  background:#111;
}

.input input{
  flex:1;
  margin-right:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat">+ New Chat</div>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 How can I help you?</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..." 
    onkeydown="if(event.key==='Enter') send()"/>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
/* نفس LOGIC 100% بلا تغيير */
function send(){
  let input = document.getElementById("input");
  let messages = document.getElementById("messages");

  if(!input.value) return;

  let userMsg = document.createElement("div");
  userMsg.className = "msg";
  userMsg.innerText = input.value;
  messages.appendChild(userMsg);

  let aiMsg = document.createElement("div");
  aiMsg.className = "msg ai";
  aiMsg.innerText = "I'm a demo AI 🤖";
  messages.appendChild(aiMsg);

  input.value = "";
}
</script>

</body>
</html>
