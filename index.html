<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:#0b0b0b;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:#0f0f0f;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid #1f1f1f;
}

.logo{font-weight:bold;font-size:18px;}

.newchat{
  margin-top:15px;
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

.recents{
  margin-top:15px;
  font-size:12px;
  opacity:.6;
}

.chatList{
  max-height:400px;
  overflow-y:auto;
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chatItem{
  padding:10px;
  background:#151515;
  border-radius:10px;
  font-size:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chatItem.active{
  background:#22c55e;
  color:black;
}

.chatItem span{
  flex:1;
  cursor:pointer;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.chatActions button{
  background:none;
  border:none;
  color:#aaa;
  cursor:pointer;
  margin-left:5px;
}

.chatActions button:hover{
  color:white;
}

/* PROFILE */
.profile{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
}

.profileInfo{font-size:12px;}

.profile button{
  margin-top:6px;
  width:100%;
  padding:7px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:14px;
  border-radius:14px;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1a1a1a;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#0f0f0f;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">

  <div>
    <div class="logo">◆ ILYASS AI</div>

    <div class="newchat" onclick="newChat()">+ New Chat</div>

    <div class="recents">Recents</div>
    <div class="chatList" id="chatList"></div>
  </div>

  <div class="profile">
    <div class="avatar" onclick="uploadPhoto()">
      <img id="avatarImg" style="width:100%;height:100%;display:none;">
      <span id="avatarText">U</span>
    </div>

    <div class="profileInfo">
      <div id="profileEmail"></div>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <input type="file" id="fileInput" hidden accept="image/*" onchange="handlePhoto(event)">

</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
      onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

let currentChatId=null;

/* USER */
function getUser(){
  return JSON.parse(localStorage.getItem("user"));
}

/* KEY */
function getUserKey(){
  return "chats_"+getUser().email;
}

/* LOAD */
window.onload=()=>{
  const user=getUser();
  if(user){
    document.getElementById("profileEmail").innerText=user.email;
    document.getElementById("avatarText").innerText=user.email[0].toUpperCase();

    const saved=localStorage.getItem("avatar_"+user.email);
    if(saved){
      avatarImg.src=saved;
      avatarImg.style.display="block";
      avatarText.style.display="none";
    }

    loadChats();
  }
};

/* PHOTO */
function uploadPhoto(){
  fileInput.click();
}

function handlePhoto(e){
  const file=e.target.files[0];
  const reader=new FileReader();

  reader.onload=()=>{
    avatarImg.src=reader.result;
    avatarImg.style.display="block";
    avatarText.style.display="none";

    localStorage.setItem("avatar_"+getUser().email,reader.result);
  };

  reader.readAsDataURL(file);
}

/* CHATS */
function loadChats(){
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const box=document.getElementById("chatList");
  box.innerHTML="";

  chats.forEach(c=>{
    const div=document.createElement("div");
    div.className="chatItem"+(c.id===currentChatId?" active":"");

    div.innerHTML=`
      <span onclick="openChat(${c.id})">${c.title}</span>
      <div class="chatActions">
        <button onclick="renameChat(${c.id})">✏️</button>
        <button onclick="deleteChat(${c.id})">🗑</button>
      </div>
    `;

    box.appendChild(div);
  });
}

/* NEW */
function newChat(){
  currentChatId=Date.now();

  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];

  chats.push({id:currentChatId,title:"New chat",messages:[]});

  localStorage.setItem(getUserKey(),JSON.stringify(chats));
  loadChats();

  messages.innerHTML="";
}

/* OPEN */
function openChat(id){
  currentChatId=id;

  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===id);

  messages.innerHTML="";
  chat.messages.forEach(m=>addMessage(m.text,m.type));

  loadChats();
}

/* SAVE */
function saveMessage(text,type){
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===currentChatId);

  chat.messages.push({text,type});

  if(chat.messages.length===1){
    chat.title=text.slice(0,25);
  }

  localStorage.setItem(getUserKey(),JSON.stringify(chats));
  loadChats();
}

/* RENAME */
function renameChat(id){
  const chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  const chat=chats.find(c=>c.id===id);

  const name=prompt("New name:",chat.title);
  if(name){
    chat.title=name;
    localStorage.setItem(getUserKey(),JSON.stringify(chats));
    loadChats();
  }
}

/* DELETE */
function deleteChat(id){
  let chats=JSON.parse(localStorage.getItem(getUserKey()))||[];
  chats=chats.filter(c=>c.id!==id);

  localStorage.setItem(getUserKey(),JSON.stringify(chats));

  if(currentChatId===id){
    messages.innerHTML="";
    currentChatId=null;
  }

  loadChats();
}

/* UI */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  messages.appendChild(div);
}

/* SEND */
async function send(){

  if(!currentChatId) newChat();

  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  saveMessage(text,"user");
  input.value="";

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    addMessage(data.reply||"AI response","ai");
    saveMessage(data.reply||"AI response","ai");

  }catch{
    addMessage("Error","ai");
  }
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

</script>

</body>
</html>
