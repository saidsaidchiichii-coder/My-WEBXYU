<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:linear-gradient(135deg,#ffffff,#f3f4f6);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* 3D */
.fadeOut{animation:zoomOut .5s forwards;}
.fadeIn{animation:zoomIn .5s forwards;}

@keyframes zoomOut{
  from{opacity:1;transform:scale(1);}
  to{opacity:0;transform:scale(1.1);}
}
@keyframes zoomIn{
  from{opacity:0;transform:scale(0.9);}
  to{opacity:1;transform:scale(1);}
}

/* PARTICLES */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{font-weight:bold;}

.auth{display:flex;gap:10px;}

.btn{
  padding:8px 16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
}

.login{background:#eee;}
.signup{background:#111;color:white;}

/* HOME */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
}

.title{
  font-size:40px;
  font-weight:bold;
}

.inputBox{
  width:600px;
  max-width:90%;
  background:white;
  border-radius:999px;
  padding:12px 15px;
  display:flex;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.inputBox input{
  flex:1;
  border:none;
  outline:none;
}

.send{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#10a37f;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  display:none;
  flex:1;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:65%;
  padding:12px;
  border-radius:12px;
}

.user{
  align-self:flex-end;
  background:#10a37f;
  color:white;
}

.ai{
  align-self:flex-start;
  background:white;
  border:1px solid #eee;
}

/* THINKING */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#999;border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* INPUT */
.bottom{
  padding:15px;
  border-top:1px solid #eee;
  display:flex;
}

.bottom textarea{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  resize:none;
}

/* LOGIN MODAL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.loginBox{
  background:#111;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

.loginBox input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.loginBox button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- LOGIN -->
<div class="overlay" id="loginOverlay">
  <div class="loginBox">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign up</button>
  </div>
</div>

<div class="top">
  <div class="logo">ILYASS AI</div>

  <div class="auth">
    <button class="btn login" onclick="openLogin()">Login</button>
    <button class="btn signup" onclick="openLogin()">Sign up</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="center">
  <div class="title">Ask Anything</div>

  <div class="inputBox"> 
    <input id="homeInput"
      onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput"
      onkeydown="handleKey(event)"></textarea>
  </div>
</div>

<script>

/* NO AUTO LOGIN ❌ */
let loggedIn=false;

/* OPEN LOGIN ONLY ON CLICK ✔ */
function openLogin(){
  loginOverlay.style.display="flex";
}

/* SUPABASE */
const { createClient } = supabase;
const supabaseClient = createClient(
  "https://idjgsgtupuymysptxrbl.supabase.co",
  "sb_publishable_XLIIiXZRcS5hrvdQP_pkMA_w2I11xFH"
);

/* LOGIN */
async function login(){
  const {error}=await supabaseClient.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });

  if(error){alert(error.message);return;}

  loggedIn=true;
  loginOverlay.style.display="none";
}

/* SIGNUP */
async function signup(){
  const {error}=await supabaseClient.auth.signUp({
    email:email.value,
    password:password.value
  });

  if(error){alert(error.message);return;}

  alert("Check email 📩");
}

/* SHIFT ENTER ✔ */
function handleKey(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
}

/* START CHAT WITH 3D ✔ */
function startChat(){
  const text=homeInput.value.trim();
  if(!text)return;

  if(!loggedIn){
    openLogin();
    return;
  }

  home.classList.add("fadeOut");

  setTimeout(()=>{
    home.style.display="none";
    chat.style.display="flex";
    chat.classList.add("fadeIn");

    addMessage(text,"user");
    askAI(text);

  },500);
}

/* ADD */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  messages.appendChild(div);
  scrollBottom();
}

/* THINKING */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  messages.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom(){
  messages.scrollTop=messages.scrollHeight;
}

/* API LOGIC (FROM YOUR CODE ✔) */
async function askAI(text){
  const t=showThinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    t.remove();
    addMessage(data.reply || "No response","ai");

  }catch{
    t.remove();
    addMessage("Error","ai");
  }
}

/* SEND */
function send(){
  if(!loggedIn){openLogin();return;}

  const text=chatInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  chatInput.value="";
  askAI(text);
}

/* PARTICLES ✔ */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let dots=[];
for(let i=0;i<40;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dots.forEach(d=>{
    d.x+=d.vx;
    d.y+=d.vy;

    if(d.x<0||d.x>canvas.width)d.vx*=-1;
    if(d.y<0||d.y>canvas.height)d.vy*=-1;

    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.fillStyle="#10a37f";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
