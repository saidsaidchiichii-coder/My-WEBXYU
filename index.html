<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:
    radial-gradient(circle at 85% 50%, rgba(200,210,220,0.15), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.08), transparent 35%),
    linear-gradient(135deg,#000000 0%, #020617 30%, #0a0f1c 60%, #1a1f2e 100%);
  height:100vh;
  display:flex;
  flex-direction:column;
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;}
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{font-weight:bold;font-size:18px;color:white;}

.auth{display:flex;gap:10px;}

.btn{
  padding:8px 16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
}

.login{background:rgba(255,255,255,0.1);color:white;}
.signup{background:white;color:black;}

/* CENTER */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
}

.title{font-size:40px;font-weight:bold;color:white;}

/* INPUT */
.inputBox{
  width:600px;
  max-width:90%;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:999px;
  padding:12px 15px;
  display:flex;
  align-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.inputBox input{
  flex:1;
  border:none;
  outline:none;
  font-size:15px;
  background:transparent;
  color:white;
}

.send{
  width:40px;height:40px;
  border-radius:50%;
  background:#10a37f;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{display:none;flex:1;flex-direction:column;}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:65%;
  padding:12px;
  border-radius:12px;
}

.user{align-self:flex-end;background:#10a37f;color:white;}
.ai{align-self:flex-start;background:rgba(255,255,255,0.08);color:white;border:1px solid rgba(255,255,255,0.1);}

/* THINKING */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#999;border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* INPUT CHAT */
.bottom{
  padding:15px;
  border-top:1px solid rgba(255,255,255,0.1);
  display:flex;
}

.bottom input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:transparent;
  color:white;
}
</style>
</head>

<body>

<div class="top">
  <div class="logo">ILYASS AI</div>
  <div class="auth">
    <button class="btn login">Login</button>
    <button class="btn signup">Sign up</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="center">
  <div class="title">Ask anything</div>

  <div class="inputBox">
    <input id="homeInput" placeholder="What do you want to know?"
      onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <input id="chatInput" placeholder="Send a message..."
      onkeydown="if(event.key==='Enter') send()">
  </div>
</div>

<script>

/* 🔥 YOUR VERCEL API */
const API_URL = "https://my-webxyu.vercel.app/api/chat";

/* START CHAT */
function startChat(){
  const text=document.getElementById("homeInput").value.trim();
  if(!text) return;

  document.getElementById("home").style.display="none";
  document.getElementById("chat").style.display="flex";

  addMessage(text,"user");
  document.getElementById("homeInput").value="";

  askAI(text);
}

/* ADD MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  document.getElementById("messages").appendChild(div);
  typeText(div,text);
}

/* TYPE EFFECT */
function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },10);
}

/* THINKING */
function thinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`
    <div class="thinking">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>`;
  document.getElementById("messages").appendChild(div);
  return div;
}

/* 🚀 CALL YOUR VERCEL API */
async function askAI(message){
  const t = thinking();

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    t.remove();
    addMessage(data.reply || "No response","ai");

  }catch(err){
    t.remove();
    addMessage("Error connecting to API ❌","ai");
  }
}

/* SEND FROM CHAT INPUT */
function send(){
  const input=document.getElementById("chatInput");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  askAI(text);
}

</script>

</body>
</html>
