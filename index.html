<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ilyass AI Clone</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#000;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* NAVBAR */
.nav{
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
  position:relative;
  z-index:3;
}

.nav-left{
  font-weight:700;
  letter-spacing:1px;
}

.nav-right button{
  margin-left:12px;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid #ffffff33;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* CENTER */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:2; /* ABOVE CHAT */
}

.title{
  font-size:48px;
  font-weight:600;
  margin-bottom:30px;
}

/* INPUT */
.input-box{
  width:700px;
  max-width:90%;
  height:60px;
  background:#111;
  border-radius:999px;
  display:flex;
  align-items:center;
  padding:0 14px;
}

.input-box input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:16px;
  padding-left:10px;
}

.icon{
  color:#888;
  margin:0 8px;
}

.auto{
  font-size:14px;
  color:#ccc;
  margin-right:10px;
}

.send{
  width:38px;
  height:38px;
  border-radius:50%;
  background:white;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* CHAT */
.chat-box{
  position:absolute;
  top:70px;
  bottom:0;
  width:100%;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:1;
  pointer-events:none; /* 🔥 THIS FIXES YOUR PROBLEM */
}

.msg{
  max-width:70%;
  padding:10px 14px;
  border-radius:10px;
  white-space:pre-wrap;
  pointer-events:auto; /* allow interaction only on messages */
}

.user{
  background:#22c55e;
  color:black;
  align-self:flex-end;
}

.ai{
  background:#1f2937;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-left">◆ ILYASS AI AGENT</div>
  <div class="nav-right">
    <button>Imagine</button>
  </div>
</div>

<div class="chat-box" id="messages"></div>

<div class="center">
  <div class="title">ILYASS AI AGENT</div>

  <div class="input-box">
    <span class="icon">📎</span>
    <input id="input" placeholder="What's on your mind?" />
    <span class="auto">Auto ▼</span>
    <span class="icon">🎤</span>
    <div class="send" id="sendBtn">➤</div>
  </div>
</div>

<div class="footer">
 Contact WebSite Owner "ILYASS"
</div>

<script>
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
let loading = false;

/* ENTER FIX */
input.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener("click", send);

function addMessage(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  const box = document.getElementById("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function setLoading(state){
  loading = state;
  sendBtn.innerText = state ? "..." : "➤";
}

async function send(){
  if(loading) return;

  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value = "";

  setLoading(true);

  try{
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    addMessage(data.reply || "No response","ai");

  }catch(err){
    addMessage("❌ ERROR:\n" + err.message,"ai");
  }

  setLoading(false);
}
</script>

</body>
</html>
