<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>


<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:linear-gradient(135deg,#ffffff,#f3f4f6);
  height:100vh;
  display:flex;
  flex-direction:column;
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;}
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{
  font-weight:bold;
  font-size:18px;
}

.auth{
  display:flex;
  gap:10px;
}

.btn{
  padding:8px 16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
}

.login{
  background:#eee;
}

.signup{
  background:#111;
  color:white;
}

/* CENTER */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
  transition:.4s;
}

.title{
  font-size:40px;
  font-weight:bold;
}

/* INPUT */
.inputBox{
  width:600px;
  max-width:90%;
  background:white;
  border-radius:999px;
  padding:12px 15px;
  display:flex;
  align-items:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.inputBox input{
  flex:1;
  border:none;
  outline:none;
  font-size:15px;
}

.send{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#10a37f;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CHAT MODE */
.chat{
  display:none;
  flex:1;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:65%;
  padding:12px;
  border-radius:12px;
}

.user{
  align-self:flex-end;
  background:#10a37f;
  color:white;
}

.ai{
  align-self:flex-start;
  background:white;
  border:1px solid #eee;
}

/* THINKING */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#999;border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* INPUT CHAT */
.bottom{
  padding:15px;
  border-top:1px solid #eee;
  display:flex;
}

.bottom input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

</style>
</head>

<body>

<div class="top">
  <div class="logo">ILYASS AI</div>

  <div class="auth">
    <button class="btn login">Login</button>
    <button class="btn signup">Sign up</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="center">
  <div class="title">Ask anything</div>

  <div class="inputBox">
    <input id="homeInput" placeholder="What do you want to know?"
      onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <input id="chatInput" placeholder="Send a message..."
      onkeydown="if(event.key==='Enter') send()">
  </div>
</div>

<script>

/* START CHAT */
function startChat(){
  const text=document.getElementById("homeInput").value.trim();
  if(!text) return;

  document.getElementById("home").style.display="none";
  document.getElementById("chat").style.display="flex";

  addMessage(text,"user");
  document.getElementById("homeInput").value="";

  fakeAI();
}

/* ADD */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  document.getElementById("messages").appendChild(div);
  typeText(div,text);
}

/* TYPE */
function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },15);
}

/* THINKING */
function thinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  document.getElementById("messages").appendChild(div);
  return div;
}

/* AI */
function fakeAI(){
  const t=thinking();

  setTimeout(()=>{
    t.remove();
    addMessage("Hello 👋 كيفاش نعاونك؟","ai");
  },1000);
}

/* SEND */
function send(){
  const input=document.getElementById("chatInput");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";
  fakeAI();
}

</script>

</body>
</html>
