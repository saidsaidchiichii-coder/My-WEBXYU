<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat Pro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, Arial;
}

body{
  height:100vh;
  display:flex;
  background:#0f0f0f;
  color:white;
  transition:0.3s;
}

/* LIGHT MODE */
body.light{
  background:#f5f5f5;
  color:#111;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#111;
  display:flex;
  flex-direction:column;
  padding:15px;
  gap:10px;
}

body.light .sidebar{
  background:#fff;
  border-right:1px solid #ddd;
}

.logo{
  font-weight:bold;
  font-size:16px;
}

.search{
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#1a1a1a;
  color:white;
}

body.light .search{
  background:#eee;
  color:#111;
}

.newchat{
  padding:10px;
  background:#22c55e;
  color:black;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
}

.chatList{
  flex:1;
  overflow-y:auto;
  margin-top:10px;
}

.chatItem{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:5px;
  background:#1a1a1a;
  font-size:14px;
}

body.light .chatItem{
  background:#eee;
}

.chatItem.active{
  border:1px solid #22c55e;
}

/* PROFILE */
.profile{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  font-size:13px;
}

body.light .profile{
  background:#eee;
}

/* CHAT AREA */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:12px;
  border-radius:12px;
  animation:fade 0.2s ease;
  white-space:pre-wrap;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1f1f1f;
}

body.light .ai{
  background:#e5e5e5;
}

/* INPUT */
.inputBox{
  display:flex;
  padding:15px;
  background:#111;
}

body.light .inputBox{
  background:#fff;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#1a1a1a;
  color:white;
}

body.light input{
  background:#eee;
  color:#111;
}

button{
  margin-left:10px;
  padding:12px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#22c55e;
  font-weight:bold;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  font-size:12px;
  opacity:0.8;
}

/* TOGGLE */
.toggle{
  cursor:pointer;
  padding:5px 10px;
  background:#333;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="logo">◆ AI CHAT PRO</div>

  <input class="search" placeholder="Search chats..." oninput="searchChats(this.value)"/>

  <div class="newchat" onclick="createChat()">+ New Chat</div>

  <div class="chatList" id="chatList"></div>

  <div class="profile">
    👤 Free user<br/>
    Plan: Trial Free
  </div>

  <div class="toggle" onclick="toggleTheme()">🌙 / ☀️</div>

</div>

<!-- CHAT -->
<div class="chat">

  <div class="topbar">
    <div id="chatTitle">New Chat</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="input" placeholder="Message..."
    onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let activeChat = null;

/* INIT */
function init(){
  if(chats.length === 0){
    createChat();
  }else{
    loadChat(chats[0].id);
  }
  renderList();
}
init();

/* CREATE CHAT */
function createChat(){
  const id = Date.now();
  const chat = {
    id,
    title:"New Chat",
    messages:[]
  };

  chats.unshift(chat);
  save();
  loadChat(id);
}

/* LOAD CHAT */
function loadChat(id){
  activeChat = chats.find(c => c.id === id);
  renderMessages();
  renderList();
  document.getElementById("chatTitle").innerText = activeChat.title;
}

/* RENDER LIST */
function renderList(){
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach(c=>{
    const div = document.createElement("div");
    div.className = "chatItem" + (activeChat?.id === c.id ? " active":"");
    div.innerText = c.title;
    div.onclick = ()=>loadChat(c.id);
    list.appendChild(div);
  });
}

/* SEARCH */
function searchChats(q){
  document.querySelectorAll(".chatItem").forEach(el=>{
    el.style.display = el.innerText.toLowerCase().includes(q.toLowerCase())
    ? "block":"none";
  });
}

/* ADD MESSAGE */
function addMessage(text,role){
  activeChat.messages.push({text,role});
  save();
  renderMessages();
}

/* RENDER CHAT */
function renderMessages(){
  const box = document.getElementById("messages");
  box.innerHTML = "";

  activeChat.messages.forEach(m=>{
    const div = document.createElement("div");
    div.className = "msg " + (m.role==="user"?"user":"ai");
    div.innerText = m.text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* SEND */
async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  if(activeChat.messages.length === 0){
    activeChat.title = text.slice(0,20);
  }

  addMessage(text,"user");
  input.value="";

  // fake AI
  setTimeout(()=>{
    addMessage("AI: " + text,"ai");
  },600);
}

/* SAVE */
function save(){
  localStorage.setItem("chats", JSON.stringify(chats));
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
