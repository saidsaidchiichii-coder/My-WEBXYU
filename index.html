<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, Arial;
}

body{
  background:#0f0f0f;
  color:white;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.newchat{
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:14px;
}

.user{
  align-self:flex-end;
  background:#22c55e;
  color:black;
}

.ai{
  align-self:flex-start;
  background:#1f1f1f;
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:#111;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  padding:12px 14px;
  border-radius:10px;
  color:white;
  opacity:0;
  transform:translateY(-15px);
  transition:0.3s;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

.toast.success{background:#22c55e;}
.toast.error{background:#ef4444;}

/* ========================= */
/* 🔥 THINKING ANIMATION */
/* ========================= */

.thinking{
  display:flex;
  gap:5px;
  align-items:center;
}

.dot{
  width:6px;
  height:6px;
  background:#aaa;
  border-radius:50%;
  animation:bounce 0.6s infinite ease-in-out;
}

.dot:nth-child(2){
  animation-delay:0.1s;
}

.dot:nth-child(3){
  animation-delay:0.2s;
}

@keyframes bounce{
  0%,100%{transform:translateY(0); opacity:0.4;}
  50%{transform:translateY(-4px); opacity:1;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">◆ ILYASS AI</div>
  <div class="newchat">+ New Chat</div>
</div>

<!-- CHAT -->
<div class="chat">

  <div class="messages" id="messages">
    <div class="msg ai">Hello 👋 كيفاش نعاونك؟</div>
  </div>

  <div class="input">
    <input id="input" placeholder="Ask anything..."
    onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

let thinkingEl = null;

/* toast */
function notify(msg,type="success"){
  const t=document.createElement("div");
  t.className=`toast ${type}`;
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add("show"),10);
  setTimeout(()=>t.remove(),3000);
}

/* messages */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
}

/* 🔥 THINKING START */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  
  div.innerHTML=`
    <div class="thinking">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;

  document.getElementById("messages").appendChild(div);
  thinkingEl = div;
}

/* ❌ THINKING STOP */
function hideThinking(){
  if(thinkingEl){
    thinkingEl.remove();
    thinkingEl=null;
  }
}

/* send */
async function send(){

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  showThinking(); // 🔥 start animation

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    hideThinking(); // stop animation
    addMessage(data.reply || "No response","ai");

  }catch{
    hideThinking();
    notify("Chat error","error");
  }
}

</script>

</body>
</html>
