<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:#f7f7f8;
  color:#111;
  height:100vh;
  display:flex;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:white;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid #e5e5e5;
}

.logo{
  font-weight:bold;
  font-size:18px;
}

.newchat{
  margin-top:15px;
  padding:12px;
  background:#10a37f;
  color:white;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  font-weight:600;
  transition:0.2s;
}
.newchat:hover{
  background:#0d8c6d;
}

.recents{
  margin-top:20px;
  font-size:12px;
  color:#777;
}

.chatList{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chatItem{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#f1f1f1;
  border-radius:10px;
  cursor:pointer;
}
.chatItem:hover{
  background:#e7e7e7;
}

/* PROFILE */
.profile{
  background:#f1f1f1;
  padding:10px;
  border-radius:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#10a37f;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
}

.logout{
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:65%;
  padding:14px;
  border-radius:14px;
  font-size:14px;
  line-height:1.5;
}

.user{
  align-self:flex-end;
  background:#10a37f;
  color:white;
}

.ai{
  align-self:flex-start;
  background:white;
  border:1px solid #e5e5e5;
}

/* THINKING */
.thinking{
  display:flex;
  gap:5px;
}
.dot{
  width:6px;
  height:6px;
  background:#999;
  border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
  0%,100%{opacity:0.2;}
  50%{opacity:1;}
}

/* INPUT */
.input{
  display:flex;
  padding:15px;
  background:white;
  border-top:1px solid #e5e5e5;
}

input{
  flex:1;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  background:white;
}

.sendBtn{
  margin-left:10px;
  width:45px;
  border:none;
  border-radius:10px;
  background:#10a37f;
  color:white;
  cursor:pointer;
  font-size:18px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="logo">ILYASS AI</div>
    <div class="newchat" onclick="newChat()">+ New Chat</div>

    <div class="recents">Recents</div>
    <div id="chatList" class="chatList"></div>
  </div>

  <div class="profile">
    <div class="avatar">U</div>
    <div>
      <div>User</div>
      <div style="font-size:12px;color:#777;">user@email.com</div>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<div class="chat">
  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="input" placeholder="Send a message..."
    onkeydown="if(event.key==='Enter') send()">
    <button class="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<script>

let currentChatId=null;

function newChat(){
  document.getElementById("messages").innerHTML="";
}

/* ADD MESSAGE */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  document.getElementById("messages").appendChild(div);
  typeText(div,text);
}

/* TYPING EFFECT */
function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const interval=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },15);
}

/* THINKING */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  document.getElementById("messages").appendChild(div);
}

function removeThinking(){
  const t=document.querySelector(".thinking");
  if(t) t.parentElement.remove();
}

/* SEND */
async function send(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  showThinking();

  setTimeout(()=>{
    removeThinking();
    addMessage("This is AI response ✨","ai");
  },1000);
}

/* LOGOUT */
function logout(){
  alert("Logged out");
}

</script>

</body>
</html>
