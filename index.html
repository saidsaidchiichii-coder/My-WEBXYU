<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> Zentavo AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* 🌑 GPT STYLE BACKGROUND (UPDATED ONLY) */
body{
margin:0;
padding:0;
font-family:Inter;
height:100vh;
display:flex;

/* clean ChatGPT-like dark */
background:
radial-gradient(circle at 20% 20%, rgba(16,185,129,0.08), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(99,102,241,0.08), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(236,72,153,0.06), transparent 40%),
#0b0f19;

color:#e5e7eb;
overflow:hidden;
}

/* optional subtle moving glow */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.02),transparent);
animation:moveLight 8s linear infinite;
pointer-events:none;
}

@keyframes moveLight{
0%{transform:translateX(-100%)}
100%{transform:translateX(100%)}
}

/* SIDEBAR (same but cleaner shadow) */
.sidebar{
width:260px;
background:rgba(17,24,39,0.75);
backdrop-filter: blur(14px);
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
border-right:1px solid rgba(255,255,255,0.06);
}

/* LOGO (kept RGB but softer) */
.logo{
font-size:18px;
font-weight:800;
background:linear-gradient(90deg,#22c55e,#60a5fa,#a78bfa);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgbText 8s linear infinite;
}

@keyframes rgbText{
0%{background-position:0%}
100%{background-position:300%}
}

/* NEW CHAT */
.new-chat{
padding:10px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.new-chat:hover{
transform:scale(1.03);
background:rgba(255,255,255,0.08);
}

/* TOPBAR */
.topbar{
padding:15px;
font-weight:600;
background:rgba(17,24,39,0.6);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,0.06);
}

/* MESSAGES */
.messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
scroll-behavior:smooth;
}

/* MESSAGE */
.msg{
max-width:70%;
padding:12px 14px;
border-radius:14px;
animation:pop 0.25s ease;
}

@keyframes pop{
from{transform:scale(0.9);opacity:0}
to{transform:scale(1);opacity:1}
}

/* USER */
.user{
background:linear-gradient(135deg,#22c55e,#3b82f6);
color:#000;
align-self:flex-end;
border-bottom-right-radius:4px;
}

/* AI */
.ai{
background:rgba(17,24,39,0.9);
border:1px solid rgba(255,255,255,0.06);
align-self:flex-start;
border-bottom-left-radius:4px;
}

/* INPUT */
.input-box{
display:flex;
padding:15px;
background:rgba(17,24,39,0.7);
backdrop-filter: blur(12px);
border-top:1px solid rgba(255,255,255,0.06);
}

input{
flex:1;
padding:12px;
border:none;
background:#111827;
color:#fff;
border-radius:10px;
outline:none;
}

input:focus{
box-shadow:0 0 10px rgba(59,130,246,0.4);
}

button{
margin-left:10px;
padding:12px 18px;
background:linear-gradient(90deg,#22c55e,#3b82f6,#a855f7);
background-size:300%;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
animation:rgbBtn 6s linear infinite;
}

@keyframes rgbBtn{
0%{background-position:0%}
100%{background-position:300%}
}

button:hover{
transform:scale(1.05);
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

</style>
</head>

<body>

<!-- ❗ SAME HTML EXACTLY (NO CHANGE) -->

<div class="sidebar">
<div class="logo"> Nexus AI </div>
<div class="new-chat" onclick="clearChat()">+ New Chat</div>
</div>

<div class="chat-area">

<div class="topbar">AI Assistant</div>

<div class="messages" id="messages">
<div class="msg ai">Hello 👋 كيف نعاونك اليوم؟</div>
</div>

<div class="input-box">
<input id="input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') send()" />
<button id="btn" onclick="send()">Send</button>
</div>

</div>

<script>

/* SAME CODE (NO CHANGE) */

function clearChat(){
document.getElementById("messages").innerHTML =
'<div class="msg ai">Hello 👋 كيف نعاونك اليوم؟</div>';
}

function setLoading(state){
document.getElementById("btn").disabled = state;
document.getElementById("btn").innerText = state ? "..." : "Send";
}

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();
if(!text) return;

addMessage(text,"user");
input.value="";

setLoading(true);

try{

const res = await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({ message: text })
});

const contentType = res.headers.get("content-type");

let data;

if(contentType && contentType.includes("application/json")){
data = await res.json();
}else{
const errText = await res.text();
throw new Error(errText);
}

let reply = "No response";

if(data.choices && data.choices[0]){
reply = data.choices[0].message.content;
}else if(data.error){
reply = "Error: " + data.error;
}

addMessage(reply,"ai");

}catch(err){
addMessage("Error: " + err.message,"ai");
}

setLoading(false);

}

function addMessage(text,type){
const div = document.createElement("div");
div.className = "msg " + type;
div.innerText = text;

const messages = document.getElementById("messages");
messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;
}

</script>

</body>
</html>
