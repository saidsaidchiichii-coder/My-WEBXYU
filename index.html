<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYASS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:linear-gradient(135deg,#ffffff,#f3f4f6);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HOVER */
button, .send, .inputBox{
  transition:.25s;
}
button:hover, .send:hover{
  transform:scale(1.08);
}

/* 3D ANIM */
.fadeOut{animation:zoomOut .6s forwards;}
.fadeIn{animation:zoomIn .6s forwards;}
.slideUp{animation:slideUp .4s ease;}

@keyframes zoomOut{
  from{opacity:1;transform:scale(1) rotateX(0deg);}
  to{opacity:0;transform:scale(1.1) rotateX(10deg);}
}
@keyframes zoomIn{
  from{opacity:0;transform:scale(0.9) rotateX(-10deg);}
  to{opacity:1;transform:scale(1) rotateX(0deg);}
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

/* PARTICLES */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* TOP */
.top{
  display:flex;
  justify-content:center;
  padding:20px;
}

.logo{font-weight:bold;}

/* HOME */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
}

.title{
  font-size:40px;
  font-weight:bold;
}

.inputBox{
  width:600px;
  max-width:90%;
  background:white;
  border-radius:999px;
  padding:12px 15px;
  display:flex;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}
.inputBox:hover{
  transform:scale(1.02);
}

.inputBox input{
  flex:1;
  border:none;
  outline:none;
}

.send{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#10a37f;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  display:none;
  flex:1;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:65%;
  padding:12px;
  border-radius:12px;
  animation:slideUp .3s ease;
}

.user{
  align-self:flex-end;
  background:#10a37f;
  color:white;
}

.ai{
  align-self:flex-start;
  background:white;
  border:1px solid #eee;
}

/* THINKING */
.thinking{display:flex;gap:5px;}
.dot{
  width:6px;height:6px;background:#999;border-radius:50%;
  animation:blink 1s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.2;}
  50%{opacity:1;}
}

/* INPUT */
.bottom{
  padding:15px;
  border-top:1px solid #eee;
  display:flex;
}

.bottom textarea{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  resize:none;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="top">
  <div class="logo">ILYASS AI</div>
</div>

<!-- HOME -->
<div id="home" class="center">
  <div class="title">Ask Anything</div>

  <div class="inputBox"> 
    <input id="homeInput"
      onkeydown="if(event.key==='Enter') startChat()">
    <div class="send" onclick="startChat()">➤</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <div id="messages" class="messages"></div>

  <div class="bottom">
    <textarea id="chatInput"
      onkeydown="handleKey(event)"></textarea>
  </div>
</div>

<script>

/* SHIFT ENTER */
function handleKey(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
}

/* START CHAT */
function startChat(){
  const text=homeInput.value.trim();
  if(!text)return;

  home.classList.add("fadeOut");

  setTimeout(()=>{
    home.style.display="none";
    chat.style.display="flex";
    chat.classList.add("fadeIn");

    addMessage(text,"user");
    askAI(text);

  },600);
}

/* TYPE EFFECT */
function typeText(el,text){
  let i=0;
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(int);
  },15);
}

/* ADD */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;

  const content=document.createElement("div");
  div.appendChild(content);

  messages.appendChild(div);

  if(type==="ai"){
    typeText(content,text);
  }else{
    content.innerText=text;
  }

  scrollBottom();
}

/* THINKING */
function showThinking(){
  const div=document.createElement("div");
  div.className="msg ai";
  div.innerHTML=`<div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
  messages.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom(){
  messages.scrollTop=messages.scrollHeight;
}

/* AI */
async function askAI(text){
  const t=showThinking();

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();

    setTimeout(()=>{
      t.remove();
      addMessage(data.reply || "No response","ai");
    },1200);

  }catch{
    t.remove();
    addMessage("Error","ai");
  }
}

/* SEND */
function send(){
  const text=chatInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  chatInput.value="";
  askAI(text);
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let dots=[];
for(let i=0;i<50;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  dots.forEach(d=>{
    d.x+=d.vx;
    d.y+=d.vy;

    if(d.x<0||d.x>canvas.width)d.vx*=-1;
    if(d.y<0||d.y>canvas.height)d.vy*=-1;

    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.fillStyle="#10a37f";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
