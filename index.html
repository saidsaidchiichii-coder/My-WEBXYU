<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat Pro</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#111;
  --panel2:#1a1a1a;
  --text:#fff;
  --ai:#1f1f1f;
  --user:#22c55e;
}

/* LIGHT MODE */
.light{
  --bg:#f5f5f5;
  --panel:#ffffff;
  --panel2:#e9e9e9;
  --text:#000;
  --ai:#eaeaea;
  --user:#16a34a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, Arial;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:var(--panel);
  display:flex;
  flex-direction:column;
  padding:15px;
  gap:12px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.newchat{
  padding:10px;
  border-radius:10px;
  background:var(--panel2);
  cursor:pointer;
  text-align:center;
  transition:0.2s;
}
.newchat:hover{transform:scale(1.03);}

/* SEARCH */
.search{
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--panel2);
  color:var(--text);
  outline:none;
}

/* CHATS LIST */
.chatlist{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chatitem{
  padding:10px;
  border-radius:8px;
  background:transparent;
  cursor:pointer;
}
.chatitem:hover{
  background:var(--panel2);
}

/* PROFILE */
.profile{
  padding:10px;
  background:var(--panel2);
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOP BAR */
.top{
  height:60px;
  background:var(--panel);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
}

.toggle{
  cursor:pointer;
  padding:8px 12px;
  border-radius:8px;
  background:var(--panel2);
}

/* CHAT BOX */
.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MSG */
.msg{
  max-width:65%;
  padding:12px;
  border-radius:12px;
  white-space:pre-wrap;
  animation:fade .2s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.user{
  align-self:flex-end;
  background:var(--user);
  color:black;
}

.ai{
  align-self:flex-start;
  background:var(--ai);
}

/* INPUT */
.inputbar{
  display:flex;
  padding:12px;
  background:var(--panel);
  border-top:1px solid #222;
}

.inputbar input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--panel2);
  color:var(--text);
  outline:none;
}

.inputbar button{
  margin-left:10px;
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:var(--user);
  cursor:pointer;
  font-weight:bold;
}

/* OVERLAY LOGIN */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
}

.login{
  width:320px;
  background:var(--panel);
  padding:20px;
  border-radius:14px;
}

.login input{
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  border:none;
  background:var(--panel2);
  color:var(--text);
}

.login button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--user);
  cursor:pointer;
}

.small{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="overlay" id="login">
  <div class="login">
    <h3>Login</h3>
    <p class="small">AI Chat System</p>

    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="topbar">
    <div>AI CHAT</div>
  </div>

  <div class="newchat" onclick="newChat()">+ New Chat</div>

  <input class="search" placeholder="Search chats..." oninput="searchChats(this.value)">

  <div class="chatlist" id="chatlist"></div>

  <div class="profile">
    <div>👤 Free User</div>
    <div class="toggle" onclick="toggleTheme()">Theme</div>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="top">
    <div>Chat</div>
  </div>

  <div class="messages" id="box"></div>

  <div class="inputbar">
    <input id="input" placeholder="Message..." onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

let chats = [];
let currentChat = 0;

/* LOGIN */
function login(){
  document.getElementById("login").style.display="none";
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* NEW CHAT FIXED */
function newChat(){
  const id = Date.now();
  chats.push({id, messages:[]});
  currentChat = id;
  renderChats();
  clearBox();
}

/* RENDER LIST */
function renderChats(){
  const list = document.getElementById("chatlist");
  list.innerHTML="";

  chats.forEach(c=>{
    const div=document.createElement("div");
    div.className="chatitem";
    div.innerText="Chat " + c.id;
    div.onclick=()=>loadChat(c.id);
    list.appendChild(div);
  });
}

/* LOAD CHAT */
function loadChat(id){
  currentChat=id;
  const chat = chats.find(c=>c.id===id);
  clearBox();

  chat.messages.forEach(m=>{
    addMsg(m.text,m.type,false);
  });
}

/* SEARCH */
function searchChats(val){
  const items=document.querySelectorAll(".chatitem");
  items.forEach(i=>{
    i.style.display=i.innerText.toLowerCase().includes(val.toLowerCase())
    ? "block":"none";
  });
}

/* ADD MESSAGE */
function addMsg(text,type,save=true){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("box").appendChild(div);
  document.getElementById("box").scrollTop=9999;

  if(save){
    let chat = chats.find(c=>c.id===currentChat);
    if(chat) chat.messages.push({text,type});
  }
}

/* CLEAR */
function clearBox(){
  document.getElementById("box").innerHTML="";
}

/* SEND (AI MOCK) */
function send(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMsg(text,"user");
  input.value="";

  setTimeout(()=>{
    addMsg("AI: " + text,"ai");
  },400);
}

</script>

</body>
</html>
